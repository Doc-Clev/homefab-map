  document.getElementById('core-roi').textContent      = e.hubs_active === 0 ? '—' : fmtPct(e.core_roi);

  // Fab-Home
  document.getElementById('fab-rev').textContent       = fmtMoney(e.fab_rev_cum);
  document.getElementById('fab-ni').textContent        = fmtMoney(e.fab_ni_cum);
  document.getElementById('fab-runrate').textContent   = fmtNum(e.fab_runrate_homes) + ' /yr';
  document.getElementById('fab-count').textContent     = fmtNum(e.fab_count);
  document.getElementById('fab-capex').textContent     = fmtMoney(e.fab_capex);
  document.getElementById('fab-states').textContent    = e.fab_states;
  document.getElementById('fab-homes').textContent     = fmtNum(e.homes_cum);
  document.getElementById('fab-roi').textContent       = e.fab_count === 0 ? '—' : fmtPct(e.fab_roi);
}

// ---- Map ----
function updateMap() {
  if (!mapProjection) return;
  const svg = d3.select('#map');

  // --- Hub service-range circles (under everything) ---
  // 500-mile radius concentric circles around each FBX Core hub.
  // Pixel radius is computed per-hub using the projection: we project a point
  // 500 miles due east at the hub's latitude and measure the screen distance,
  // so the circle is geographically accurate regardless of Albers distortion.
  let rangeG = svg.select('g.hub-ranges-layer');
  if (rangeG.empty()) rangeG = svg.append('g').attr('class', 'hub-ranges-layer');
  const rangeMiles = 500;
  const milesPerDegLat = 69.0;  // close enough for this purpose
  function rangePx(hub) {
    const center = mapProjection([hub.lon, hub.lat]);
    if (!center) return 0;
    // Offset 500 mi east — longitude degrees per mile depends on cos(latitude)
    const milesPerDegLon = Math.cos(hub.lat * Math.PI / 180) * milesPerDegLat;
    const dLon = rangeMiles / milesPerDegLon;
    const edge = mapProjection([hub.lon + dLon, hub.lat]);
    if (!edge) return 0;
    return Math.hypot(edge[0] - center[0], edge[1] - center[1]);
  }
  const rangeJoin = rangeG.selectAll('circle.hub-range').data(hubs, d => d._id);
  rangeJoin.exit().remove();
  rangeJoin.enter().append('circle').attr('class', 'hub-range')
    .merge(rangeJoin)
    .attr('class', d => 'hub-range' + (d.opens_yr > currentYear ? ' dim' : ''))
    .attr('cx', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -1000; })
    .attr('cy', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] : -1000; })
    .attr('r', d => rangePx(d));

  // --- Routes layer (under dots) ---
  let routeG = svg.select('g.routes-layer');
  if (routeG.empty()) routeG = svg.append('g').attr('class', 'routes-layer');
  const showRoutes = document.getElementById('show-routes') &amp;&amp; document.getElementById('show-routes').checked;
  if (showRoutes) {
    const activeH = hubs.filter(h => h.opens_yr <= currentYear);
    const routes = sites
      .filter(s => s.yr <= currentYear)
      .map(s => {
        const a = assignHub(s, activeH);
        if (!a) return null;
        const fp = mapProjection([s.lon, s.lat]);
        const hp = mapProjection([a.hub.lon, a.hub.lat]);
        if (!fp || !hp) return null;
        return { id: s._id, x1: fp[0], y1: fp[1], x2: hp[0], y2: hp[1] };
      })
      .filter(Boolean);
    const rJoin = routeG.selectAll('line').data(routes, d => d.id);
    rJoin.exit().remove();
    rJoin.enter().append('line').attr('class', 'route-line')
      .merge(rJoin)
      .attr('x1', d => d.x1).attr('y1', d => d.y1)
      .attr('x2', d => d.x2).attr('y2', d => d.y2);
  } else {
    routeG.selectAll('line').remove();
  }

  // --- Fab dots ---
  let g = svg.select('g.dots-layer');
  if (g.empty()) g = svg.append('g').attr('class', 'dots-layer');
  const join = g.selectAll('circle').data(sites, d => d._id);
  join.exit().remove();
  const enter = join.enter().append('circle').attr('r', 4.5).attr('class', d => 'dot p' + d.phase);
  enter.merge(join)
    .attr('class', d => 'dot p' + d.phase + (d.yr > currentYear ? ' dim' : '') + (d._id === hoveredRowId ? ' hl' : ''))
    .attr('cx', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -100; })
    .attr('cy', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] : -100; });

  const tip = document.getElementById('tip');
  const mapEl = document.querySelector('.map');
  g.selectAll('circle')
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('r', 7);
      const activeH = hubs.filter(h => h.opens_yr <= currentYear);
      const assignInfo = assignHub(d, activeH);
      const hubTxt = assignInfo ? ` · ${assignInfo.hub.name} (${Math.round(assignInfo.dist_mi)} mi)` : '';
      const capTxt = (d.capex != null &amp;&amp; d.capex !== '') ? ` · $${(+d.capex).toFixed(1)}M capex` : '';
      tip.innerHTML = `<strong>${escapeHtml(d.name)}, ${escapeHtml(d.state)}</strong><div class=&quot;meta&quot;>Year ${d.yr} · Phase ${d.phase}${hubTxt}${capTxt}</div>`;
      tip.style.opacity = '1';
    })
    .on('mousemove', function(e) {
      const rect = mapEl.getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 12) + 'px';
      tip.style.top = (e.clientY - rect.top - 8) + 'px';
    })
    .on('mouseleave', function() {
      d3.select(this).attr('r', 4.5);
      tip.style.opacity = '0';
    });

  // --- Hub diamonds (on top of dots) ---
  let hubG = svg.select('g.hubs-layer');
  if (hubG.empty()) hubG = svg.append('g').attr('class', 'hubs-layer');
  const hubJoin = hubG.selectAll('g.hub-group').data(hubs, d => d._id);
  hubJoin.exit().remove();
  const hubEnter = hubJoin.enter().append('g').attr('class', 'hub-group');
  hubEnter.append('path').attr('class', 'hub');
  hubEnter.append('text').attr('class', 'hub-label');
  const hubMerged = hubEnter.merge(hubJoin);
  hubMerged.select('path')
    .attr('d', d => {
      const p = mapProjection([d.lon, d.lat]);
      if (!p) return '';
      const s = 9;  // half-diagonal
      return `M${p[0]},${p[1]-s} L${p[0]+s},${p[1]} L${p[0]},${p[1]+s} L${p[0]-s},${p[1]} Z`;
    })
    .attr('class', d => 'hub' + (d.opens_yr > currentYear ? ' dim' : ''));
  hubMerged.select('text')
    .attr('x', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -100; })
    .attr('y', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] - 14 : -100; })
    .attr('text-anchor', 'middle')
    .text(d => d.opens_yr <= currentYear ? d.city.split(/[\s-]/)[0] : '');

  // Hub hover tooltip
  hubMerged.on('mouseenter', function(e, d) {
    const assigned = sites.filter(s => {
      const activeH = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
      const a = assignHub(s, activeH);
      return a &amp;&amp; a.hub._id === d._id;
    }).length;
    tip.innerHTML = `<strong>${escapeHtml(d.name)}</strong><div class=&quot;meta&quot;>${escapeHtml(d.city)}, ${escapeHtml(d.state)} · opens Yr ${d.opens_yr} · ${assigned} Fabs</div>`;
    tip.style.opacity = '1';
  })
  .on('mousemove', function(e) {
    const rect = mapEl.getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 12) + 'px';
    tip.style.top = (e.clientY - rect.top - 8) + 'px';
  })
  .on('mouseleave', function() {
    tip.style.opacity = '0';
  });
}

function highlightDot(id) {
  hoveredRowId = id;
  updateMap();
}

function play() {
  const slider = document.getElementById('yr');
  const btn = document.getElementById('play-btn');
  if (playTimer) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
  btn.textContent = '⏸ Pause';
  let y = 1;
  slider.value = 1;
  currentYear = 1;
  document.getElementById('yr-out').textContent = '1';
  updateMap(); updateDashboard();
  playTimer = setInterval(() => {
    y++;
    if (y > 10) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
    slider.value = y;
    currentYear = y;
    document.getElementById('yr-out').textContent = String(y);
    updateMap(); updateDashboard();
  }, 800);
}

/* ============================================================
   GitHub versioning module
   ------------------------------------------------------------
   Commits the full plan (sites + hubs + assumptions) to a file
   in a user-configured GitHub repo. Uses the GitHub Contents API
   with a fine-grained Personal Access Token stored locally.
   ============================================================ */

function ghLoadConfig() {
  try {
    const raw = localStorage.getItem(GH_CONFIG_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function ghSaveConfigData(cfg) {
  try { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg)); } catch(e) {}
}

function ghConfig() {
  const cfg = ghLoadConfig() || {};
  document.getElementById('gh-owner').value = cfg.owner || '';
  document.getElementById('gh-repo').value = cfg.repo || '';
  document.getElementById('gh-branch').value = cfg.branch || 'main';
  document.getElementById('gh-path').value = cfg.path || 'sites.json';
  document.getElementById('gh-token').value = cfg.token || '';
  openModal('gh-config-modal');
}

function ghSaveConfig() {
  const cfg = {
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    path: document.getElementById('gh-path').value.trim() || 'sites.json',
    token: document.getElementById('gh-token').value.trim()
  };
  if (!cfg.owner || !cfg.repo) { toast('Owner and repo are required'); return; }
  ghSaveConfigData(cfg);
  closeModal('gh-config-modal');
  toast('GitHub settings saved');
  ghRefreshDropdown();
}

function ghClearConfig() {
  if (!confirm('Remove saved GitHub token and config from this browser?')) return;
  localStorage.removeItem(GH_CONFIG_KEY);
  document.getElementById('gh-owner').value = '';
  document.getElementById('gh-repo').value = '';
  document.getElementById('gh-branch').value = 'main';
  document.getElementById('gh-path').value = 'sites.json';
  document.getElementById('gh-token').value = '';
  const picker = document.getElementById('version-picker');
  if (picker) picker.style.display = 'none';
  toast('GitHub config cleared');
}

async function ghTestConnection() {
  const cfg = {
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    token: document.getElementById('gh-token').value.trim()
  };
  if (!cfg.owner || !cfg.repo || !cfg.token) { toast('Fill in owner, repo, and token first'); return; }
  try {
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (r.ok) {
      const repo = await r.json();
      toast(`✓ Connected to ${repo.full_name} (${repo.private ? 'private' : 'public'})`);
    } else if (r.status === 401) {
      toast('✗ Token invalid or expired');
    } else if (r.status === 404) {
      toast('✗ Repo not found — check owner/repo name, and that the token has access');
    } else {
      toast(`✗ GitHub API error: ${r.status}`);
    }
  } catch(e) {
    toast('✗ Network error: ' + e.message);
  }
}

function ghRequireConfig() {
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    toast('Configure GitHub settings first');
    ghConfig();
    return null;
  }
  return cfg;
}

function ghBuildPayload() {
  // Mirror the exportJSON payload shape so the file is compatible with
  // the existing sites.json fetch flow and Import.
  const cleanSites = sites.map(({_id, ...rest}) => rest);
  const cleanHubs = hubs.map(({_id, ...rest}) => rest);
  return {
    version: 2,
    exported_at: new Date().toISOString(),
    sites: cleanSites,
    hubs: cleanHubs,
    assumptions: assumptions
  };
}

// base64-encode a UTF-8 string (needed for GitHub Contents API)
function ghB64Encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function ghB64Decode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\n/g, ''))));
}

/* ----- Custom version name handling -----
   Commit messages are formatted as &quot;[<name>] <description>&quot; so the dropdown
   can parse a friendly label back out of git history without needing a
   separate tagging API. Name is constrained to URL-safe chars to keep it
   tidy in the UI. ---------------------------------------------------------- */

function ghSanitizeVersionName(raw) {
  return (raw || '').trim()
    .replace(/[^A-Za-z0-9._-]/g, '-')
    .replace(/-+/g, '-')
    .replace(/^[-.]+|[-.]+$/g, '')
    .slice(0, 60);
}

function ghBuildCommitMessage(name, desc) {
  const clean = ghSanitizeVersionName(name);
  const d = (desc || '').trim();
  if (clean &amp;&amp; d) return `[${clean}] ${d}`;
  if (clean) return `[${clean}]`;
  if (d) return d;
  return '';
}

// Extract the [name] prefix from a commit message. Returns { name, desc }.
function ghParseCommitMessage(msg) {
  if (!msg) return { name: '', desc: '' };
  const firstLine = msg.split('\n')[0];
  const m = firstLine.match(/^\[([A-Za-z0-9._-]{1,60})\]\s*(.*)$/);
  if (m) return { name: m[1], desc: m[2] };
  return { name: '', desc: firstLine };
}

function ghUpdateCommitPreview() {
  const name = document.getElementById('gh-version-name').value;
  const desc = document.getElementById('gh-commit-msg').value;
  const msg = ghBuildCommitMessage(name, desc);
  const el = document.getElementById('gh-commit-preview');
  if (!el) return;
  el.textContent = msg || '(commit message will be empty — enter a version name or description)';
}

function ghSave() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  document.getElementById('gh-save-target').textContent = `${cfg.owner}/${cfg.repo} · ${cfg.branch} · ${cfg.path}`;
  // Suggest a default version name from the timestamp so users can hit Save
  // with no manual typing if they want. Format: v2026-04-19-1542
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const suggested = `v${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  document.getElementById('gh-version-name').value = suggested;
  document.getElementById('gh-commit-msg').value = '';
  const summary = `${sites.length} Fabs · ${hubs.length} Core hubs · ${Object.keys(assumptions).length} assumptions`;
  document.getElementById('gh-save-summary').textContent = summary;
  ghUpdateCommitPreview();
  openModal('gh-save-modal');
  setTimeout(() => document.getElementById('gh-version-name').select(), 50);
}

async function ghDoCommit() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const name = document.getElementById('gh-version-name').value.trim();
  const desc = document.getElementById('gh-commit-msg').value.trim();
  const msg = ghBuildCommitMessage(name, desc);
  if (!msg) { toast('Enter a version name or description'); return; }

  const btn = document.getElementById('gh-commit-btn');
  btn.disabled = true; btn.textContent = 'Committing…';

  // Diagnostic trail — printed to console so you can see exactly what happened
  // even if the toast is missed. Never logs the token.
  const diag = [];
  const log = (s) => { diag.push(s); console.log('[ghDoCommit]', s); };

  try {
    log(`Target: ${cfg.owner}/${cfg.repo} @ ${cfg.branch} · ${cfg.path}`);
    log(`Message: &quot;${msg}&quot;`);

    // 1. Get current file SHA (if it exists) — required for updates
    let existingSha = null;
    const getUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}?ref=${encodeURIComponent(cfg.branch)}`;
    log(`GET ${getUrl}`);
    let getResp;
    try {
      getResp = await fetch(getUrl, {
        headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
      });
    } catch(netErr) {
      throw new Error(`Network error fetching current SHA: ${netErr.message}. Check connectivity.`);
    }
    log(`GET status: ${getResp.status}`);

    if (getResp.ok) {
      const existing = await getResp.json();
      existingSha = existing.sha;
      log(`Existing file SHA: ${existingSha}`);
    } else if (getResp.status === 404) {
      log('File does not exist yet — will create on PUT');
    } else if (getResp.status === 401) {
      throw new Error(`Token invalid or expired (401). Regenerate a fine-grained PAT in GitHub settings.`);
    } else if (getResp.status === 403) {
      const e = await getResp.json().catch(() => ({}));
      throw new Error(`403 Forbidden: ${e.message || 'Token lacks Contents: Read &amp; Write on this repo, or rate limit hit'}`);
    } else if (getResp.status === 404) {
      // already handled above
    } else {
      const e = await getResp.json().catch(() => ({}));
      throw new Error(`SHA lookup failed (${getResp.status}): ${e.message || 'unknown'}`);
    }

    // 2. PUT the new content
    const payload = ghBuildPayload();
    const content = ghB64Encode(JSON.stringify(payload, null, 2));
    const putUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}`;
    const body = {
      message: msg,
      content: content,
      branch: cfg.branch
    };
    if (existingSha) body.sha = existingSha;
    log(`PUT ${putUrl} (payload ${content.length} b64 chars, sha=${existingSha ? existingSha.slice(0,7) : 'none'})`);

    let putResp;
    try {
      putResp = await fetch(putUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${cfg.token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
    } catch(netErr) {
      throw new Error(`Network error during PUT: ${netErr.message}`);
    }
    log(`PUT status: ${putResp.status}`);

    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      const hint = putResp.status === 409
        ? ' (SHA conflict — click Refresh in the version dropdown, then try again)'
        : putResp.status === 422
        ? ' (invalid request — check branch name and file path)'
        : '';
      throw new Error(`PUT ${putResp.status}: ${err.message || 'unknown'}${hint}`);
    }

    const result = await putResp.json();
    const sha = result.commit &amp;&amp; result.commit.sha ? result.commit.sha.slice(0, 7) : '';
    log(`Commit SHA: ${sha}`);
    closeModal('gh-save-modal');
    const label = name ? ghSanitizeVersionName(name) : sha;
    toast(`✓ Saved &quot;${label}&quot; (${sha})`);
    // Refresh the dropdown so the new version appears immediately
    ghRefreshDropdown();
  } catch(e) {
    console.error('[ghDoCommit] Full diagnostic trail:', diag);
    console.error('[ghDoCommit] Error:', e);
    toast('✗ Commit failed: ' + e.message, 6000);
  } finally {
    btn.disabled = false; btn.textContent = 'Commit to GitHub';
  }
}

let ghSelectedSha = null;

async function ghLoad() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  document.getElementById('gh-load-target').textContent = `${cfg.owner}/${cfg.repo} · ${cfg.branch} · ${cfg.path}`;
  ghSelectedSha = null;
  document.getElementById('gh-load-btn').disabled = true;
  openModal('gh-load-modal');
  await ghRefreshVersions();
}

async function ghRefreshVersions() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const status = document.getElementById('gh-load-status');
  const list = document.getElementById('gh-version-list');
  status.textContent = 'Loading commit history…';
  status.style.display = 'block';
  list.style.display = 'none';
  list.innerHTML = '';

  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/commits?path=${encodeURIComponent(cfg.path)}&amp;sha=${encodeURIComponent(cfg.branch)}&amp;per_page=50`;
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) {
      if (resp.status === 404) {
        status.textContent = `No commits found for ${cfg.path}. Save a version first.`;
        return;
      }
      throw new Error(`${resp.status}`);
    }
    const commits = await resp.json();
    if (!commits.length) {
      status.textContent = `No commits yet for ${cfg.path}. Save a version first.`;
      return;
    }
    commits.forEach(c => {
      const sha = c.sha;
      const shortSha = sha.slice(0, 7);
      const msg = c.commit &amp;&amp; c.commit.message ? c.commit.message : '(no message)';
      const author = c.commit &amp;&amp; c.commit.author ? c.commit.author.name : '';
      const date = c.commit &amp;&amp; c.commit.author &amp;&amp; c.commit.author.date
        ? new Date(c.commit.author.date).toLocaleString() : '';
      const div = document.createElement('div');
      div.className = 'version-item';
      div.dataset.sha = sha;
      div.innerHTML = `
        <div style=&quot;flex:1; min-width:0&quot;>
          <div class=&quot;version-msg&quot;>${escapeHtml(msg.split('\n')[0])}</div>
          <div class=&quot;version-date&quot;>${escapeHtml(author)} · ${escapeHtml(date)}</div>
        </div>
        <div class=&quot;version-meta&quot;>${shortSha}</div>`;
      div.onclick = () => ghSelectVersion(sha, div);
      list.appendChild(div);
    });
    status.style.display = 'none';
    list.style.display = 'block';
  } catch(e) {
    status.textContent = '✗ Failed to load commits: ' + e.message;
  }
}

function ghSelectVersion(sha, el) {
  ghSelectedSha = sha;
  document.querySelectorAll('.version-item').forEach(n => n.classList.remove('selected'));
  if (el) el.classList.add('selected');
  document.getElementById('gh-load-btn').disabled = false;
}

async function ghLoadSelected() {
  if (!ghSelectedSha) return;
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const btn = document.getElementById('gh-load-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    await ghLoadBySha(ghSelectedSha, cfg);
    closeModal('gh-load-modal');
  } catch(e) {
    toast('✗ Load failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Load selected version';
  }
}

async function ghLoadBySha(sha, cfg) {
  // Fetch the file at a specific commit using Contents API with ref=<sha>
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}?ref=${encodeURIComponent(sha)}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
  });
  if (!resp.ok) throw new Error(`GET failed: ${resp.status}`);
  const data = await resp.json();
  const raw = ghB64Decode(data.content);
  const payload = JSON.parse(raw);
  ghApplyPayload(payload);
  toast(`✓ Loaded version ${sha.slice(0, 7)}`);
}

function ghApplyPayload(payload) {
  if (!payload || typeof payload !== 'object') throw new Error('Invalid payload shape');
  if (Array.isArray(payload.sites)) {
    sites = JSON.parse(JSON.stringify(payload.sites));
    ensureIds();
    saveSites();
  }
  if (Array.isArray(payload.hubs) &amp;&amp; payload.hubs.length > 0) {
    hubs = JSON.parse(JSON.stringify(payload.hubs));
    ensureIds();
    saveHubs();
  }
  if (payload.assumptions &amp;&amp; typeof payload.assumptions === 'object') {
    assumptions = { ...DEFAULT_ASSUMPTIONS, ...payload.assumptions };
    applyAssumptionsToUI();
    saveAssumptions();
  }
  dataSource = 'local-edits';
  updateSourceIndicator();
  render();
}

// URL deep-linking: ?v=<sha> loads that specific commit on page load
async function ghMaybeLoadFromURL() {
  const params = new URLSearchParams(location.search);
  const sha = params.get('v');
  if (!sha) return;
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    toast('URL requests version ' + sha.slice(0, 7) + ' but GitHub is not configured');
    return;
  }
  try {
    await ghLoadBySha(sha, cfg);
  } catch(e) {
    toast('Could not load version from URL: ' + e.message);
  }
}

/* ============== Version picker dropdown ============== */

// In-memory cache of the last-fetched commits so the dropdown load handler
// can look up the SHA for a selected version without re-fetching.
let ghCommitCache = [];

async function ghRefreshDropdown() {
  const picker = document.getElementById('version-picker');
  const select = document.getElementById('version-select');
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    // No GitHub config yet — keep dropdown hidden
    if (picker) picker.style.display = 'none';
    return;
  }
  if (picker) picker.style.display = 'inline-flex';

  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/commits?path=${encodeURIComponent(cfg.path)}&amp;sha=${encodeURIComponent(cfg.branch)}&amp;per_page=30`;
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) {
      // 404 likely means the file doesn't exist yet. Reset dropdown to empty.
      select.innerHTML = '<option value=&quot;&quot;>— no versions yet —</option>';
      ghCommitCache = [];
      return;
    }
    const commits = await resp.json();
    ghCommitCache = commits;
    if (!commits.length) {
      select.innerHTML = '<option value=&quot;&quot;>— no versions yet —</option>';
      return;
    }
    // Build options: &quot;version name · short description · date&quot;
    const opts = ['<option value=&quot;&quot;>— current (live) —</option>'];
    commits.forEach(c => {
      const sha = c.sha;
      const msg = c.commit &amp;&amp; c.commit.message ? c.commit.message : '';
      const { name, desc } = ghParseCommitMessage(msg);
      const date = c.commit &amp;&amp; c.commit.author &amp;&amp; c.commit.author.date
        ? new Date(c.commit.author.date) : null;
      const dateStr = date ? date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
      // Label priority: custom name > first line of description > short SHA
      const label = name || (desc ? desc.slice(0, 40) : sha.slice(0, 7));
      const suffix = desc &amp;&amp; name ? ` · ${desc.slice(0, 40)}` : '';
      const dateSuffix = dateStr ? ` · ${dateStr}` : '';
      const fullText = `${label}${suffix}${dateSuffix}`;
      // escapeHtml is available globally
      opts.push(`<option value=&quot;${sha}&quot; title=&quot;${escapeHtml(msg)}&quot;>${escapeHtml(fullText)}</option>`);
    });
    // Preserve selection if the same SHA is still in the list
    const prev = select.value;
    select.innerHTML = opts.join('');
    if (prev &amp;&amp; [...select.options].some(o => o.value === prev)) select.value = prev;
  } catch(e) {
    // Silent fail — don't hide the dropdown, just log
    console.warn('Version dropdown refresh failed:', e);
  }
}

async function ghLoadFromDropdown(sha) {
  if (!sha) return;  // &quot;— current —&quot; selection
  const cfg = ghRequireConfig();
  if (!cfg) return;
  // If there are localStorage edits, confirm before overwriting
  // (We don't have a clean &quot;is dirty&quot; flag, so always confirm when switching versions)
  if (!confirm('Load this version? Any unsaved changes in the current view will be replaced.')) {
    // Reset dropdown to empty selection
    document.getElementById('version-select').value = '';
    return;
  }
  try {
    await ghLoadBySha(sha, cfg);
  } catch(e) {
    toast('✗ Load failed: ' + e.message);
    document.getElementById('version-select').value = '';
  }
}

/* ============== Modal helpers ============== */
function openModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.add('open');
}
function closeModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.remove('open');
}
// ESC closes any open modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-backdrop.open').forEach(m => m.classList.remove('open'));
  }
});


(async function init() {
  // Load local hubs + assumptions synchronously (they're in localStorage / seeds)
  hubs = loadHubs();
  loadAssumptions();
  applyAssumptionsToUI();
  ensureIds();

  // Load sites in parallel with map topology fetch
  const [_, topo] = await Promise.all([
    loadSites().then(loaded => { sites = loaded; ensureIds(); updateSourceIndicator(); }),
    (async () => {
      const urls = [
        'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json',
        'https://unpkg.com/us-atlas@3/states-10m.json'
      ];
      for (const u of urls) {
        try {
          const r = await fetch(u);
          if (r.ok) return await r.json();
        } catch(e) {}
      }
      return null;
    })()
  ]);

  if (!topo) {
    document.getElementById('map').innerHTML = '<text x=&quot;480&quot; y=&quot;300&quot; text-anchor=&quot;middle&quot; fill=&quot;currentColor&quot; font-size=&quot;14&quot;>Map data unavailable — check your internet connection</text>';
    // Still render the table and dashboard even without the map
    render();
    return;
  }

  const svg = d3.select('#map');
  mapProjection = d3.geoAlbersUsa().scale(1180).translate([480, 300]);
  const path = d3.geoPath(mapProjection);
  const states = topojson.feature(topo, topo.objects.states);
  svg.append('g').attr('class', 'states-layer').selectAll('path').data(states.features).enter().append('path').attr('class', 'state').attr('d', path);

  document.getElementById('yr').addEventListener('input', e => {
    currentYear = +e.target.value;
    document.getElementById('yr-out').textContent = String(currentYear);
    updateMap(); updateDashboard();
  });

  render();

  // If the URL contains ?v=<sha>, try to load that specific GitHub version
  // after the initial render. Errors are non-fatal — user still sees a plan.
  ghMaybeLoadFromURL();

  // Populate the version dropdown from GitHub (silently skips if not configured)
  ghRefreshDropdown();

/* ============== ID helpers ============== */
function makeId(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function ensureIds() {
  sites.forEach(s => { if (!s._id) s._id = makeId('s'); });
  hubs.forEach(h => { if (!h._id) h._id = makeId('h'); });
}

function normalize(arr) {
  return arr.map(({_id, ...rest}) => rest);
}

function arraysEqual(a, b) {
  if (!a || !b || a.length !== b.length) return false;
  return JSON.stringify(normalize(a)) === JSON.stringify(normalize(b));
}

/* ============== Geometry / hub assignment ============== */
function haversineMi(lat1, lon1, lat2, lon2) {
  const R = 3959;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function assignHub(site, activeHubs) {
  if (!activeHubs || activeHubs.length === 0) return null;
  let best = null, bestD = Infinity;
  for (const h of activeHubs) {
    const d = haversineMi(site.lat, site.lon, h.lat, h.lon);
    if (d < bestD) { bestD = d; best = h; }
  }
  return best ? { hub: best, dist_mi: bestD } : null;
}

/* ============== Per-site effective values (override or default) ============== */
function fabCapex(s)    { return (s.capex != null &amp;&amp; s.capex !== '') ? +s.capex : assumptions.fab_capex_M; }
function fabRevPer(s)   { return (s.rev_per_home != null &amp;&amp; s.rev_per_home !== '') ? +s.rev_per_home : assumptions.rev_per_home_K; }
function fabMarginPct(s){ return (s.margin_pct != null &amp;&amp; s.margin_pct !== '') ? +s.margin_pct : assumptions.fab_margin_pct; }
function hubCapex(h)    { return (h.capex != null &amp;&amp; h.capex !== '') ? +h.capex : assumptions.hub_capex_M; }

/* ============== Ramp assumption: Fab reaches ~full output after 1 yr ============== */
/* Homes delivered by a given Fab in a given year:
   - Opening year: half mature output (mid-year average)
   - Subsequent years: full mature output
   Mature output is inherited from the 10-Year Roadmap — we use year-10 output (400 homes/Fab) as a ceiling.
   For simplicity and consistency with the spreadsheet model, we approximate via a shared curve: */
function fabMatureOutputForYear(s) {
  // Same schedule as the spreadsheet model: P1=180, P2=240, P3 ramps 320→400
  if (s.phase === 1) return 180;
  if (s.phase === 2) return 240;
  // Phase 3 ramp by opens_yr
  const ramp = { 6: 320, 7: 360, 8: 380, 9: 400, 10: 400 };
  return ramp[s.yr] || 400;
}

function homesFromSiteByYear(s, year) {
  if (year < s.yr) return 0;
  const mature = fabMatureOutputForYear(s);
  if (year === s.yr) return mature / 2;  // opens mid-year
  return mature;
}

/* ============== ECONOMICS ENGINE ============== */
function computeEconomics(year) {
  const activeHubsAtYear = hubs.filter(h => h.opens_yr <= year);
  const activeHubsCumul  = hubs;  // for total committed capex by year 10 — nuance: use <= year
  const openedSites = sites.filter(s => s.yr <= year);

  // Aggregate per-year homes delivered, for current year AND cumulative through year
  let fab_rev_cum = 0, fab_ni_cum = 0, homes_cum = 0, fab_capex_cum = 0;
  let fab_rev_yr = 0, homes_yr = 0, fab_runrate_yr = 0;

  for (const s of openedSites) {
    const rev_per = fabRevPer(s);   // $K
    const margin = fabMarginPct(s); // %
    const sCapex = fabCapex(s);     // $M

    // CAPEX booked in the year of opening (≤ year)
    fab_capex_cum += sCapex;

    // Sum homes delivered by this site across years from s.yr to current year
    for (let y = s.yr; y <= year; y++) {
      const h = homesFromSiteByYear(s, y);
      if (y === year) homes_yr += h;
      homes_cum += h;
      const rev = h * rev_per * 1000;  // dollars
      fab_rev_cum += rev;
      fab_ni_cum  += rev * (margin / 100);
      if (y === year) fab_rev_yr += rev;
    }
    // Annual run-rate (mature, for display at year-end)
    const mature = fabMatureOutputForYear(s);
    fab_runrate_yr += mature;
  }

  // ---- Core ----
  const hub_capex_cum = activeHubsAtYear.reduce((sum, h) => sum + hubCapex(h), 0) * 1e6;

  const kit_sales_cum  = homes_cum * assumptions.kit_price_K * 1000;
  const royalty_cum    = homes_cum * (assumptions.rev_per_home_K * 1000) * (assumptions.royalty_pct / 100);
  const core_rev_cum   = kit_sales_cum + royalty_cum;

  const kit_gp_cum     = kit_sales_cum * (assumptions.core_margin_pct / 100);  // Core gross profit on kits
  const core_opex_cum  = core_rev_cum * (assumptions.core_opex_pct / 100);
  const core_profit_cum = kit_gp_cum + royalty_cum - core_opex_cum;

  const core_roi = hub_capex_cum > 0 ? (core_profit_cum / hub_capex_cum) : 0;
  const fab_capex_cum_dollars = fab_capex_cum * 1e6;
  const fab_roi = fab_capex_cum_dollars > 0 ? (fab_ni_cum / fab_capex_cum_dollars) : 0;

  const states = new Set(openedSites.map(s => s.state));

  return {
    year,
    // Fab
    fab_count: openedSites.length,
    fab_capex: fab_capex_cum_dollars,
    fab_rev_cum,
    fab_ni_cum,
    fab_runrate_homes: fab_runrate_yr,
    fab_runrate_rev: fab_runrate_yr * assumptions.rev_per_home_K * 1000,
    fab_roi,
    fab_states: states.size,
    homes_cum,
    homes_yr,
    // Core
    hubs_active: activeHubsAtYear.length,
    core_capex: hub_capex_cum,
    core_rev_cum,
    kit_sales_cum,
    royalty_cum,
    core_profit_cum,
    core_roi
  };
}

/* ============== Formatters ============== */
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return '$' + (n/1e9).toFixed(abs >= 1e10 ? 1 : 2) + 'B';
  if (abs >= 1e6) return '$' + (n/1e6).toFixed(abs >= 1e8 ? 0 : 1) + 'M';
  if (abs >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function fmtNum(n) { return (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString('en-US'); }
function fmtPct(n) { return (n == null || isNaN(n)) ? '—' : (n * 100).toFixed(0) + '%'; }

      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) &amp;&amp; parsed.length) return parsed;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(SEED_HUBS));
}
function saveHubs() {
  try { localStorage.setItem(HUB_STORAGE_KEY, JSON.stringify(hubs)); } catch(e) {}
}

async function fetchCanonical() {
  try {
    const resp = await fetch('sites.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    // V2 shape: { sites: [...], hubs: [...], assumptions: {...} }
    if (data &amp;&amp; !Array.isArray(data) &amp;&amp; Array.isArray(data.sites)) {
      if (Array.isArray(data.hubs) &amp;&amp; data.hubs.length > 0) {
        // Only overwrite hubs if localStorage doesn't have custom ones
        const hubRaw = localStorage.getItem(HUB_STORAGE_KEY);
        if (!hubRaw) {
          hubs = JSON.parse(JSON.stringify(data.hubs));
          ensureIds();
          saveHubs();
        }
      }
      if (data.assumptions &amp;&amp; typeof data.assumptions === 'object') {
        const asmRaw = localStorage.getItem(ASM_STORAGE_KEY);
        if (!asmRaw) {
          assumptions = { ...DEFAULT_ASSUMPTIONS, ...data.assumptions };
          applyAssumptionsToUI();
          saveAssumptions();
        }
      }
      return data.sites.length > 0 ? data.sites : null;
    }
    // V1 shape: array of sites
    if (Array.isArray(data) &amp;&amp; data.length > 0) return data;
    throw new Error('Empty or invalid');
  } catch(e) {
    return null;
  }
}

async function loadSites() {
  const canonical = await fetchCanonical();
  canonicalSites = canonical;

  let stored = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) &amp;&amp; parsed.length > 0) stored = parsed;
    }
  } catch(e) {}

  if (canonical &amp;&amp; stored &amp;&amp; !arraysEqual(canonical, stored)) {
    // User has local edits AND sites.json exists AND they differ
    const useLocal = confirm(
      'You have unsaved local edits that differ from the published sites.json.\n\n' +
      '• Click OK to keep your local edits\n' +
      '• Click Cancel to load the fresh list from sites.json (your local edits will be discarded)'
    );
    if (useLocal) {
      dataSource = 'local-edits';
      return stored;
    } else {
      localStorage.removeItem(STORAGE_KEY);
      dataSource = 'synced';
      return JSON.parse(JSON.stringify(canonical));
    }
  }

  if (canonical) {
    dataSource = stored ? 'synced' : 'synced';  // local matches canonical, or no local
    return stored || JSON.parse(JSON.stringify(canonical));
  }

  // No canonical (fetch failed — likely opened as file://)
  if (stored) { dataSource = 'local-edits'; return stored; }
  dataSource = 'offline';
  return JSON.parse(JSON.stringify(SEED_SITES));
}

function updateSourceIndicator() {
  const el = document.getElementById('data-source-indicator');
  if (!el) return;
  const n = sites ? sites.length : 0;
  const y1 = sites ? sites.filter(s => s.yr === 1).length : 0;
  const counts = `${n} Fabs · ${y1} in Y1`;
  if (dataSource === 'synced') {
    el.innerHTML = `<span class=&quot;badge synced&quot;>Synced with sites.json</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else if (dataSource === 'local-edits') {
    el.innerHTML = `<span class=&quot;badge local&quot;>Local edits (not saved to source)</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else if (dataSource === 'offline') {
    el.innerHTML = `<span class=&quot;badge offline&quot;>Built-in plan (no sites.json)</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else {
    el.innerHTML = '<span class=&quot;badge offline&quot;>Loading…</span>';
  }
}

async function reloadFromSource() {
  const canonical = await fetchCanonical();
  if (!canonical) {
    toast('Could not fetch sites.json — check your connection or the file URL');
    return;
  }
  if (sites.length > 0 &amp;&amp; !arraysEqual(canonical, sites)) {
    const ok = confirm(
      'Reload from sites.json? This will discard your local edits in this browser.\n\n' +
      'Tip: click Export JSON first if you want to save your current work.'
    );
    if (!ok) return;
  }
  localStorage.removeItem(STORAGE_KEY);
  canonicalSites = canonical;
  sites = JSON.parse(JSON.stringify(canonical));
  dataSource = 'synced';
  ensureIds();
  updateSourceIndicator();
  render();
  toast('Reloaded ' + sites.length + ' cities from sites.json');
}

function saveSites() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); } catch(e) {}
  // If the user has diverged from canonical, mark as local edits
  if (canonicalSites &amp;&amp; !arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'local-edits') {
      dataSource = 'local-edits';
      updateSourceIndicator();
    }
  } else if (canonicalSites &amp;&amp; arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'synced') {
      dataSource = 'synced';
      updateSourceIndicator();
    }
  }
}

function toast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), duration || 1800);
}

// Geocode lookup
function geocode(name, state) {
  if (!name || !state) return null;
  const n = name.toLowerCase().trim();
  const s = state.toUpperCase().trim();
  // Exact match
  let m = GEOCODE_DB.find(c => c.name.toLowerCase() === n &amp;&amp; c.state === s);
  if (m) return { lat: m.lat, lon: m.lon };
  // Partial match (contains)
  m = GEOCODE_DB.find(c => c.state === s &amp;&amp; (c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase())));
  if (m) return { lat: m.lat, lon: m.lon, fuzzy: true, matched: m.name };
  return null;
}

function autoGeocodeHint() {
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim();
  const hint = document.getElementById('geocode-hint');
  if (!name || !state) { hint.textContent = ''; return; }
  const g = geocode(name, state);
  if (g) {
    if (g.fuzzy) {
      hint.textContent = `✓ Found similar: ${g.matched}, ${state} (${g.lat.toFixed(2)}, ${g.lon.toFixed(2)})`;
    } else {
      hint.textContent = `✓ Location recognized: ${g.lat.toFixed(2)}, ${g.lon.toFixed(2)}`;
    }
    hint.style.color = 'var(--success, var(--text-secondary))';
  } else {
    hint.textContent = `⚠ &quot;${name}, ${state}&quot; not in built-in database — enter Lat/Lon in the fields above, or click the ⚠ pin after adding to set coordinates.`;
    hint.style.color = 'var(--text-warning, #854F0B)';
  }
}

function addRow() {
  const yr = parseInt(document.getElementById('new-yr').value);
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim().toUpperCase();
  const phase = parseInt(document.getElementById('new-phase').value);

  // Optional manual lat/lon — if both provided, they override the geocode DB
  const latEl = document.getElementById('new-lat');
  const lonEl = document.getElementById('new-lon');
  const manualLat = latEl &amp;&amp; latEl.value !== '' ? parseFloat(latEl.value) : null;
  const manualLon = lonEl &amp;&amp; lonEl.value !== '' ? parseFloat(lonEl.value) : null;
  const hasManual = manualLat !== null &amp;&amp; manualLon !== null &amp;&amp; !isNaN(manualLat) &amp;&amp; !isNaN(manualLon);

  if (!name || !state) { toast('City and State required'); return; }
  if (state.length !== 2) { toast('State must be 2 letters'); return; }

  let lat = null, lon = null;
  let g = null;
  if (hasManual) {
    lat = manualLat;
    lon = manualLon;
  } else {
    g = geocode(name, state);
    if (g) {
      lat = g.lat;
      lon = g.lon;
    }
  }

  const newSite = { yr, phase, name, state, lat, lon, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7) };
  sites.push(newSite);
  saveSites();
  document.getElementById('new-name').value = '';
  document.getElementById('new-state').value = '';
  if (latEl) latEl.value = '';
  if (lonEl) lonEl.value = '';
  document.getElementById('geocode-hint').textContent = '';
  render();
  if (hasManual) {
    toast(`Added ${name}, ${state} at (${manualLat.toFixed(3)}, ${manualLon.toFixed(3)})`);
  } else if (g) {
    toast(`Added ${name}, ${state}`);
  } else {
    toast(`Added ${name}, ${state} — enter Lat/Lon or click the ⚠ pin to set coordinates`);
  }
}

function deleteRow(id) {
  const idx = sites.findIndex(s => s._id === id);
  if (idx === -1) return;
  const s = sites[idx];
  sites.splice(idx, 1);
  saveSites();
  render();
  toast(`Removed ${s.name}, ${s.state}`);
}

function updateField(id, field, value) {
  const site = sites.find(s => s._id === id);
  if (!site) return;
  if (field === 'yr' || field === 'phase') {
    value = parseInt(value);
    if (isNaN(value)) return;
    if (field === 'yr' &amp;&amp; (value < 1 || value > 10)) return;
    if (field === 'phase' &amp;&amp; (value < 1 || value > 3)) return;
  } else if (field === 'lat' || field === 'lon') {
    value = parseFloat(value);
    if (isNaN(value)) return;
  } else if (field === 'capex' || field === 'rev_per_home' || field === 'margin_pct') {
    // Override fields: blank = clear override, otherwise parse number
    if (value === '' || value == null) {
      delete site[field];
      saveSites();
      renderTable();  // refresh dirty-indicator state
      updateDashboard();
      return;
    }
    value = parseFloat(value);
    if (isNaN(value)) return;
  } else if (field === 'state') {
    value = (value || '').toUpperCase().slice(0, 2);
  } else if (field === 'name') {
    value = (value || '').trim();
    if (!value) return;
  }
  site[field] = value;

  // Auto-geocode when name or state changes — if the new (name, state) is in the DB,
  // update lat/lon silently. If not, leave existing coords in place and let the ⚠ pin show.
  if (field === 'name' || field === 'state') {
    const g = geocode(site.name, site.state);
    if (g) {
      site.lat = g.lat;
      site.lon = g.lon;
    }
  }

  saveSites();
  if (field === 'yr' || field === 'phase' || field === 'lat' || field === 'lon' || field === 'state' || field === 'name') {
    renderTable();
    renderHubs();
  }
  updateMap();
  updateDashboard();
}

function sortBy(field) {
  sites.sort((a, b) => {
    const av = a[field], bv = b[field];
    if (typeof av === 'number') return av - bv;
    return String(av).localeCompare(String(bv));
  });
  saveSites();
  render();
  toast(`Sorted by ${field}`);
}

function resetToDefaults() {
  // Always reset to the SEED_SITES/SEED_HUBS embedded in this HTML file.
  // Do NOT use canonicalSites — that may be a stale sites.json fetched from a
  // hosted deployment and would silently reintroduce the old plan.
  if (!confirm(
    `Reset all Fab sites AND FBX Core hubs to the built-in plan embedded in this HTML file?\n\n` +
    `This discards any local edits AND ignores any sites.json hosted alongside this page.\n\n` +
    `This cannot be undone.`
  )) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(HUB_STORAGE_KEY);
  sites = JSON.parse(JSON.stringify(SEED_SITES));
  hubs = JSON.parse(JSON.stringify(SEED_HUBS));
  dataSource = 'offline';
  ensureIds();
  updateSourceIndicator();
  render();
  toast(`Reset: loaded ${sites.length} Fabs and ${hubs.length} hubs from built-in plan`);
}

function exportJSON() {
  const cleanSites = sites.map(({_id, ...rest}) => rest);
  const cleanHubs = hubs.map(({_id, ...rest}) => rest);
  const payload = {
    version: 2,
    exported_at: new Date().toISOString(),
    sites: cleanSites,
    hubs: cleanHubs,
    assumptions: assumptions
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date();
  const pad = n => String(n).padStart(2, '0');
  const stamp = `${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}`;
  a.href = url; a.download = `homefab_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported JSON (sites + hubs + assumptions)');
}

function exportCSV() {
  const rows = [['Year','Phase','City','State','Latitude','Longitude','CAPEX_M_override','RevPerHome_K_override','Margin_pct_override']];
  sites.forEach(s => rows.push([
    s.yr, s.phase, s.name, s.state, s.lat, s.lon,
    s.capex ?? '', s.rev_per_home ?? '', s.margin_pct ?? ''
  ]));
  const csv = rows.map(r => r.map(v => {
    const str = String(v == null ? '' : v);
    return /[&quot;,\n]/.test(str) ? '&quot;' + str.replace(/&quot;/g, '&quot;&quot;') + '&quot;' : str;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'homefab_sites.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported CSV (sites only)');
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let importedSites = null;
      let importedHubs = null;
      let importedAsm = null;
      if (file.name.endsWith('.json')) {
        const parsed = JSON.parse(e.target.result);
        // Support two JSON shapes:
        //   - V2 combined: { sites: [...], hubs: [...], assumptions: {...} }
        //   - V1 array of sites
        if (Array.isArray(parsed)) {
          importedSites = parsed;
        } else if (parsed &amp;&amp; typeof parsed === 'object') {
          if (Array.isArray(parsed.sites)) importedSites = parsed.sites;
          if (Array.isArray(parsed.hubs))  importedHubs  = parsed.hubs;
          if (parsed.assumptions &amp;&amp; typeof parsed.assumptions === 'object') importedAsm = parsed.assumptions;
        }
      } else if (file.name.endsWith('.csv')) {
        importedSites = [];
        const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
        const first = lines[0].toLowerCase();
        const startIdx = (first.includes('year') || first.includes('city')) ? 1 : 0;
        for (let i = startIdx; i < lines.length; i++) {
          const parts = parseCSVLine(lines[i]);
          if (parts.length < 6) continue;
          const row = {
            yr: parseInt(parts[0]),
            phase: parseInt(parts[1]),
            name: parts[2],
            state: parts[3].toUpperCase(),
            lat: parseFloat(parts[4]),
            lon: parseFloat(parts[5])
          };
          if (parts[6] &amp;&amp; parts[6].trim() !== '') row.capex = parseFloat(parts[6]);
          if (parts[7] &amp;&amp; parts[7].trim() !== '') row.rev_per_home = parseFloat(parts[7]);
          if (parts[8] &amp;&amp; parts[8].trim() !== '') row.margin_pct = parseFloat(parts[8]);
          importedSites.push(row);
        }
      }

      if (!importedSites || importedSites.length === 0) { toast('No valid rows found'); return; }
      const validSites = importedSites.filter(s => s.name &amp;&amp; s.state &amp;&amp; !isNaN(s.lat) &amp;&amp; !isNaN(s.lon) &amp;&amp; !isNaN(s.yr) &amp;&amp; !isNaN(s.phase));
      if (validSites.length === 0) { toast('No valid rows after validation'); return; }

      sites = validSites;
      ensureIds();
      saveSites();

      let summary = `Imported ${validSites.length} sites`;
      if (importedHubs &amp;&amp; Array.isArray(importedHubs) &amp;&amp; importedHubs.length > 0) {
        const validHubs = importedHubs.filter(h => h.name &amp;&amp; h.city &amp;&amp; h.state &amp;&amp; !isNaN(h.lat) &amp;&amp; !isNaN(h.lon) &amp;&amp; !isNaN(h.opens_yr));
        if (validHubs.length > 0) {
          hubs = validHubs;
          ensureIds();
          saveHubs();
          summary += `, ${validHubs.length} hubs`;
        }
      }
      if (importedAsm) {
        assumptions = { ...DEFAULT_ASSUMPTIONS, ...importedAsm };
        applyAssumptionsToUI();
        saveAssumptions();
        summary += ', assumptions';
      }
      render();
      toast(summary);
    } catch(err) {
      toast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '&quot;' &amp;&amp; line[i+1] === '&quot;') { cur += '&quot;'; i++; }
      else if (c === '&quot;') inQuotes = false;
      else cur += c;
    } else {
      if (c === ',') { result.push(cur); cur = ''; }
      else if (c === '&quot;') inQuotes = true;
      else cur += c;
    }
  }
  result.push(cur);
  return result.map(s => s.trim());
}

// ---- Rendering ----
function render() {
  ensureIds();
  renderTable();
  renderYearFilter();
  renderHubs();
  updateMap();
  updateDashboard();
}

function renderYearFilter() {
  const sel = document.getElementById('filter-year');
  const cur = sel.value;
  const years = [...new Set(sites.map(s => s.yr))].sort((a,b) => a - b);
  sel.innerHTML = '<option value=&quot;&quot;>All years</option>' + years.map(y => `<option value=&quot;${y}&quot;>Year ${y}</option>`).join('');
  sel.value = cur;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const filterText = document.getElementById('filter-text').value.toLowerCase().trim();
  const filterPhase = document.getElementById('filter-phase').value;
  const filterYear = document.getElementById('filter-year').value;

  const visible = sites.filter(s => {
    if (filterText &amp;&amp; !s.name.toLowerCase().includes(filterText) &amp;&amp; !s.state.toLowerCase().includes(filterText)) return false;
    if (filterPhase &amp;&amp; String(s.phase) !== filterPhase) return false;
    if (filterYear &amp;&amp; String(s.yr) !== filterYear) return false;
    return true;
  });

  document.getElementById('row-count').textContent = visible.length === sites.length ? `${sites.length} total` : `${visible.length} of ${sites.length}`;

  // Pre-compute nearest hub for each visible site (active hubs considered across all years for display)
  tbody.innerHTML = visible.map(s => {
    const activeH = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
    const assign = assignHub(s, activeH);
    const hubShort = assign ? (assign.hub.city.split(/[\s-]/)[0]) : '—';
    const capexVal = (s.capex != null &amp;&amp; s.capex !== '') ? s.capex : '';
    const revVal   = (s.rev_per_home != null &amp;&amp; s.rev_per_home !== '') ? s.rev_per_home : '';
    const margVal  = (s.margin_pct != null &amp;&amp; s.margin_pct !== '') ? s.margin_pct : '';
    const hasCoords = !isNaN(s.lat) &amp;&amp; !isNaN(s.lon) &amp;&amp; s.lat !== null &amp;&amp; s.lon !== null;
    const g = geocode(s.name, s.state);
    // &quot;ok&quot; if coords are set AND they match a geocode DB entry for the current name/state
    // &quot;warn&quot; if no coords, or coords don't match a known city (user manually entered or geocode miss)
    let locStatus = 'ok';
    let locTitle = `${s.lat?.toFixed?.(2)}, ${s.lon?.toFixed?.(2)} (click to edit)`;
    if (!hasCoords) {
      locStatus = 'warn';
      locTitle = 'No coordinates — click to set manually';
    } else if (!g) {
      locStatus = 'warn';
      locTitle = `&quot;${s.name}, ${s.state}&quot; not in built-in database — coords are manual (${s.lat.toFixed(2)}, ${s.lon.toFixed(2)}). Click to edit.`;
    }
    return `
    <tr data-id=&quot;${s._id}&quot; draggable=&quot;true&quot; onmouseenter=&quot;highlightDot('${s._id}')&quot; onmouseleave=&quot;highlightDot(null)&quot;>
      <td><span class=&quot;drag-handle&quot; title=&quot;Drag to reorder&quot;>⋮⋮</span></td>
      <td><input type=&quot;number&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;${s.yr}&quot; onchange=&quot;updateField('${s._id}','yr',this.value)&quot;></td>
      <td>
        <select onchange=&quot;updateField('${s._id}','phase',this.value)&quot;>
          <option value=&quot;1&quot; ${s.phase===1?'selected':''}>1</option>
          <option value=&quot;2&quot; ${s.phase===2?'selected':''}>2</option>
          <option value=&quot;3&quot; ${s.phase===3?'selected':''}>3</option>
        </select>
      </td>
      <td><input type=&quot;text&quot; value=&quot;${escapeHtml(s.name)}&quot; onchange=&quot;updateField('${s._id}','name',this.value)&quot;></td>
      <td><input type=&quot;text&quot; maxlength=&quot;2&quot; value=&quot;${escapeHtml(s.state)}&quot; style=&quot;text-transform:uppercase&quot; onchange=&quot;updateField('${s._id}','state',this.value)&quot;></td>
      <td style=&quot;text-align:center&quot;><span class=&quot;loc-pin ${locStatus}&quot; title=&quot;${escapeHtml(locTitle)}&quot; onclick=&quot;openCoordPopover(event, '${s._id}', 'site')&quot;>${locStatus === 'ok' ? '📍' : '⚠'}</span></td>
      <td><input type=&quot;number&quot; step=&quot;0.1&quot; class=&quot;override&quot; data-dirty=&quot;${capexVal!==''?1:0}&quot; placeholder=&quot;${assumptions.fab_capex_M}&quot; value=&quot;${capexVal}&quot; onchange=&quot;updateField('${s._id}','capex',this.value)&quot; title=&quot;CAPEX in $M — blank = default&quot;></td>
      <td><input type=&quot;number&quot; step=&quot;1&quot; class=&quot;override&quot; data-dirty=&quot;${revVal!==''?1:0}&quot; placeholder=&quot;${assumptions.rev_per_home_K}&quot; value=&quot;${revVal}&quot; onchange=&quot;updateField('${s._id}','rev_per_home',this.value)&quot; title=&quot;Home revenue in $K&quot;></td>
      <td><input type=&quot;number&quot; step=&quot;0.1&quot; class=&quot;override&quot; data-dirty=&quot;${margVal!==''?1:0}&quot; placeholder=&quot;${assumptions.fab_margin_pct}&quot; value=&quot;${margVal}&quot; onchange=&quot;updateField('${s._id}','margin_pct',this.value)&quot; title=&quot;Fab margin %&quot;></td>
      <td style=&quot;font-size:11px; color:var(--text-secondary); text-align:center&quot; title=&quot;${assign ? `Assigned to ${assign.hub.name}, ${Math.round(assign.dist_mi)} mi` : 'No active hub'}&quot;>${hubShort}</td>
      <td class=&quot;row-actions&quot;>
        <button class=&quot;icon-btn success&quot; title=&quot;Duplicate&quot; onclick=&quot;duplicateRow('${s._id}')&quot;>⎘</button>
        <button class=&quot;icon-btn&quot; title=&quot;Re-geocode from city name&quot; onclick=&quot;regeocodeRow('${s._id}')&quot;>⌖</button>
        <button class=&quot;icon-btn danger&quot; title=&quot;Delete&quot; onclick=&quot;deleteRow('${s._id}')&quot;>✕</button>
      </td>
    </tr>`;
  }).join('');

  attachDragHandlers();
}

function renderHubs() {
  const tbody = document.getElementById('hub-tbody');
  if (!tbody) return;
  document.getElementById('hub-count').textContent = hubs.length + ' hubs';
  // For each hub, count assigned Fabs (using global list, nearest-hub assignment)
  const fabCounts = {};
  hubs.forEach(h => fabCounts[h._id] = 0);
  sites.forEach(s => {
    const active = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
    const a = assignHub(s, active);
    if (a) fabCounts[a.hub._id] = (fabCounts[a.hub._id] || 0) + 1;
  });

  tbody.innerHTML = hubs.map(h => {
    const capVal = (h.capex != null &amp;&amp; h.capex !== '') ? h.capex : '';
    const hasCoords = !isNaN(h.lat) &amp;&amp; !isNaN(h.lon) &amp;&amp; h.lat !== null &amp;&amp; h.lon !== null;
    const g = geocode(h.city, h.state);
    let locStatus = 'ok';
    let locTitle = `${h.lat?.toFixed?.(2)}, ${h.lon?.toFixed?.(2)} (click to edit)`;
    if (!hasCoords) {
      locStatus = 'warn';
      locTitle = 'No coordinates — click to set manually';
    } else if (!g) {
      locStatus = 'warn';
      locTitle = `&quot;${h.city}, ${h.state}&quot; not in built-in database — coords are manual. Click to edit.`;
    }
    return `
    <tr data-hubid=&quot;${h._id}&quot;>
      <td><input type=&quot;number&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;${h.opens_yr}&quot; onchange=&quot;updateHubField('${h._id}','opens_yr',this.value)&quot;></td>
      <td><input type=&quot;text&quot; value=&quot;${escapeHtml(h.name)}&quot; onchange=&quot;updateHubField('${h._id}','name',this.value)&quot;></td>
      <td><input type=&quot;text&quot; value=&quot;${escapeHtml(h.city)}&quot; onchange=&quot;updateHubField('${h._id}','city',this.value)&quot;></td>
      <td><input type=&quot;text&quot; maxlength=&quot;2&quot; value=&quot;${escapeHtml(h.state)}&quot; style=&quot;text-transform:uppercase&quot; onchange=&quot;updateHubField('${h._id}','state',this.value)&quot;></td>
      <td style=&quot;text-align:center&quot;><span class=&quot;loc-pin ${locStatus}&quot; title=&quot;${escapeHtml(locTitle)}&quot; onclick=&quot;openCoordPopover(event, '${h._id}', 'hub')&quot;>${locStatus === 'ok' ? '📍' : '⚠'}</span></td>
      <td><input type=&quot;number&quot; step=&quot;1&quot; class=&quot;override&quot; data-dirty=&quot;${capVal!==''?1:0}&quot; placeholder=&quot;${assumptions.hub_capex_M}&quot; value=&quot;${capVal}&quot; onchange=&quot;updateHubField('${h._id}','capex',this.value)&quot; title=&quot;$M&quot;></td>
      <td style=&quot;text-align:center; font-size:12px; color:var(--text-secondary)&quot;>${fabCounts[h._id] || 0}</td>
      <td class=&quot;row-actions&quot;>
        <button class=&quot;icon-btn danger&quot; title=&quot;Delete hub&quot; onclick=&quot;deleteHub('${h._id}')&quot;>✕</button>
      </td>
    </tr>`;
  }).join('');
}

function updateHubField(id, field, value) {
  const h = hubs.find(x => x._id === id);
  if (!h) return;
  if (field === 'opens_yr' || field === 'lat' || field === 'lon' || field === 'capex') {
    if (field === 'capex' &amp;&amp; (value === '' || value == null)) { h.capex = ''; }
    else {
      const n = parseFloat(value);
      if (isNaN(n)) return;
      h[field] = n;
    }
  } else if (field === 'state') {
    h[field] = (value || '').toUpperCase().slice(0, 2);
  } else {
    h[field] = (value || '').trim();
  }

  // Auto-geocode when city or state changes
  if (field === 'city' || field === 'state') {
    const g = geocode(h.city, h.state);
    if (g) {
      h.lat = g.lat;
      h.lon = g.lon;
    }
  }

  saveHubs();
  renderTable();
  renderHubs();
  updateMap();
  updateDashboard();
}

function deleteHub(id) {
  if (hubs.length <= 1) { toast('At least one hub required'); return; }
  const h = hubs.find(x => x._id === id);
  if (!h) return;
  if (!confirm(`Delete hub &quot;${h.name}&quot;?`)) return;
  hubs = hubs.filter(x => x._id !== id);
  saveHubs();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&amp;<>&quot;']/g, c => ({'&amp;':'&amp;amp;','<':'&amp;lt;','>':'&amp;gt;','&quot;':'&amp;quot;',&quot;'&quot;:'&amp;#39;'}[c]));
}

// ---- Coord popover (pin click) ----
function openCoordPopover(event, id, type) {
  event.stopPropagation();
  closeCoordPopover();
  const target = type === 'hub' ? hubs.find(h => h._id === id) : sites.find(s => s._id === id);
  if (!target) return;
  const pop = document.createElement('div');
  pop.className = 'coord-popover';
  pop.id = 'coord-popover';
  pop.innerHTML = `
    <div class=&quot;cp-field&quot;><label>Lat</label><input type=&quot;number&quot; step=&quot;0.01&quot; id=&quot;cp-lat&quot; value=&quot;${target.lat ?? ''}&quot;></div>
    <div class=&quot;cp-field&quot;><label>Lon</label><input type=&quot;number&quot; step=&quot;0.01&quot; id=&quot;cp-lon&quot; value=&quot;${target.lon ?? ''}&quot;></div>
    <button onclick=&quot;saveCoordPopover('${id}','${type}')&quot;>Save</button>
    <button onclick=&quot;closeCoordPopover()&quot;>Cancel</button>
  `;
  const rect = event.currentTarget.getBoundingClientRect();
  pop.style.top  = (window.scrollY + rect.bottom + 4) + 'px';
  pop.style.left = (window.scrollX + rect.left - 8) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => {
    document.addEventListener('click', closeCoordPopoverOnOutsideClick);
  }, 50);
}

function closeCoordPopoverOnOutsideClick(e) {
  const pop = document.getElementById('coord-popover');
  if (pop &amp;&amp; !pop.contains(e.target)) closeCoordPopover();
}

function closeCoordPopover() {
  const pop = document.getElementById('coord-popover');
  if (pop) pop.remove();
  document.removeEventListener('click', closeCoordPopoverOnOutsideClick);
}

function saveCoordPopover(id, type) {
  const lat = parseFloat(document.getElementById('cp-lat').value);
  const lon = parseFloat(document.getElementById('cp-lon').value);
  if (isNaN(lat) || isNaN(lon)) { toast('Both lat and lon must be numbers'); return; }
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { toast('Invalid coordinate range'); return; }
  if (type === 'hub') {
    const h = hubs.find(x => x._id === id);
    if (!h) return;
    h.lat = lat; h.lon = lon;
    saveHubs();
  } else {
    const s = sites.find(x => x._id === id);
    if (!s) return;
    s.lat = lat; s.lon = lon;
    saveSites();
  }
  closeCoordPopover();
  renderTable();
  renderHubs();
  updateMap();
  updateDashboard();
  toast('Coordinates updated');
}

function duplicateRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const copy = { ...s, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), name: s.name + ' (copy)' };
  const idx = sites.findIndex(x => x._id === id);
  sites.splice(idx + 1, 0, copy);
  saveSites();
  render();
}

function regeocodeRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const g = geocode(s.name, s.state);
  if (g) {
    s.lat = g.lat; s.lon = g.lon;
    saveSites(); render();
    toast(`Re-geocoded ${s.name}`);
  } else {
    toast(`No match for &quot;${s.name}, ${s.state}&quot;`);
  }
}

// ---- Drag &amp; drop reorder ----
let dragId = null;
function attachDragHandlers() {
  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      dragId = row.getAttribute('data-id');
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
      row.classList.add('drop-target');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = row.getAttribute('data-id');
      if (dragId &amp;&amp; targetId &amp;&amp; dragId !== targetId) {
        const from = sites.findIndex(s => s._id === dragId);
        const to = sites.findIndex(s => s._id === targetId);
        if (from !== -1 &amp;&amp; to !== -1) {
          const [moved] = sites.splice(from, 1);
          sites.splice(to, 0, moved);
          saveSites();
          render();
        }
      }
      row.classList.remove('drop-target');
    });
  });
}
