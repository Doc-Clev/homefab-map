<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>FBX HomeFab</title><style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column;background:#f5f4ef}
@media(prefers-color-scheme:dark){body{background:#1a1916}}
#nav{display:flex;align-items:center;height:44px;min-height:44px;flex-shrink:0;background:#fff;border-bottom:1px solid rgba(0,0,0,0.12);box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:0 14px;position:relative;z-index:10}
@media(prefers-color-scheme:dark){#nav{background:#1a1916;border-bottom-color:rgba(255,255,255,0.1)}}
.nav-brand{font-size:13px;font-weight:600;letter-spacing:-0.01em;color:#1a1a1a;margin-right:12px;white-space:nowrap}
@media(prefers-color-scheme:dark){.nav-brand{color:#f0efea}}
.nav-sep{width:1px;height:20px;background:rgba(0,0,0,0.13);margin:0 4px;flex-shrink:0}
@media(prefers-color-scheme:dark){.nav-sep{background:rgba(255,255,255,0.13)}}
.nav-tab{display:flex;align-items:center;padding:0 10px;height:44px;border:none;border-bottom:2.5px solid transparent;background:none;cursor:pointer;font-size:12.5px;font-weight:500;color:#5f5e5a;white-space:nowrap;font-family:inherit;transition:color .12s,border-color .12s}
.nav-tab:hover{color:#1a1a1a}
@media(prefers-color-scheme:dark){.nav-tab{color:#b4b2a9}.nav-tab:hover{color:#f0efea}}
.nav-spacer{flex:1}
.nav-actions{display:flex;align-items:center;gap:8px}
#save-status{display:none;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:#f0f9f0;color:#285A22;border:1px solid #c3e0c3}
#save-status.saving{background:#FFF8E7;color:#854F0B;border-color:#f0d080}
#save-status.error{background:#FFF0F0;color:#8B1A1A;border-color:#f0c0c0}
#save-status.show{display:flex}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

@keyframes pulse{from{opacity:.3}to{opacity:1}}
#nav-save-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;background:#185FA5;color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
#nav-save-btn:hover{opacity:.88}
#nav-save-btn:disabled{opacity:.5;cursor:not-allowed}
#nav-ver-btn{padding:5px 11px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:transparent;color:#5f5e5a;font-size:12px;cursor:pointer;font-family:inherit}
@media(prefers-color-scheme:dark){#nav-ver-btn{border-color:rgba(255,255,255,0.15);color:#b4b2a9}}
#frame-container{flex:1;position:relative;overflow:hidden}
.page-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
#ver-panel{display:none;position:absolute;top:44px;right:12px;width:300px;max-height:400px;background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:20;overflow:hidden}
@media(prefers-color-scheme:dark){#ver-panel{background:#26231f;border-color:rgba(255,255,255,0.1)}}
#ver-panel-head{padding:10px 14px 8px;border-bottom:1px solid rgba(0,0,0,0.08);font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#888780;font-weight:600}
#ver-list{overflow-y:auto;max-height:340px;padding:4px 0}
.ver-item{padding:9px 14px;border-bottom:1px solid rgba(0,0,0,0.05)}
.ver-item:last-child{border-bottom:none}
.ver-name{font-weight:600;font-size:13px;color:#1a1a1a;margin-bottom:2px}
@media(prefers-color-scheme:dark){.ver-name{color:#e8e4db}}
.ver-ts{color:#888780;font-size:11px}
.ver-empty{padding:20px 14px;color:#888780;font-style:italic;font-size:13px;text-align:center}
#save-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.4);align-items:center;justify-content:center}
.svm-box{background:#fff;border-radius:10px;padding:24px 28px;width:90%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,0.18);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
@media(prefers-color-scheme:dark){.svm-box{background:#26231f;color:#e8e4db}}
.svm-box h2{font-size:15px;font-weight:600;margin-bottom:2px}
.svm-subtitle{font-size:12px;color:#888780;margin-bottom:20px}
.svm-box label{display:block;font-size:12px;color:#888780;margin-bottom:5px;font-weight:500}
.svm-required{color:#C00000}
.svm-box input[type=text]{width:100%;padding:9px 11px;border:1.5px solid rgba(0,0,0,0.18);border-radius:6px;font-size:14px;font-family:inherit;background:#faf9f7;color:#1a1a1a;transition:border-color .15s}
@media(prefers-color-scheme:dark){.svm-box input[type=text]{background:#1a1916;color:#e8e4db;border-color:rgba(255,255,255,0.2)}}
.svm-box input.invalid{border-color:#C00000!important}
.svm-box input:focus{outline:none;border-color:#185FA5}
#svm-error{font-size:11px;color:#C00000;min-height:14px;margin-top:4px}
.svm-hint{margin-top:14px;padding:10px 12px;background:#f5f4ef;border-radius:6px;font-size:12px;color:#5f5e5a;line-height:1.5}
@media(prefers-color-scheme:dark){.svm-hint{background:#2d2a25;color:#b4b2a9}}
.svm-hint strong{color:#1a1a1a}
@media(prefers-color-scheme:dark){.svm-hint strong{color:#e8e4db}}
.svm-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.svm-actions button{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1.5px solid rgba(0,0,0,0.15)}
#svm-cancel{background:#f5f4ef;color:#1a1a1a}
@media(prefers-color-scheme:dark){#svm-cancel{background:#2d2a25;color:#e8e4db;border-color:rgba(255,255,255,0.15)}}
#svm-commit{background:#185FA5;color:#fff;border-color:#185FA5}
#svm-commit:hover{opacity:.88}
#svm-commit:disabled{opacity:.5;cursor:not-allowed}
#nav-toast{position:fixed;bottom:20px;right:20px;z-index:200;background:#fff;border-left:3px solid #639922;border-radius:6px;padding:10px 16px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,0.12);opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;max-width:340px}
@media(prefers-color-scheme:dark){#nav-toast{background:#26231f;color:#e8e4db}}

<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js&quot;></script><style>*{box-sizing:border-box}body{margin:0}
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4ef;
    --bg-tertiary: #faf9f5;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.25);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --p1: #639922;
    --p2: #BA7517;
    --p3: #A32D2D;
    --p1-bg: #EAF3DE;
    --p2-bg: #FAEEDA;
    --p3-bg: #FCEBEB;
    --danger: #C00000;
    --success: #0F6E56;
    --info: #185FA5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2a;
      --bg-tertiary: #222220;
      --text-primary: #f0efea;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border-tertiary: rgba(255,255,255,0.15);
      --border-secondary: rgba(255,255,255,0.3);
      --p1-bg: #27500A;
      --p2-bg: #633806;
      --p3-bg: #501313;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    margin: 0;
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  header { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 20px; font-weight: 500; margin: 0; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 6px; vertical-align: 1px; }
  .badge.synced { background: #D8EAD5; color: #285A22; }
  .badge.local { background: #FAEEDA; color: #854F0B; }
  .badge.offline { background: #F0F0F0; color: #5F5E5A; }
  @media (prefers-color-scheme: dark) {
    .badge.synced { background: #173404; color: #C0DD97; }
    .badge.local { background: #412402; color: #FAC775; }
    .badge.offline { background: #2C2C2A; color: #B4B2A9; }
  }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--bg-primary); border: 0.5px solid var(--border-secondary);
    color: var(--text-primary); padding: 6px 12px; border-radius: var(--border-radius-md);
    font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--info); color: white; border-color: var(--info); }
  button.primary:hover { opacity: 0.9; background: var(--info); }
  button.danger { color: var(--danger); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 0 0 16px; }
  .stat { background: var(--bg-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin: 0 0 2px; }
  .stat-value { font-size: 18px; font-weight: 500; color: var(--text-primary); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
  }

  .map-panel { position: sticky; top: 16px; }
  .map-controls { display: flex; align-items: center; gap: 12px; margin: 0 0 12px; flex-wrap: wrap; font-size: 13px; color: var(--text-secondary); }
  .map-controls input[type=range] { flex: 1; min-width: 150px; }
  .yr-readout { min-width: 24px; font-weight: 500; color: var(--text-primary); font-size: 14px; }
  .map { position: relative; background: var(--bg-secondary); border-radius: var(--border-radius-lg); padding: 8px; }
  .map svg { width: 100%; height: auto; display: block; }
  .state { fill: var(--bg-primary); stroke: var(--border-secondary); stroke-width: 0.5; }
  .dot { stroke: var(--bg-primary); stroke-width: 0.6; cursor: pointer; transition: r 0.2s, opacity 0.2s; }
  .dot.p1 { fill: var(--p1); }
  .dot.p2 { fill: var(--p2); }
  .dot.p3 { fill: var(--p3); }
  .dot.dim { opacity: 0.15; }
  .dot.hl { stroke: var(--text-primary); stroke-width: 2; r: 8; }
  .tip {
    position: absolute; background: var(--bg-primary); border: 0.5px solid var(--border-secondary);
    border-radius: var(--border-radius-md); padding: 7px 11px; font-size: 12px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; white-space: nowrap;
    color: var(--text-primary); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .tip strong { font-weight: 500; }
  .tip .meta { color: var(--text-secondary); font-size: 11px; margin-top: 1px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); margin: 12px 0 0; align-items: center; justify-content: center; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Table panel */
  .table-panel { background: var(--bg-secondary); border-radius: var(--border-radius-lg); padding: 12px; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin: 0 0 10px; flex-wrap: wrap; gap: 8px; }
  .table-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin: 0; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 10px; align-items: center; font-size: 12px; color: var(--text-secondary); }
  .filter-row select, .filter-row input { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--text-primary); font-family: inherit; }

  .table-wrap { max-height: 620px; overflow-y: auto; border-radius: var(--border-radius-md); background: var(--bg-primary); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; background: var(--bg-secondary); z-index: 2; }
  th {
    text-align: left; font-weight: 500; font-size: 11px; color: var(--text-secondary);
    padding: 8px 6px; border-bottom: 0.5px solid var(--border-tertiary);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  td { padding: 3px 4px; border-bottom: 0.5px solid var(--border-tertiary); vertical-align: middle; }
  tr:hover td { background: var(--bg-secondary); }
  tr.selected td { background: var(--p2-bg); }

  td input, td select {
    width: 100%; background: transparent; border: 0.5px solid transparent;
    padding: 4px 6px; border-radius: 4px; font-size: 12px; color: var(--text-primary); font-family: inherit;
    min-height: 26px;
  }
  td input:hover, td select:hover { border-color: var(--border-tertiary); background: var(--bg-primary); }
  td input:focus, td select:focus { outline: none; border-color: var(--info); background: var(--bg-primary); }
  td input[type=number] { text-align: right; }

  .drag-handle { cursor: grab; color: var(--text-tertiary); user-select: none; padding: 0 4px; font-size: 14px; line-height: 1; }
  .drag-handle:active { cursor: grabbing; }
  tr.dragging { opacity: 0.4; }
  tr.drop-target td { border-top: 2px solid var(--info); }

  .phase-badge { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 10px; font-weight: 500; color: white; }
  .phase-badge.p1 { background: var(--p1); }
  .phase-badge.p2 { background: var(--p2); }
  .phase-badge.p3 { background: var(--p3); }

  .row-actions { display: flex; gap: 2px; white-space: nowrap; }
  .icon-btn { background: transparent; border: none; padding: 4px 6px; cursor: pointer; color: var(--text-secondary); font-size: 13px; border-radius: 4px; }
  .icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .icon-btn.danger:hover { color: var(--danger); }
  .icon-btn.success:hover { color: var(--success); }

  .add-row-form {
    background: var(--bg-primary); border: 0.5px solid var(--border-tertiary);
    border-radius: var(--border-radius-md); padding: 10px; margin: 10px 0 0;
    display: grid; grid-template-columns: 60px 1fr 70px 70px 90px 90px auto; gap: 6px; align-items: end;
  }
  @media (max-width: 700px) { .add-row-form { grid-template-columns: 1fr 1fr; } }
  .form-field label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin: 0 0 2px; }
  .form-field input, .form-field select {
    width: 100%; background: var(--bg-secondary); border: 0.5px solid var(--border-tertiary);
    padding: 5px 7px; border-radius: 5px; font-size: 12px; color: var(--text-primary); font-family: inherit;
  }
  .form-field input:focus, .form-field select:focus { outline: none; border-color: var(--info); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: var(--bg-primary);
    padding: 8px 16px; border-radius: var(--border-radius-md); font-size: 13px;
    opacity: 0; transition: opacity 0.2s; z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hint { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-left: 6px; }
  .phase-hint { font-size: 10px; color: var(--text-tertiary); margin-left: 4px; }

  .row-count-pill { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); padding: 2px 8px; border-radius: 10px; font-size: 11px; color: var(--text-secondary); }

  /* ---- FINANCIAL DASHBOARD ---- */
  .dashboard { background: var(--bg-secondary); border-radius: var(--border-radius-lg); padding: 16px 18px; margin: 0 0 16px; }
  .dash-header { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; margin: 0 0 12px; flex-wrap: wrap; }
  .dash-year-line { font-size: 15px; color: var(--text-secondary); }
  .dash-year { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .dash-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .unit-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .unit-panels { grid-template-columns: 1fr; } }
  .unit-panel { background: var(--bg-primary); border-radius: var(--border-radius-md); padding: 14px 16px; border-left: 4px solid; }
  .unit-panel.core { border-color: #0F6E56; }
  .unit-panel.fab  { border-color: var(--p2); }
  .unit-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 10px; }
  .unit-name { font-size: 16px; font-weight: 500; }
  .unit-panel.core .unit-name { color: #0F6E56; }
  .unit-panel.fab  .unit-name { color: #854F0B; }
  @media (prefers-color-scheme: dark) {
    .unit-panel.core .unit-name { color: #5DCAA5; }
    .unit-panel.fab  .unit-name { color: #FAC775; }
  }
  .unit-tag { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
  .unit-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px 12px; }
  @media (max-width: 700px) { .unit-metrics { grid-template-columns: repeat(2, 1fr); } }
  .metric .m-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.2; margin: 0 0 2px; }
  .metric .m-value { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.15; }
  .metric.big { grid-column: span 2; }
  .metric.big .m-value { font-size: 20px; }

  /* ---- ASSUMPTIONS PANEL ---- */
  .assumption-panel { background: var(--bg-primary); border-radius: var(--border-radius-md); padding: 12px 14px; margin: 0 0 12px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; }
  @media (max-width: 900px) { .assumption-panel { grid-template-columns: 1fr; } }
  .asm-group-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-secondary); font-weight: 500; margin: 0 0 8px; }
  .asm-row { display: flex; align-items: center; gap: 8px; margin: 0 0 4px; font-size: 12px; }
  .asm-row label { flex: 1; color: var(--text-secondary); }
  .asm-row input { width: 70px; background: var(--bg-secondary); border: 0.5px solid var(--border-tertiary); padding: 4px 6px; border-radius: 5px; color: var(--text-primary); font-family: inherit; font-size: 12px; text-align: right; }
  .asm-reset { align-self: flex-end; }

  /* ---- MAP HUB MARKERS ---- */
  .hub { fill: #0F6E56; stroke: var(--bg-primary); stroke-width: 1.5; cursor: pointer; transition: opacity 0.2s; }
  .hub.dim { opacity: 0.15; }
  .hub-range { fill: #0F6E56; fill-opacity: 0.15; stroke: #0F6E56; stroke-opacity: 0.35; stroke-width: 0.75; pointer-events: none; transition: opacity 0.2s; }

/* ============== ID helpers ============== */
function makeId(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function ensureIds() {
  sites.forEach(s => { if (!s._id) s._id = makeId('s'); });
  hubs.forEach(h => { if (!h._id) h._id = makeId('h'); });
}

function normalize(arr) {
  return arr.map(({_id, ...rest}) => rest);
}

function arraysEqual(a, b) {
  if (!a || !b || a.length !== b.length) return false;
  return JSON.stringify(normalize(a)) === JSON.stringify(normalize(b));
}

/* ============== Geometry / hub assignment ============== */
function haversineMi(lat1, lon1, lat2, lon2) {
  const R = 3959;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function assignHub(site, activeHubs) {
  if (!activeHubs || activeHubs.length === 0) return null;
  let best = null, bestD = Infinity;
  for (const h of activeHubs) {
    const d = haversineMi(site.lat, site.lon, h.lat, h.lon);
    if (d < bestD) { bestD = d; best = h; }
  }
  return best ? { hub: best, dist_mi: bestD } : null;
}

/* ============== Per-site effective values (override or default) ============== */
function fabCapex(s)    { return (s.capex != null &amp;&amp; s.capex !== '') ? +s.capex : assumptions.fab_capex_M; }
function fabRevPer(s)   { return (s.rev_per_home != null &amp;&amp; s.rev_per_home !== '') ? +s.rev_per_home : assumptions.rev_per_home_K; }
function fabMarginPct(s){ return (s.margin_pct != null &amp;&amp; s.margin_pct !== '') ? +s.margin_pct : assumptions.fab_margin_pct; }
function hubCapex(h)    { return (h.capex != null &amp;&amp; h.capex !== '') ? +h.capex : assumptions.hub_capex_M; }

/* ============== Ramp assumption: Fab reaches ~full output after 1 yr ============== */
/* Homes delivered by a given Fab in a given year:
   - Opening year: half mature output (mid-year average)
   - Subsequent years: full mature output
   Mature output is inherited from the 10-Year Roadmap — we use year-10 output (400 homes/Fab) as a ceiling.
   For simplicity and consistency with the spreadsheet model, we approximate via a shared curve: */
function fabMatureOutputForYear(s) {
  // Same schedule as the spreadsheet model: P1=180, P2=240, P3 ramps 320→400
  if (s.phase === 1) return 180;
  if (s.phase === 2) return 240;
  // Phase 3 ramp by opens_yr
  const ramp = { 6: 320, 7: 360, 8: 380, 9: 400, 10: 400 };
  return ramp[s.yr] || 400;
}

function homesFromSiteByYear(s, year) {
  if (year < s.yr) return 0;
  const mature = fabMatureOutputForYear(s);
  if (year === s.yr) return mature / 2;  // opens mid-year
  return mature;
}

/* ============== ECONOMICS ENGINE ============== */
function computeEconomics(year) {
  const activeHubsAtYear = hubs.filter(h => h.opens_yr <= year);
  const activeHubsCumul  = hubs;  // for total committed capex by year 10 — nuance: use <= year
  const openedSites = sites.filter(s => s.yr <= year);

  // Aggregate per-year homes delivered, for current year AND cumulative through year
  let fab_rev_cum = 0, fab_ni_cum = 0, homes_cum = 0, fab_capex_cum = 0;
  let fab_rev_yr = 0, homes_yr = 0, fab_runrate_yr = 0;

  for (const s of openedSites) {
    const rev_per = fabRevPer(s);   // $K
    const margin = fabMarginPct(s); // %
    const sCapex = fabCapex(s);     // $M

    // CAPEX booked in the year of opening (≤ year)
    fab_capex_cum += sCapex;

    // Sum homes delivered by this site across years from s.yr to current year
    for (let y = s.yr; y <= year; y++) {
      const h = homesFromSiteByYear(s, y);
      if (y === year) homes_yr += h;
      homes_cum += h;
      const rev = h * rev_per * 1000;  // dollars
      fab_rev_cum += rev;
      fab_ni_cum  += rev * (margin / 100);
      if (y === year) fab_rev_yr += rev;
    }
    // Annual run-rate (mature, for display at year-end)
    const mature = fabMatureOutputForYear(s);
    fab_runrate_yr += mature;
  }

  // ---- Core ----
  const hub_capex_cum = activeHubsAtYear.reduce((sum, h) => sum + hubCapex(h), 0) * 1e6;

  const kit_sales_cum  = homes_cum * assumptions.kit_price_K * 1000;
  const royalty_cum    = homes_cum * (assumptions.rev_per_home_K * 1000) * (assumptions.royalty_pct / 100);
  const core_rev_cum   = kit_sales_cum + royalty_cum;

  const kit_gp_cum     = kit_sales_cum * (assumptions.core_margin_pct / 100);  // Core gross profit on kits
  const core_opex_cum  = core_rev_cum * (assumptions.core_opex_pct / 100);
  const core_profit_cum = kit_gp_cum + royalty_cum - core_opex_cum;

  const core_roi = hub_capex_cum > 0 ? (core_profit_cum / hub_capex_cum) : 0;
  const fab_capex_cum_dollars = fab_capex_cum * 1e6;
  const fab_roi = fab_capex_cum_dollars > 0 ? (fab_ni_cum / fab_capex_cum_dollars) : 0;

  const states = new Set(openedSites.map(s => s.state));

  return {
    year,
    // Fab
    fab_count: openedSites.length,
    fab_capex: fab_capex_cum_dollars,
    fab_rev_cum,
    fab_ni_cum,
    fab_runrate_homes: fab_runrate_yr,
    fab_runrate_rev: fab_runrate_yr * assumptions.rev_per_home_K * 1000,
    fab_roi,
    fab_states: states.size,
    homes_cum,
    homes_yr,
    // Core
    hubs_active: activeHubsAtYear.length,
    core_capex: hub_capex_cum,
    core_rev_cum,
    kit_sales_cum,
    royalty_cum,
    core_profit_cum,
    core_roi
  };
}

/* ============== Formatters ============== */
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return '$' + (n/1e9).toFixed(abs >= 1e10 ? 1 : 2) + 'B';
  if (abs >= 1e6) return '$' + (n/1e6).toFixed(abs >= 1e8 ? 0 : 1) + 'M';
  if (abs >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function fmtNum(n) { return (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString('en-US'); }
function fmtPct(n) { return (n == null || isNaN(n)) ? '—' : (n * 100).toFixed(0) + '%'; }

/* ============== Assumptions persistence ============== */
function loadAssumptions() {
  try {
    const raw = localStorage.getItem(ASM_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      assumptions = { ...DEFAULT_ASSUMPTIONS, ...parsed };
    }
  } catch(e) {}
}
/* ============== Viewer mode guard ==============
   When running as the public viewer (body.viewer class), all localStorage
   writes are no-ops. Guarantees clean reads on every page load. */
const IS_VIEWER = document.body &amp;&amp; document.body.classList.contains('viewer');

function saveAssumptions() {
  if (IS_VIEWER) return;
  try { localStorage.setItem(ASM_STORAGE_KEY, JSON.stringify(assumptions)); } catch(e) {}
}
function applyAssumptionsToUI() {
  const map = {
    'asm-fab-capex': 'fab_capex_M',
    'asm-rev': 'rev_per_home_K',
    'asm-margin': 'fab_margin_pct',
    'asm-hub-capex': 'hub_capex_M',

    'asm-core-margin': 'core_margin_pct',
    'asm-royalty': 'royalty_pct',
    'asm-core-opex': 'core_opex_pct'
  };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.value = assumptions[key];
  });
}
function updateAssumptions() {
  assumptions.fab_capex_M   = +document.getElementById('asm-fab-capex').value || DEFAULT_ASSUMPTIONS.fab_capex_M;
  assumptions.rev_per_home_K= +document.getElementById('asm-rev').value || DEFAULT_ASSUMPTIONS.rev_per_home_K;
  assumptions.fab_margin_pct= +document.getElementById('asm-margin').value || DEFAULT_ASSUMPTIONS.fab_margin_pct;
  assumptions.hub_capex_M   = +document.getElementById('asm-hub-capex').value || DEFAULT_ASSUMPTIONS.hub_capex_M;
  assumptions.kit_price_K   = +document.getElementById('asm-kit-price').value || DEFAULT_ASSUMPTIONS.kit_price_K;
  assumptions.core_margin_pct=+document.getElementById('asm-core-margin').value || DEFAULT_ASSUMPTIONS.core_margin_pct;
  assumptions.royalty_pct   = +document.getElementById('asm-royalty').value || DEFAULT_ASSUMPTIONS.royalty_pct;
  assumptions.core_opex_pct = +document.getElementById('asm-core-opex').value || DEFAULT_ASSUMPTIONS.core_opex_pct;
  saveAssumptions();
  updateDashboard();
  renderTable();

}

  updateDashboard();

/* ============== Hub persistence ============== */
function loadHubs() {
  try {
    const raw = localStorage.getItem(HUB_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) &amp;&amp; parsed.length) return parsed;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(SEED_HUBS));
}
function saveHubs() {
  if (IS_VIEWER) return;
  try { localStorage.setItem(HUB_STORAGE_KEY, JSON.stringify(hubs)); } catch(e) {}
}

async function fetchCanonical() {
  try {
    const resp = await fetch('sites.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    // V2 shape: { sites: [...], hubs: [...], assumptions: {...} }
    if (data &amp;&amp; !Array.isArray(data) &amp;&amp; Array.isArray(data.sites)) {
      if (Array.isArray(data.hubs) &amp;&amp; data.hubs.length > 0) {
        // Only overwrite hubs if localStorage doesn't have custom ones
        const hubRaw = localStorage.getItem(HUB_STORAGE_KEY);
        if (!hubRaw) {
          hubs = JSON.parse(JSON.stringify(data.hubs));
          ensureIds();
          saveHubs();
        }
      }
      if (data.assumptions &amp;&amp; typeof data.assumptions === 'object') {
        const asmRaw = localStorage.getItem(ASM_STORAGE_KEY);
        if (!asmRaw) {
          assumptions = { ...DEFAULT_ASSUMPTIONS, ...data.assumptions };
          applyAssumptionsToUI();
          saveAssumptions();
        }
      }
      return data.sites.length > 0 ? data.sites : null;
    }
    // V1 shape: array of sites
    if (Array.isArray(data) &amp;&amp; data.length > 0) return data;
    throw new Error('Empty or invalid');
  } catch(e) {
    return null;
  }
}

async function loadSites() {
  const canonical = await fetchCanonical();
  canonicalSites = canonical;

  let stored = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) &amp;&amp; parsed.length > 0) stored = parsed;
    }
  } catch(e) {}

  if (canonical &amp;&amp; stored &amp;&amp; !arraysEqual(canonical, stored)) {
    // User has local edits AND sites.json exists AND they differ
    const useLocal = confirm(
      'You have unsaved local edits that differ from the published sites.json.\n\n' +
      '• Click OK to keep your local edits\n' +
      '• Click Cancel to load the fresh list from sites.json (your local edits will be discarded)'
    );
    if (useLocal) {
      dataSource = 'local-edits';
      return stored;
    } else {
      localStorage.removeItem(STORAGE_KEY);
      dataSource = 'synced';
      return JSON.parse(JSON.stringify(canonical));
    }
  }

  if (canonical) {
    dataSource = stored ? 'synced' : 'synced';  // local matches canonical, or no local
    return stored || JSON.parse(JSON.stringify(canonical));
  }

  // No canonical (fetch failed — likely opened as file://)
  if (stored) { dataSource = 'local-edits'; return stored; }
  dataSource = 'offline';
  return JSON.parse(JSON.stringify(SEED_SITES));
}

function updateSourceIndicator() {
  const el = document.getElementById('data-source-indicator');
  if (!el) return;
  const n = sites ? sites.length : 0;
  const y1 = sites ? sites.filter(s => s.yr === 1).length : 0;
  const counts = `${n} Fabs · ${y1} in Y1`;
  if (dataSource === 'synced') {
    el.innerHTML = `<span class=&quot;badge synced&quot;>Synced with sites.json</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else if (dataSource === 'local-edits') {
    el.innerHTML = `<span class=&quot;badge local&quot;>Local edits (not saved to source)</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else if (dataSource === 'offline') {
    el.innerHTML = `<span class=&quot;badge offline&quot;>Built-in plan (no sites.json)</span> <span class=&quot;badge offline&quot;>${counts}</span>`;
  } else {
    el.innerHTML = '<span class=&quot;badge offline&quot;>Loading…</span>';
  }
}

async function reloadFromSource() {
  const canonical = await fetchCanonical();
  if (!canonical) {
    toast('Could not fetch sites.json — check your connection or the file URL');
    return;
  }
  if (sites.length > 0 &amp;&amp; !arraysEqual(canonical, sites)) {
    const ok = confirm(
      'Reload from sites.json? This will discard your local edits in this browser.\n\n' +
      'Tip: click Export JSON first if you want to save your current work.'
    );
    if (!ok) return;
  }
  localStorage.removeItem(STORAGE_KEY);
  canonicalSites = canonical;
  sites = JSON.parse(JSON.stringify(canonical));
  dataSource = 'synced';
  ensureIds();
  updateSourceIndicator();
  render();
  toast('Reloaded ' + sites.length + ' cities from sites.json');
}

function saveSites() {
  if (IS_VIEWER) return;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); } catch(e) {}
  // If the user has diverged from canonical, mark as local edits
  if (canonicalSites &amp;&amp; !arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'local-edits') {
      dataSource = 'local-edits';
      updateSourceIndicator();
    }
  } else if (canonicalSites &amp;&amp; arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'synced') {
      dataSource = 'synced';
      updateSourceIndicator();
    }
  }
}

function toast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), duration || 1800);
}

// Geocode lookup
function geocode(name, state) {
  if (!name || !state) return null;
  const n = name.toLowerCase().trim();
  const s = state.toUpperCase().trim();
  // Exact match
  let m = GEOCODE_DB.find(c => c.name.toLowerCase() === n &amp;&amp; c.state === s);
  if (m) return { lat: m.lat, lon: m.lon };
  // Partial match (contains)
  m = GEOCODE_DB.find(c => c.state === s &amp;&amp; (c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase())));
  if (m) return { lat: m.lat, lon: m.lon, fuzzy: true, matched: m.name };
  return null;
}

function autoGeocodeHint() {
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim();
  const hint = document.getElementById('geocode-hint');
  if (!name || !state) { hint.textContent = ''; return; }
  const g = geocode(name, state);
  if (g) {
    if (g.fuzzy) {
      hint.textContent = `✓ Found similar: ${g.matched}, ${state} (${g.lat.toFixed(2)}, ${g.lon.toFixed(2)})`;
    } else {
      hint.textContent = `✓ Location recognized: ${g.lat.toFixed(2)}, ${g.lon.toFixed(2)}`;
    }
    hint.style.color = 'var(--success, var(--text-secondary))';
  } else {
    hint.textContent = `⚠ &quot;${name}, ${state}&quot; not in built-in database — enter Lat/Lon in the fields above, or click the ⚠ pin after adding to set coordinates.`;
    hint.style.color = 'var(--text-warning, #854F0B)';
  }
}

function addRow() {
  const yr = parseInt(document.getElementById('new-yr').value);
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim().toUpperCase();
  const phase = parseInt(document.getElementById('new-phase').value);

  // Optional manual lat/lon — if both provided, they override the geocode DB
  const latEl = document.getElementById('new-lat');
  const lonEl = document.getElementById('new-lon');
  const manualLat = latEl &amp;&amp; latEl.value !== '' ? parseFloat(latEl.value) : null;
  const manualLon = lonEl &amp;&amp; lonEl.value !== '' ? parseFloat(lonEl.value) : null;
  const hasManual = manualLat !== null &amp;&amp; manualLon !== null &amp;&amp; !isNaN(manualLat) &amp;&amp; !isNaN(manualLon);

  if (!name || !state) { toast('City and State required'); return; }
  if (state.length !== 2) { toast('State must be 2 letters'); return; }

  let lat = null, lon = null;
  let g = null;
  if (hasManual) {
    lat = manualLat;
    lon = manualLon;
  } else {
    g = geocode(name, state);
    if (g) {
      lat = g.lat;
      lon = g.lon;
    }
  }

  const newSite = { yr, phase, name, state, lat, lon, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7) };
  sites.push(newSite);
  saveSites();
  document.getElementById('new-name').value = '';
  document.getElementById('new-state').value = '';
  if (latEl) latEl.value = '';
  if (lonEl) lonEl.value = '';
  document.getElementById('geocode-hint').textContent = '';
  render();
  if (hasManual) {
    toast(`Added ${name}, ${state} at (${manualLat.toFixed(3)}, ${manualLon.toFixed(3)})`);
  } else if (g) {
    toast(`Added ${name}, ${state}`);
  } else {
    toast(`Added ${name}, ${state} — enter Lat/Lon or click the ⚠ pin to set coordinates`);
  }
}

function deleteRow(id) {
  const idx = sites.findIndex(s => s._id === id);
  if (idx === -1) return;
  const s = sites[idx];
  sites.splice(idx, 1);
  saveSites();
  render();
  toast(`Removed ${s.name}, ${s.state}`);
}

function updateField(id, field, value) {
  const site = sites.find(s => s._id === id);
  if (!site) return;
  if (field === 'yr' || field === 'phase') {
    value = parseInt(value);
    if (isNaN(value)) return;
    if (field === 'yr' &amp;&amp; (value < 1 || value > 10)) return;
    if (field === 'phase' &amp;&amp; (value < 1 || value > 3)) return;
  } else if (field === 'lat' || field === 'lon') {
    value = parseFloat(value);
    if (isNaN(value)) return;
  } else if (field === 'capex' || field === 'rev_per_home' || field === 'margin_pct') {
    // Override fields: blank = clear override, otherwise parse number
    if (value === '' || value == null) {
      delete site[field];
      saveSites();
      renderTable();  // refresh dirty-indicator state
      updateDashboard();
      return;
    }
    value = parseFloat(value);
    if (isNaN(value)) return;
  } else if (field === 'state') {
    value = (value || '').toUpperCase().slice(0, 2);
  } else if (field === 'name') {
    value = (value || '').trim();
    if (!value) return;
  }
  site[field] = value;

  // Auto-geocode when name or state changes — if the new (name, state) is in the DB,
  // update lat/lon silently. If not, leave existing coords in place and let the ⚠ pin show.
  if (field === 'name' || field === 'state') {
    const g = geocode(site.name, site.state);
    if (g) {
      site.lat = g.lat;
      site.lon = g.lon;
    }
  }

  saveSites();
  if (field === 'yr' || field === 'phase' || field === 'lat' || field === 'lon' || field === 'state' || field === 'name') {
    renderTable();
    renderHubs();
  }
  updateMap();
  updateDashboard();
}

function sortBy(field) {
  sites.sort((a, b) => {
    const av = a[field], bv = b[field];
    if (typeof av === 'number') return av - bv;
    return String(av).localeCompare(String(bv));
  });
  saveSites();
  render();
  toast(`Sorted by ${field}`);
}

function resetToDefaults() {
  // Always reset to the SEED_SITES/SEED_HUBS embedded in this HTML file.
  // Do NOT use canonicalSites — that may be a stale sites.json fetched from a
  // hosted deployment and would silently reintroduce the old plan.
  if (!confirm(
    `Reset all Fab sites AND FBX Core hubs to the built-in plan embedded in this HTML file?\n\n` +
    `This discards any local edits AND ignores any sites.json hosted alongside this page.\n\n` +
    `This cannot be undone.`
  )) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(HUB_STORAGE_KEY);
  sites = JSON.parse(JSON.stringify(SEED_SITES));
  hubs = JSON.parse(JSON.stringify(SEED_HUBS));
  dataSource = 'offline';
  ensureIds();
  updateSourceIndicator();
  render();
  toast(`Reset: loaded ${sites.length} Fabs and ${hubs.length} hubs from built-in plan`);
}

function exportJSON() {
  const cleanSites = sites.map(({_id, ...rest}) => rest);
  const cleanHubs = hubs.map(({_id, ...rest}) => rest);
  const payload = {
    version: 2,
    exported_at: new Date().toISOString(),
    sites: cleanSites,
    hubs: cleanHubs,
    assumptions: assumptions
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'homefab_export.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported JSON (sites + hubs + assumptions)');
}

function exportCSV() {
  const rows = [['Year','Phase','City','State','Latitude','Longitude','CAPEX_M_override','RevPerHome_K_override','Margin_pct_override']];
  sites.forEach(s => rows.push([
    s.yr, s.phase, s.name, s.state, s.lat, s.lon,
    s.capex ?? '', s.rev_per_home ?? '', s.margin_pct ?? ''
  ]));
  const csv = rows.map(r => r.map(v => {
    const str = String(v == null ? '' : v);
    return /[&quot;,\n]/.test(str) ? '&quot;' + str.replace(/&quot;/g, '&quot;&quot;') + '&quot;' : str;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'homefab_sites.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported CSV (sites only)');
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let importedSites = null;
      let importedHubs = null;
      let importedAsm = null;
      if (file.name.endsWith('.json')) {
        const parsed = JSON.parse(e.target.result);
        // Support two JSON shapes:
        //   - V2 combined: { sites: [...], hubs: [...], assumptions: {...} }
        //   - V1 array of sites
        if (Array.isArray(parsed)) {
          importedSites = parsed;
        } else if (parsed &amp;&amp; typeof parsed === 'object') {
          if (Array.isArray(parsed.sites)) importedSites = parsed.sites;
          if (Array.isArray(parsed.hubs))  importedHubs  = parsed.hubs;
          if (parsed.assumptions &amp;&amp; typeof parsed.assumptions === 'object') importedAsm = parsed.assumptions;
        }
      } else if (file.name.endsWith('.csv')) {
        importedSites = [];
        const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
        const first = lines[0].toLowerCase();
        const startIdx = (first.includes('year') || first.includes('city')) ? 1 : 0;
        for (let i = startIdx; i < lines.length; i++) {
          const parts = parseCSVLine(lines[i]);
          if (parts.length < 6) continue;
          const row = {
            yr: parseInt(parts[0]),
            phase: parseInt(parts[1]),
            name: parts[2],
            state: parts[3].toUpperCase(),
            lat: parseFloat(parts[4]),
            lon: parseFloat(parts[5])
          };
          if (parts[6] &amp;&amp; parts[6].trim() !== '') row.capex = parseFloat(parts[6]);
          if (parts[7] &amp;&amp; parts[7].trim() !== '') row.rev_per_home = parseFloat(parts[7]);
          if (parts[8] &amp;&amp; parts[8].trim() !== '') row.margin_pct = parseFloat(parts[8]);
          importedSites.push(row);
        }
      }

      if (!importedSites || importedSites.length === 0) { toast('No valid rows found'); return; }
      const validSites = importedSites.filter(s => s.name &amp;&amp; s.state &amp;&amp; !isNaN(s.lat) &amp;&amp; !isNaN(s.lon) &amp;&amp; !isNaN(s.yr) &amp;&amp; !isNaN(s.phase));
      if (validSites.length === 0) { toast('No valid rows after validation'); return; }

      sites = validSites;
      ensureIds();
      saveSites();

      let summary = `Imported ${validSites.length} sites`;
      if (importedHubs &amp;&amp; Array.isArray(importedHubs) &amp;&amp; importedHubs.length > 0) {
        const validHubs = importedHubs.filter(h => h.name &amp;&amp; h.city &amp;&amp; h.state &amp;&amp; !isNaN(h.lat) &amp;&amp; !isNaN(h.lon) &amp;&amp; !isNaN(h.opens_yr));
        if (validHubs.length > 0) {
          hubs = validHubs;
          ensureIds();
          saveHubs();
          summary += `, ${validHubs.length} hubs`;
        }
      }
      if (importedAsm) {
        assumptions = { ...DEFAULT_ASSUMPTIONS, ...importedAsm };
        applyAssumptionsToUI();
        saveAssumptions();
        summary += ', assumptions';
      }
      render();
      toast(summary);
    } catch(err) {
      toast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '&quot;' &amp;&amp; line[i+1] === '&quot;') { cur += '&quot;'; i++; }
      else if (c === '&quot;') inQuotes = false;
      else cur += c;
    } else {
      if (c === ',') { result.push(cur); cur = ''; }
      else if (c === '&quot;') inQuotes = true;
      else cur += c;
    }
  }
  result.push(cur);
  return result.map(s => s.trim());
}

// ---- Rendering ----
function render() {
  ensureIds();

  renderYearFilter();
  renderHubs();

}

function renderYearFilter() {
  const sel = document.getElementById('filter-year');

  sel.innerHTML = '<option value=&quot;&quot;>All years</option>' + years.map(y => `<option value=&quot;${y}&quot;>Year ${y}</option>`).join('');
  sel.value = cur;
}

function renderTable() {

    if (filterYear &amp;&amp; String(s.yr) !== filterYear) return false;
    return true;
  });

  document.getElementById('row-count').textContent = visible.length === sites.length ? `${sites.length} total` : `${visible.length} of ${sites.length}`;

  // Pre-compute nearest hub for each visible site (active hubs considered across all years for display)
  tbody.innerHTML = visible.map(s => {
    const activeH = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
    const assign = assignHub(s, activeH);
    const hubShort = assign ? (assign.hub.city.split(/[\s-]/)[0]) : '—';
    const capexVal = (s.capex != null &amp;&amp; s.capex !== '') ? s.capex : '';
    const revVal   = (s.rev_per_home != null &amp;&amp; s.rev_per_home !== '') ? s.rev_per_home : '';
    const margVal  = (s.margin_pct != null &amp;&amp; s.margin_pct !== '') ? s.margin_pct : '';
    const hasCoords = !isNaN(s.lat) &amp;&amp; !isNaN(s.lon) &amp;&amp; s.lat !== null &amp;&amp; s.lon !== null;
    const g = geocode(s.name, s.state);
    // &quot;ok&quot; if coords are set AND they match a geocode DB entry for the current name/state
    // &quot;warn&quot; if no coords, or coords don't match a known city (user manually entered or geocode miss)
    let locStatus = 'ok';
    let locTitle = `${s.lat?.toFixed?.(2)}, ${s.lon?.toFixed?.(2)} (click to edit)`;
    if (!hasCoords) {
      locStatus = 'warn';
      locTitle = 'No coordinates — click to set manually';
    } else if (!g) {
      locStatus = 'warn';
      locTitle = `&quot;${s.name}, ${s.state}&quot; not in built-in database — coords are manual (${s.lat.toFixed(2)}, ${s.lon.toFixed(2)}). Click to edit.`;
    }
    return `
    <tr data-id=&quot;${s._id}&quot; draggable=&quot;true&quot; onmouseenter=&quot;highlightDot('${s._id}')&quot; onmouseleave=&quot;highlightDot(null)&quot;>
      <td><span class=&quot;drag-handle&quot; title=&quot;Drag to reorder&quot;>⋮⋮</span></td>
      <td><input type=&quot;number&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;${s.yr}&quot; onchange=&quot;updateField('${s._id}','yr',this.value)&quot;></td>
      <td>
        <select onchange=&quot;updateField('${s._id}','phase',this.value)&quot;>
          <option value=&quot;1&quot; ${s.phase===1?'selected':''}>1</option>
          <option value=&quot;2&quot; ${s.phase===2?'selected':''}>2</option>

        </select>

      <td><input type=&quot;text&quot; value=&quot;${escapeHtml(s.name)}&quot; onchange=&quot;updateField('${s._id}','name',this.value)&quot;></td>
      <td><input type=&quot;text&quot; maxlength=&quot;2&quot; value=&quot;${escapeHtml(s.state)}&quot; style=&quot;text-transform:uppercase&quot; onchange=&quot;updateField('${s._id}','state',this.value)&quot;></td>

  sites.forEach(s => {
    const active = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
    const a = assignHub(s, active);

  });

  tbody.innerHTML = hubs.map(h => {
    const capVal = (h.capex != null &amp;&amp; h.capex !== '') ? h.capex : '';

    const g = geocode(h.city, h.state);
    let locStatus = 'ok';

    if (!hasCoords) {
      locStatus = 'warn';
      locTitle = 'No coordinates — click to set manually';

      <td><input type=&quot;text&quot; value=&quot;${escapeHtml(h.city)}&quot; onchange=&quot;updateHubField('${h._id}','city',this.value)&quot;></td>
      <td><input type=&quot;text&quot; maxlength=&quot;2&quot; value=&quot;${escapeHtml(h.state)}&quot; style=&quot;text-transform:uppercase&quot; onchange=&quot;updateHubField('${h._id}','state',this.value)&quot;></td>
      <td style=&quot;text-align:center&quot;><span class=&quot;loc-pin ${locStatus}&quot; title=&quot;${escapeHtml(locTitle)}&quot; onclick=&quot;openCoordPopover(event, '${h._id}', 'hub')&quot;>${locStatus === 'ok' ? '📍' : '⚠'}</span></td>
      <td><input type=&quot;number&quot; step=&quot;1&quot; class=&quot;override&quot; data-dirty=&quot;${capVal!==''?1:0}&quot; placeholder=&quot;${assumptions.hub_capex_M}&quot; value=&quot;${capVal}&quot; onchange=&quot;updateHubField('${h._id}','capex',this.value)&quot; title=&quot;$M&quot;></td>

    </tr>`;

}

function updateHubField(id, field, value) {
  const h = hubs.find(x => x._id === id);
  if (!h) return;
  if (field === 'opens_yr' || field === 'lat' || field === 'lon' || field === 'capex') {
    if (field === 'capex' &amp;&amp; (value === '' || value == null)) { h.capex = ''; }
    else {
      const n = parseFloat(value);
      if (isNaN(n)) return;
      h[field] = n;
    }
  } else if (field === 'state') {
    h[field] = (value || '').toUpperCase().slice(0, 2);
  } else {
    h[field] = (value || '').trim();
  }

  // Auto-geocode when city or state changes
  if (field === 'city' || field === 'state') {
    const g = geocode(h.city, h.state);
    if (g) {
      h.lat = g.lat;
      h.lon = g.lon;
    }
  }

  saveHubs();
  renderTable();
  renderHubs();
  updateMap();
  updateDashboard();
}

function deleteHub(id) {
  if (hubs.length <= 1) { toast('At least one hub required'); return; }
  const h = hubs.find(x => x._id === id);
  if (!h) return;
  if (!confirm(`Delete hub &quot;${h.name}&quot;?`)) return;
  hubs = hubs.filter(x => x._id !== id);
  saveHubs();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&amp;<>&quot;']/g, c => ({'&amp;':'&amp;amp;','<':'&amp;lt;','>':'&amp;gt;','&quot;':'&amp;quot;',&quot;'&quot;:'&amp;#39;'}[c]));
}

// ---- Coord popover (pin click) ----
function openCoordPopover(event, id, type) {
  event.stopPropagation();
  closeCoordPopover();
  const target = type === 'hub' ? hubs.find(h => h._id === id) : sites.find(s => s._id === id);
  if (!target) return;
  const pop = document.createElement('div');
  pop.className = 'coord-popover';
  pop.id = 'coord-popover';
  pop.innerHTML = `
    <div class=&quot;cp-field&quot;><label>Lat</label><input type=&quot;number&quot; step=&quot;0.01&quot; id=&quot;cp-lat&quot; value=&quot;${target.lat ?? ''}&quot;></div>
    <div class=&quot;cp-field&quot;><label>Lon</label><input type=&quot;number&quot; step=&quot;0.01&quot; id=&quot;cp-lon&quot; value=&quot;${target.lon ?? ''}&quot;></div>
    <button onclick=&quot;saveCoordPopover('${id}','${type}')&quot;>Save</button>
    <button onclick=&quot;closeCoordPopover()&quot;>Cancel</button>
  `;
  const rect = event.currentTarget.getBoundingClientRect();
  pop.style.top  = (window.scrollY + rect.bottom + 4) + 'px';
  pop.style.left = (window.scrollX + rect.left - 8) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => {
    document.addEventListener('click', closeCoordPopoverOnOutsideClick);
  }, 50);
}

function closeCoordPopoverOnOutsideClick(e) {
  const pop = document.getElementById('coord-popover');
  if (pop &amp;&amp; !pop.contains(e.target)) closeCoordPopover();
}

function closeCoordPopover() {
  const pop = document.getElementById('coord-popover');
  if (pop) pop.remove();
  document.removeEventListener('click', closeCoordPopoverOnOutsideClick);
}

function saveCoordPopover(id, type) {
  const lat = parseFloat(document.getElementById('cp-lat').value);
  const lon = parseFloat(document.getElementById('cp-lon').value);
  if (isNaN(lat) || isNaN(lon)) { toast('Both lat and lon must be numbers'); return; }
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { toast('Invalid coordinate range'); return; }
  if (type === 'hub') {
    const h = hubs.find(x => x._id === id);
    if (!h) return;
    h.lat = lat; h.lon = lon;
    saveHubs();
  } else {
    const s = sites.find(x => x._id === id);
    if (!s) return;
    s.lat = lat; s.lon = lon;
    saveSites();
  }
  closeCoordPopover();
  renderTable();
  renderHubs();
  updateMap();
  updateDashboard();
  toast('Coordinates updated');
}

function duplicateRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const copy = { ...s, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), name: s.name + ' (copy)' };
  const idx = sites.findIndex(x => x._id === id);
  sites.splice(idx + 1, 0, copy);
  saveSites();
  render();
}

function regeocodeRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const g = geocode(s.name, s.state);
  if (g) {
    s.lat = g.lat; s.lon = g.lon;
    saveSites(); render();
    toast(`Re-geocoded ${s.name}`);
  } else {
    toast(`No match for &quot;${s.name}, ${s.state}&quot;`);
  }
}

// ---- Drag &amp; drop reorder ----
let dragId = null;
function attachDragHandlers() {
  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      dragId = row.getAttribute('data-id');
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
      row.classList.add('drop-target');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = row.getAttribute('data-id');
      if (dragId &amp;&amp; targetId &amp;&amp; dragId !== targetId) {
        const from = sites.findIndex(s => s._id === dragId);
        const to = sites.findIndex(s => s._id === targetId);
        if (from !== -1 &amp;&amp; to !== -1) {
          const [moved] = sites.splice(from, 1);
          sites.splice(to, 0, moved);
          saveSites();
          render();
        }
      }
      row.classList.remove('drop-target');
    });
  });
}
