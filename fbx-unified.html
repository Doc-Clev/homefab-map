// Backfill missing fields when loading older JSON. Idempotent.
function migrateState(s) {
  if (!s.volume) s.volume = {};
  if (s.volume.homes_per_year == null) s.volume.homes_per_year = 100;
  if (s.volume.contracts_per_year == null) s.volume.contracts_per_year = 100;
  if (s.volume.franchises_per_year == null) s.volume.franchises_per_year = 4;
  if (s.volume.franchises_from_map == null) s.volume.franchises_from_map = false;
  if (!Array.isArray(s.bus)) s.bus = [];
  s.bus.forEach(bu => {
    // BU-level owner fields
    if (bu.owner == null) bu.owner = &quot;&quot;;
    if (bu.owner_description == null) bu.owner_description = &quot;&quot;;
    if (!Array.isArray(bu.functions)) bu.functions = [];
    bu.functions.forEach(fn => {
      // Function-level owner fields (blank = inherits from BU)
      if (fn.owner == null) fn.owner = &quot;&quot;;
      if (fn.owner_description == null) fn.owner_description = &quot;&quot;;
      if (fn.external_rev_pct == null) {
        // Sensible default by BU: Core defaults to internal, others to external
        fn.external_rev_pct = (bu.id === &quot;fbx_core&quot;) ? 0 : 100;
      }
      if (fn.revenue_K == null) fn.revenue_K = 0;
      if (fn.cost_K == null) fn.cost_K = 0;
      if (fn.time_days == null) fn.time_days = 0;
      if (fn.headcount == null) fn.headcount = 0;
      if (!fn.basis) fn.basis = &quot;per_home&quot;;
    });
  });
  if (!s.handoffs) s.handoffs = SEED.handoffs;
  if (!s.customer_ownership) s.customer_ownership = SEED.customer_ownership;
  if (!Array.isArray(s.products)) {
    s.products = [&quot;ADUs&quot;, &quot;High Density Multi-Family&quot;, &quot;Bathroom Pods&quot;, &quot;SIPs&quot;];
  }
  return s;
}

// ============== BASIS NORMALIZATION ==============
// All functions roll up to annual $K.
function normalizeToAnnual(value_K, basis, volume) {
  switch (basis) {
    case &quot;per_home&quot;: return value_K * (volume.homes_per_year || 0);
    case &quot;per_contract&quot;: return value_K * (volume.contracts_per_year || 0);
    case &quot;per_franchise&quot;: return value_K * (volume.franchises_per_year || 0);
    case &quot;per_month&quot;: return value_K * 12;
    case &quot;per_year&quot;: return value_K;
    default: return value_K;
  }
}

function computeRollup() {
  const vol = state.volume;
  const perBU = {};
  let totalElimination = 0;
  let eliminationByBU = { first_mile: 0, fbx_core: 0, last_mile: 0 };

  state.bus.forEach(bu => {
    let rev = 0, cost = 0, hc = 0, extRev = 0, intRev = 0;
    bu.functions.forEach(fn => {
      const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, vol);
      const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, vol);
      const extPct = (fn.external_rev_pct == null ? 100 : fn.external_rev_pct) / 100;
      const fnExtRev = annualRev * extPct;
      const fnIntRev = annualRev * (1 - extPct);
      rev += annualRev;
      cost += annualCost;
      extRev += fnExtRev;
      intRev += fnIntRev;
      hc += fn.headcount || 0;
    });
    perBU[bu.id] = {
      revenue: rev,
      externalRevenue: extRev,
      internalRevenue: intRev,
      cost: cost,
      margin: rev - cost,
      headcount: hc
    };
    eliminationByBU[bu.id] = intRev;
    totalElimination += intRev;
  });

  // Gross = sum of all three (as if each BU were standalone)
  const gross = {
    revenue: Object.values(perBU).reduce((s, b) => s + b.revenue, 0),
    cost: Object.values(perBU).reduce((s, b) => s + b.cost, 0),
    headcount: Object.values(perBU).reduce((s, b) => s + b.headcount, 0)
  };
  gross.margin = gross.revenue - gross.cost;

  // Consolidated: eliminate internal revenue from both revenue and cost.
  // Assumption: every $ of internal revenue booked by one BU equals a $ of COGS
  // in another BU (transfer pricing at parity). Margin is preserved.
  const consolidated = {
    revenue: gross.revenue - totalElimination,
    cost: gross.cost - totalElimination,
    margin: gross.margin,
    headcount: gross.headcount
  };

  return { perBU, gross, elimination: totalElimination, eliminationByBU, consolidated };
}

function renderRollup() {
  const r = computeRollup();
  const el = document.getElementById(&quot;rollup&quot;);
  const fmt = (n) => {
    if (Math.abs(n) >= 1000) return &quot;$&quot; + (n / 1000).toFixed(1) + &quot;M&quot;;
    return &quot;$&quot; + Math.round(n) + &quot;K&quot;;
  };
  const cls = (n) => n >= 0 ? &quot;pos&quot; : &quot;neg&quot;;
  const buCard = (id, label) => {
    const b = r.perBU[id];
    const elim = r.eliminationByBU[id] || 0;
    return `
    <div class=&quot;rollup&quot;>
      <h3>${label}</h3>

      <div class=&quot;row&quot;><span>Cost</span><span class=&quot;val&quot;>${fmt(b.cost)}</span></div>
      <div class=&quot;row&quot;><span>Headcount</span><span class=&quot;val&quot;>${b.headcount}</span></div>
      <div class=&quot;row total&quot;><span>Margin</span><span class=&quot;val ${cls(b.margin)}&quot;>${fmt(b.margin)}</span></div>
    </div>`;
  };
  el.innerHTML = `
    ${buCard(&quot;first_mile&quot;, &quot;First Mile&quot;)}
    ${buCard(&quot;fbx_core&quot;, &quot;FBX Core&quot;)}
    ${buCard(&quot;last_mile&quot;, &quot;Last Mile&quot;)}
    <div class=&quot;rollup&quot;>
      <h3>Consolidated</h3>
      <div class=&quot;row&quot;><span>Gross Rev</span><span class=&quot;val&quot;>${fmt(r.gross.revenue)}</span></div>
      <div class=&quot;row&quot; style=&quot;color: var(--text-muted); font-size: 11px;&quot;><span>Eliminations</span><span class=&quot;val&quot;>-${fmt(r.elimination)}</span></div>
      <div class=&quot;row&quot;><span>Consol Rev</span><span class=&quot;val&quot;>${fmt(r.consolidated.revenue)}</span></div>
      <div class=&quot;row&quot;><span>Consol Cost</span><span class=&quot;val&quot;>${fmt(r.consolidated.cost)}</span></div>
      <div class=&quot;row total&quot;><span>Consol Margin</span><span class=&quot;val ${cls(r.consolidated.margin)}&quot;>${fmt(r.consolidated.margin)}</span></div>
    </div>
  `;
}

function renderFishbone() {
  const svg = d3.select(&quot;#chart&quot;);
  svg.selectAll(&quot;*&quot;).remove();

  const container = document.querySelector(&quot;main&quot;);
  const W = Math.max(1000, container.clientWidth - 40);
  const H = Math.max(620, container.clientHeight - 40);

  svg.attr(&quot;viewBox&quot;, `0 0 ${W} ${H}`)
     .attr(&quot;width&quot;, W).attr(&quot;height&quot;, H);

  // ---- Layout ----
  const marginL = 180, marginR = 220;
  const headerBandH = 48;    // BU pill + owner subheader
  const ownershipBandH = 16; // Customer ownership band, below headers
  const footerBandH = 30;    // Handoff labels, bottom
  const marginT = 20 + headerBandH + ownershipBandH + 10; // top breathing room for function stubs
  const marginB = 20 + footerBandH;
  const spineY = Math.round((marginT + (H - marginB)) / 2);
  const spineX1 = marginL;
  const spineX2 = W - marginR;
  const buCount = state.bus.length;
  const buWidth = (spineX2 - spineX1) / buCount;

  // ---- BU zone headers (row at top) ----
  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneMid = zoneX + buWidth / 2;
    const buColor = `var(${bu.color_var})`;

    const headerG = svg.append(&quot;g&quot;)
      .style(&quot;cursor&quot;, &quot;pointer&quot;)
      .on(&quot;click&quot;, () => {
        selection = { type: &quot;bu&quot;, buId: bu.id };
        renderAll();
      })
      .on(&quot;mouseenter&quot;, function(e) { showExplainer(&quot;bu&quot;, bu.id, e); })
      .on(&quot;mouseleave&quot;, () => hideExplainerIfNotPinned());

    // filled pill centered over zone
    const pillW = Math.min(180, buWidth - 40);
    const pillH = 26;
    const pillX = zoneMid - pillW / 2;
    const pillY = 14;
    headerG.append(&quot;rect&quot;)
      .attr(&quot;x&quot;, pillX).attr(&quot;y&quot;, pillY)
      .attr(&quot;width&quot;, pillW).attr(&quot;height&quot;, pillH)
      .attr(&quot;rx&quot;, 5).attr(&quot;fill&quot;, buColor);
    headerG.append(&quot;text&quot;)
      .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH / 2 + 5)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;white&quot;)
      .attr(&quot;font-weight&quot;, 600)
      .attr(&quot;font-size&quot;, 13)
      .text(bu.name);

    // Owner sub-header (italic, BU-colored, below pill)
    if (bu.owner) {
      headerG.append(&quot;text&quot;)
        .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH + 12)
        .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
        .attr(&quot;fill&quot;, buColor)
        .attr(&quot;font-style&quot;, &quot;italic&quot;)
        .attr(&quot;font-size&quot;, 11)
        .text(bu.owner);
    }
  });

  // ---- Customer ownership band below headers + owner subheaders ----
  const bandY = 14 + 26 + 18;  // was +6, added room for owner subheader
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth * 2).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p1)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;Customer relationship: Sales →&quot;);
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p3)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2.5).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;→ GC&quot;);

  // ---- Dashed BU zone dividers ----
  for (let i = 1; i < buCount; i++) {
    const x = spineX1 + buWidth * i;
    svg.append(&quot;line&quot;)
      .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, marginT - 4)
      .attr(&quot;x2&quot;, x).attr(&quot;y2&quot;, H - marginB + 4)
      .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;)
      .attr(&quot;stroke-width&quot;, 1)
      .attr(&quot;stroke-dasharray&quot;, &quot;5 4&quot;)
      .attr(&quot;opacity&quot;, 0.25);
    const handoff = state.handoffs[i - 1];
    if (handoff) {
      svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;handoff-label&quot;)
        .attr(&quot;x&quot;, x).attr(&quot;y&quot;, H - marginB + 20)
        .text(&quot;↓ &quot; + handoff.label);
    }
  }

  // ---- Horizontal spine ----
  svg.append(&quot;line&quot;).attr(&quot;class&quot;, &quot;spine&quot;)
    .attr(&quot;x1&quot;, spineX1).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, spineX2).attr(&quot;y2&quot;, spineY)
    .attr(&quot;stroke-width&quot;, 4);

  // ---- Chunky effect arrow ----
  const arrowStart = spineX2;
  const arrowTipX = arrowStart + 80;
  const arrowH = 60;
  svg.append(&quot;polygon&quot;)
    .attr(&quot;points&quot;, `${arrowStart},${spineY - arrowH/2} ${arrowTipX},${spineY} ${arrowStart},${spineY + arrowH/2}`)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;opacity&quot;, 0.9);
  const effectX = arrowTipX + 8;
  const effectW = 160, effectH = 70;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;effect-box&quot;)
    .attr(&quot;x&quot;, effectX).attr(&quot;y&quot;, spineY - effectH / 2)
    .attr(&quot;width&quot;, effectW).attr(&quot;height&quot;, effectH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  const effectLines = wrapText(state.head, 18);
  const lineH = 16;
  const startY = spineY - ((effectLines.length - 1) * lineH) / 2 + 4;
  effectLines.forEach((line, i) => {
    svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;effect-text&quot;)
      .attr(&quot;x&quot;, effectX + effectW / 2)
      .attr(&quot;y&quot;, startY + i * lineH)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .text(line);
  });

  // ---- Products box on left end of spine ----
  const products = Array.isArray(state.products) ? state.products : [];
  const productsW = 150;
  const productsX = spineX1 - productsW - 8;
  // Dynamic height based on line count
  const productLineH = 15;
  const productTitleH = 18;
  const productsPad = 10;
  const productsH = productTitleH + (products.length * productLineH) + productsPad * 2;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;products-box&quot;)
    .attr(&quot;x&quot;, productsX).attr(&quot;y&quot;, spineY - productsH / 2)
    .attr(&quot;width&quot;, productsW).attr(&quot;height&quot;, productsH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  // Title
  svg.append(&quot;text&quot;)
    .attr(&quot;x&quot;, productsX + productsW / 2)
    .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH - 4)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
    .attr(&quot;font-size&quot;, 13)
    .attr(&quot;font-weight&quot;, 700)
    .text(&quot;Products&quot;);
  // Product list
  products.forEach((p, idx) => {
    svg.append(&quot;text&quot;)
      .attr(&quot;x&quot;, productsX + productsW / 2)
      .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH + 8 + idx * productLineH)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .attr(&quot;font-size&quot;, 11)
      .attr(&quot;opacity&quot;, 0.9)
      .text(p);
  });

  // ---- Function stubs (oblique — leaning left, away from effect) ----
  // Each bone's tip shifts left by sin(tilt) * height from its anchor.
  // We compute anchor X values in &quot;tip-space&quot; (where we want tips to land),
  // then shift right by that offset so tips end up in the right place.
  const TILT_DEG = 22;
  const TILT_SIN = Math.sin(TILT_DEG * Math.PI / 180);

  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneInnerPad = 20;
    const zoneInnerLeft = zoneX + zoneInnerPad;
    const zoneInnerRight = zoneX + buWidth - zoneInnerPad;
    const buColor = `var(${bu.color_var})`;

    const topFns = [];
    const botFns = [];
    bu.functions.forEach((fn, j) => {
      if (j % 2 === 0) topFns.push(fn);
      else botFns.push(fn);
    });

    const stubHeightMax = spineY - marginT - 30;
    const stubHeightMin = 50;
    const heightFor = (idx, total) => {
      if (total <= 1) return stubHeightMin + (stubHeightMax - stubHeightMin) * 0.6;
      const ratios = [0.95, 0.65, 0.85, 0.55, 0.75, 0.45];
      const r = ratios[idx % ratios.length];
      return stubHeightMin + (stubHeightMax - stubHeightMin) * r;
    };

    const distributeTipX = (count, addSlot) => {
      const n = count + (addSlot ? 1 : 0);
      if (n === 0) return [];
      const positions = [];
      for (let k = 0; k < n; k++) {
        const t = (n === 1) ? 0.5 : (k + 0.5) / n;
        positions.push(zoneInnerLeft + (zoneInnerRight - zoneInnerLeft) * t);
      }
      return positions;
    };

    // Anchor X = desired tip X + (lean offset)
    // Spine intersects anchor at x. Tip at (x - sin*h, spineY ± cos*h).
    // So anchor = tipX + sin*h.
    const anchorFromTip = (tipX, h) => tipX + TILT_SIN * h;

    const addOnTop = topFns.length <= botFns.length;

    // Top stubs
    const topTipXs = distributeTipX(topFns.length, addOnTop);
    topFns.forEach((fn, idx) => {
      const h = heightFor(idx, topFns.length);
      const x = anchorFromTip(topTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, -1, h, buColor, false);
    });
    if (addOnTop) {
      const h = heightFor(topFns.length, topFns.length + 1) * 0.7;
      const x = anchorFromTip(topTipXs[topFns.length], h);
      drawStub(svg, null, bu, x, spineY, -1, h, buColor, true);
    }

    // Bottom stubs
    const botTipXs = distributeTipX(botFns.length, !addOnTop);
    botFns.forEach((fn, idx) => {
      const h = heightFor(idx, botFns.length);
      const x = anchorFromTip(botTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, 1, h, buColor, false);
    });
    if (!addOnTop) {
      const h = heightFor(botFns.length, botFns.length + 1) * 0.7;
      const x = anchorFromTip(botTipXs[botFns.length], h);
      drawStub(svg, null, bu, x, spineY, 1, h, buColor, true);
    }
  });
}

// Draw a single vertical function stub.
// fn=null signals the &quot;+ add input&quot; placeholder.
function drawStub(svg, fn, bu, x, spineY, dir, height, color, isAddPrompt) {
  // Oblique bone: tip leans LEFT (away from the effect / fish head on the right)
  // This is the classic Ishikawa orientation — inputs fan back from the effect.
  // Angle from vertical: ~22deg (68deg from horizontal)
  const tiltDeg = 22;
  const tiltRad = tiltDeg * Math.PI / 180;
  const tipX = x - Math.sin(tiltRad) * height;
  const tipY = spineY + dir * Math.cos(tiltRad) * height;
  const dotR = 5;

  // bone line
  const line = svg.append(&quot;line&quot;)
    .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, tipX).attr(&quot;y2&quot;, tipY)
    .attr(&quot;stroke&quot;, color)
    .attr(&quot;stroke-width&quot;, isAddPrompt ? 1 : 1.8)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.5 : 0.85);
  if (isAddPrompt) line.attr(&quot;stroke-dasharray&quot;, &quot;3 3&quot;);

  // tip dot
  svg.append(&quot;circle&quot;)
    .attr(&quot;cx&quot;, tipX).attr(&quot;cy&quot;, tipY).attr(&quot;r&quot;, dotR)
    .attr(&quot;fill&quot;, color)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.5 : 1);

  // label positioned above/below the tip
  const labelY = tipY + dir * (dotR + 12);
  const text = isAddPrompt ? &quot;+ add input&quot; : (fn ? fn.name : &quot;&quot;);
  const isActive = !isAddPrompt &amp;&amp; fn &amp;&amp; selection &amp;&amp; selection.type === &quot;fn&quot; &amp;&amp; selection.fnId === fn.id;

  const label = svg.append(&quot;text&quot;)
    .attr(&quot;class&quot;, isAddPrompt ? &quot;&quot; : (&quot;fn-label&quot; + (isActive ? &quot; active&quot; : &quot;&quot;)))
    .attr(&quot;x&quot;, tipX).attr(&quot;y&quot;, labelY)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, isAddPrompt ? color : &quot;var(--text-primary)&quot;)
    .attr(&quot;font-size&quot;, isAddPrompt ? 11 : 12)
    .attr(&quot;font-style&quot;, isAddPrompt ? &quot;italic&quot; : &quot;normal&quot;)
    .attr(&quot;font-weight&quot;, isActive ? 600 : 400)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.75 : 1)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  const maxWidth = 110;
  const approxW = text.length * 6.2;
  if (approxW > maxWidth &amp;&amp; !isAddPrompt) {
    const lines = wrapText(text, 16);
    label.text(&quot;&quot;);
    lines.forEach((ln, li) => {
      label.append(&quot;tspan&quot;)
        .attr(&quot;x&quot;, tipX)
        .attr(&quot;dy&quot;, li === 0 ? 0 : 13)
        .text(ln);
    });
  } else {
    label.text(text);
  }

  // click/hover target covers the whole bone + label region
  const minX = Math.min(x, tipX) - 60;
  const maxX = Math.max(x, tipX) + 60;
  const clickGroup = svg.append(&quot;rect&quot;)
    .attr(&quot;x&quot;, minX).attr(&quot;y&quot;, Math.min(spineY, labelY) - 8)
    .attr(&quot;width&quot;, maxX - minX).attr(&quot;height&quot;, Math.abs(labelY - spineY) + 20)
    .attr(&quot;fill&quot;, &quot;transparent&quot;)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  if (isAddPrompt) {
    clickGroup.on(&quot;click&quot;, () => {
      const bu2 = state.bus.find(b => b.id === bu.id);
      const newId = &quot;fn_&quot; + Date.now();
      const defaultExt = bu2.id === &quot;fbx_core&quot; ? 0 : 100;
      bu2.functions.push({
        id: newId, name: &quot;New Function&quot;, description: &quot;&quot;,
        revenue_K: 0, cost_K: 0, time_days: 0, headcount: 0,
        basis: &quot;per_home&quot;, external_rev_pct: defaultExt,
        owner: &quot;&quot;, owner_description: &quot;&quot;
      });
      selection = { type: &quot;fn&quot;, buId: bu.id, fnId: newId };
      renderAll();
    });
  } else if (fn) {
    clickGroup
      .on(&quot;click&quot;, () => {
        selection = { type: &quot;fn&quot;, buId: bu.id, fnId: fn.id };
        renderAll();
      })
      .on(&quot;mouseenter&quot;, function(e) { showExplainer(&quot;fn&quot;, fn.id, e, bu.id); })
      .on(&quot;mouseleave&quot;, () => hideExplainerIfNotPinned());
  }
}

// Simple text wrapper for multi-line effect label
function wrapText(text, maxChars) {
  const words = String(text || &quot;&quot;).split(/\s+/);
  const lines = [];
  let cur = &quot;&quot;;
  for (const w of words) {
    if ((cur + &quot; &quot; + w).trim().length > maxChars &amp;&amp; cur) {
      lines.push(cur.trim());
      cur = w;
    } else {
      cur = (cur + &quot; &quot; + w).trim();
    }
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 3);
}

      if (!confirm(`Delete &quot;${fn.name}&quot;?`)) return;
      bu.functions = bu.functions.filter(f => f.id !== fn.id);
      selection = null;
      renderAll();
      toast(&quot;Function deleted&quot;);
    });
  }
}

// ============== EXPLAINER ==============
// Explainer is persistent: stays open until user clicks ×. Positioned
// near the element that triggered it (with viewport clamping).
// `showExplainer` takes an optional DOM event so we can anchor to
// the actual click/hover position.
function showExplainer(type, id, evt, buId) {
  const el = document.getElementById(&quot;explainer&quot;);
  const titleEl = document.getElementById(&quot;explainer-title&quot;);
  const bodyEl = document.getElementById(&quot;explainer-body&quot;);
  const metaEl = document.getElementById(&quot;explainer-meta&quot;);
  const ownerBlock = document.getElementById(&quot;explainer-owner&quot;);
  const ownerNameEl = document.getElementById(&quot;explainer-owner-name&quot;);
  const ownerDescEl = document.getElementById(&quot;explainer-owner-desc&quot;);

  if (type === &quot;bu&quot;) {
    const bu = state.bus.find(b => b.id === id);
    if (!bu) return;
    titleEl.textContent = bu.name;
    metaEl.textContent = &quot;Business Unit&quot;;
    bodyEl.innerHTML = marked.parse(bu.description || &quot;&quot;);
    // Owner block for BU: always direct, never inherited
    if (bu.owner) {
      ownerNameEl.textContent = bu.owner;
      ownerDescEl.innerHTML = marked.parse(bu.owner_description || &quot;&quot;);
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
  } else if (type === &quot;fn&quot;) {
    const bu = state.bus.find(b => b.id === buId);
    if (!bu) return;
    const fn = bu.functions.find(f => f.id === id);
    if (!fn) return;
    titleEl.textContent = fn.name;
    metaEl.textContent = `${bu.name} · ${fn.basis.replace(&quot;_&quot;, &quot; &quot;)}`;
    bodyEl.innerHTML = marked.parse(fn.description || &quot;&quot;);
    // Owner block for fn: direct if fn.owner set, else inherited from BU
    const effectiveOwner = fn.owner || bu.owner;
    if (effectiveOwner) {
      ownerNameEl.textContent = effectiveOwner;
      const isInherited = !fn.owner &amp;&amp; bu.owner;
      const descSrc = fn.owner_description || (isInherited ? bu.owner_description : &quot;&quot;);
      ownerDescEl.innerHTML = marked.parse(descSrc || &quot;&quot;);
      if (isInherited) {
        ownerDescEl.innerHTML += `<div class=&quot;inherited&quot;>(inherited from ${bu.name})</div>`;
      }
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
  }

  el.classList.add(&quot;visible&quot;);
  positionExplainer(el, evt);
}

// Position the explainer near the event/element, clamped to the main area.
// Accepts either a DOM event (uses clientX/Y) or a plain {x, y} in SVG coords.
function positionExplainer(el, evtOrPos) {
  const main = document.querySelector(&quot;main&quot;);
  const mainRect = main.getBoundingClientRect();
  const elW = 340;
  const elH = Math.min(el.scrollHeight || 300, mainRect.height * 0.7);
  const pad = 12;

  let anchorX, anchorY;
  if (evtOrPos &amp;&amp; typeof evtOrPos.clientX === &quot;number&quot;) {
    // DOM event — use viewport coords relative to main
    anchorX = evtOrPos.clientX - mainRect.left;
    anchorY = evtOrPos.clientY - mainRect.top;
  } else if (evtOrPos &amp;&amp; typeof evtOrPos.x === &quot;number&quot;) {
    // {x, y} from SVG — already relative to main since SVG fills main
    anchorX = evtOrPos.x;
    anchorY = evtOrPos.y;
  } else {
    anchorX = mainRect.width / 2;
    anchorY = mainRect.height / 2;
  }

  // Prefer right of anchor; flip to left if it overflows
  let left = anchorX + 20;
  let top = anchorY - 20;
  if (left + elW + pad > mainRect.width) {
    left = anchorX - elW - 20;
  }
  left = Math.max(pad, Math.min(mainRect.width - elW - pad, left));
  top = Math.max(pad, Math.min(mainRect.height - elH - pad, top));

  el.style.left = left + &quot;px&quot;;
  el.style.top = top + &quot;px&quot;;
  el.style.right = &quot;auto&quot;;
}

async function commitToGitHub(message) {
  const pat = getPAT();
  if (!pat) return;

  try {
    // Get current file SHA (if exists)
    const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `Bearer ${pat}`, Accept: &quot;application/vnd.github+json&quot; }
    });
    let sha = null;
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
    } else if (getRes.status !== 404) {
      throw new Error(`GET failed: ${getRes.status}`);
    }

    // Encode content
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));

    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      method: &quot;PUT&quot;,
      headers: {
        Authorization: `Bearer ${pat}`,
        Accept: &quot;application/vnd.github+json&quot;,
        &quot;Content-Type&quot;: &quot;application/json&quot;
      },
      body: JSON.stringify({
        message,
        content,
        sha: sha || undefined
      })
    });

    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`PUT failed: ${putRes.status} ${err.message || &quot;&quot;}`);
    }

    const result = await putRes.json();
    toast(`Saved: ${result.commit.sha.substring(0, 7)}`);
  } catch (err) {
    toast(&quot;Save failed: &quot; + err.message, true);
  }
}

async function loadVersion(sha) {
  try {
    const pat = getPAT();
    const headers = pat
      ? { Authorization: `Bearer ${pat}`, Accept: &quot;application/vnd.github.raw&quot; }
      : { Accept: &quot;application/vnd.github.raw&quot; };
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${sha}`, { headers });
    if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
    const text = await res.text();
    state = JSON.parse(text);
    migrateState(state);
    renderAll();
    toast(`Loaded ${sha.substring(0, 7)}`);
  } catch (err) {
    toast(&quot;Load failed: &quot; + err.message, true);
  }
}

function migrateState(s) {
  if (!s.volume) s.volume = {};
  if (s.volume.homes_per_year == null) s.volume.homes_per_year = 100;
  if (s.volume.contracts_per_year == null) s.volume.contracts_per_year = 100;
  if (s.volume.franchises_per_year == null) s.volume.franchises_per_year = 4;
  if (s.volume.franchises_from_map == null) s.volume.franchises_from_map = false;
  if (!Array.isArray(s.bus)) s.bus = [];
  s.bus.forEach(bu => {
    // BU-level owner fields
    if (bu.owner == null) bu.owner = &quot;&quot;;
    if (bu.owner_description == null) bu.owner_description = &quot;&quot;;
    if (!Array.isArray(bu.functions)) bu.functions = [];
    bu.functions.forEach(fn => {
      // Function-level owner fields (blank = inherits from BU)
      if (fn.owner == null) fn.owner = &quot;&quot;;
      if (fn.owner_description == null) fn.owner_description = &quot;&quot;;
      if (fn.external_rev_pct == null) {
        // Sensible default by BU: Core defaults to internal, others to external
        fn.external_rev_pct = (bu.id === &quot;fbx_core&quot;) ? 0 : 100;
      }
      if (fn.revenue_K == null) fn.revenue_K = 0;
      if (fn.cost_K == null) fn.cost_K = 0;
      if (fn.time_days == null) fn.time_days = 0;
      if (fn.headcount == null) fn.headcount = 0;
      if (!fn.basis) fn.basis = &quot;per_home&quot;;
    });
  });
  if (!s.handoffs) s.handoffs = SEED.handoffs;
  if (!s.customer_ownership) s.customer_ownership = SEED.customer_ownership;
  if (!Array.isArray(s.products)) {
    s.products = [&quot;ADUs&quot;, &quot;High Density Multi-Family&quot;, &quot;Bathroom Pods&quot;, &quot;SIPs&quot;];
  }
  return s;
}

// ============== BASIS NORMALIZATION ==============
// All functions roll up to annual $K.
function normalizeToAnnual(value_K, basis, volume) {
  switch (basis) {
    case &quot;per_home&quot;: return value_K * (volume.homes_per_year || 0);
    case &quot;per_contract&quot;: return value_K * (volume.contracts_per_year || 0);
    case &quot;per_franchise&quot;: return value_K * (volume.franchises_per_year || 0);
    case &quot;per_month&quot;: return value_K * 12;
    case &quot;per_year&quot;: return value_K;
    default: return value_K;
  }
}

function computeRollup() {
  const vol = state.volume;
  const perBU = {};
  let totalElimination = 0;
  let eliminationByBU = { first_mile: 0, fbx_core: 0, last_mile: 0 };

  state.bus.forEach(bu => {
    let rev = 0, cost = 0, hc = 0, extRev = 0, intRev = 0;
    bu.functions.forEach(fn => {
      const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, vol);
      const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, vol);
      const extPct = (fn.external_rev_pct == null ? 100 : fn.external_rev_pct) / 100;
      const fnExtRev = annualRev * extPct;
      const fnIntRev = annualRev * (1 - extPct);
      rev += annualRev;
      cost += annualCost;
      extRev += fnExtRev;
      intRev += fnIntRev;
      hc += fn.headcount || 0;
    });
    perBU[bu.id] = {
      revenue: rev,
      externalRevenue: extRev,
      internalRevenue: intRev,
      cost: cost,
      margin: rev - cost,
      headcount: hc
    };
    eliminationByBU[bu.id] = intRev;
    totalElimination += intRev;
  });

  // Gross = sum of all three (as if each BU were standalone)
  const gross = {
    revenue: Object.values(perBU).reduce((s, b) => s + b.revenue, 0),
    cost: Object.values(perBU).reduce((s, b) => s + b.cost, 0),
    headcount: Object.values(perBU).reduce((s, b) => s + b.headcount, 0)
  };
  gross.margin = gross.revenue - gross.cost;

  // Consolidated: eliminate internal revenue from both revenue and cost.
  // Assumption: every $ of internal revenue booked by one BU equals a $ of COGS
  // in another BU (transfer pricing at parity). Margin is preserved.
  const consolidated = {
    revenue: gross.revenue - totalElimination,
    cost: gross.cost - totalElimination,
    margin: gross.margin,
    headcount: gross.headcount
  };

  return { perBU, gross, elimination: totalElimination, eliminationByBU, consolidated };
}

    return &quot;$&quot; + Math.round(n) + &quot;K&quot;;
  };
  const cls = (n) => n >= 0 ? &quot;pos&quot; : &quot;neg&quot;;
  const buCard = (id, label) => {
    const b = r.perBU[id];

    return `

  };
  el.innerHTML = `

    ${buCard(&quot;fbx_core&quot;, &quot;FBX Core&quot;)}
    ${buCard(&quot;last_mile&quot;, &quot;Last Mile&quot;)}

      <h3>Consolidated</h3>

function renderFishbone() {
  const svg = d3.select(&quot;#chart&quot;);
  svg.selectAll(&quot;*&quot;).remove();

  const container = document.querySelector(&quot;main&quot;);
  const W = Math.max(1000, container.clientWidth - 40);
  const H = Math.max(620, container.clientHeight - 40);

  svg.attr(&quot;viewBox&quot;, `0 0 ${W} ${H}`)
     .attr(&quot;width&quot;, W).attr(&quot;height&quot;, H);

  // ---- Layout ----
  const marginL = 180, marginR = 220;

  const ownershipBandH = 16; // Customer ownership band, below headers
  const footerBandH = 30;    // Handoff labels, bottom
  const marginT = 20 + headerBandH + ownershipBandH + 10; // top breathing room for function stubs
  const marginB = 20 + footerBandH;
  const spineY = Math.round((marginT + (H - marginB)) / 2);
  const spineX1 = marginL;
  const spineX2 = W - marginR;
  const buCount = state.bus.length;
  const buWidth = (spineX2 - spineX1) / buCount;

  state.bus.forEach((bu, i) => {

    const headerG = svg.append(&quot;g&quot;)
      .style(&quot;cursor&quot;, &quot;pointer&quot;)

    // filled pill centered over zone

    headerG.append(&quot;rect&quot;)

      .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH / 2 + 5)

      .attr(&quot;fill&quot;, &quot;white&quot;)
      .attr(&quot;font-weight&quot;, 600)

      headerG.append(&quot;text&quot;)
        .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH + 12)

        .attr(&quot;fill&quot;, buColor)
        .attr(&quot;font-style&quot;, &quot;italic&quot;)
        .attr(&quot;font-size&quot;, 11)
        .text(bu.owner);

  const bandY = 14 + 26 + 18;  // was +6, added room for owner subheader
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1).attr(&quot;y&quot;, bandY)

  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;effect-box&quot;)
    .attr(&quot;x&quot;, effectX).attr(&quot;y&quot;, spineY - effectH / 2)
    .attr(&quot;width&quot;, effectW).attr(&quot;height&quot;, effectH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  const effectLines = wrapText(state.head, 18);
  const lineH = 16;
  const startY = spineY - ((effectLines.length - 1) * lineH) / 2 + 4;
  effectLines.forEach((line, i) => {
    svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;effect-text&quot;)
      .attr(&quot;x&quot;, effectX + effectW / 2)
      .attr(&quot;y&quot;, startY + i * lineH)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .text(line);
  });

  // ---- Products box on left end of spine ----
  const products = Array.isArray(state.products) ? state.products : [];
  const productsW = 150;
  const productsX = spineX1 - productsW - 8;
  // Dynamic height based on line count
  const productLineH = 15;
  const productTitleH = 18;
  const productsPad = 10;
  const productsH = productTitleH + (products.length * productLineH) + productsPad * 2;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;products-box&quot;)
    .attr(&quot;x&quot;, productsX).attr(&quot;y&quot;, spineY - productsH / 2)
    .attr(&quot;width&quot;, productsW).attr(&quot;height&quot;, productsH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  // Title
  svg.append(&quot;text&quot;)
    .attr(&quot;x&quot;, productsX + productsW / 2)
    .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH - 4)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
    .attr(&quot;font-size&quot;, 13)
    .attr(&quot;font-weight&quot;, 700)
    .text(&quot;Products&quot;);
  // Product list
  products.forEach((p, idx) => {
    svg.append(&quot;text&quot;)
      .attr(&quot;x&quot;, productsX + productsW / 2)
      .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH + 8 + idx * productLineH)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .attr(&quot;font-size&quot;, 11)
      .attr(&quot;opacity&quot;, 0.9)
      .text(p);
  });

  // ---- Function stubs (oblique — leaning left, away from effect) ----
  // Each bone's tip shifts left by sin(tilt) * height from its anchor.
  // We compute anchor X values in &quot;tip-space&quot; (where we want tips to land),
  // then shift right by that offset so tips end up in the right place.
  const TILT_DEG = 22;
  const TILT_SIN = Math.sin(TILT_DEG * Math.PI / 180);

  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneInnerPad = 20;
    const zoneInnerLeft = zoneX + zoneInnerPad;
    const zoneInnerRight = zoneX + buWidth - zoneInnerPad;
    const buColor = `var(${bu.color_var})`;

    const topFns = [];
    const botFns = [];
    bu.functions.forEach((fn, j) => {
      if (j % 2 === 0) topFns.push(fn);
      else botFns.push(fn);
    });

    const stubHeightMax = spineY - marginT - 30;
    const stubHeightMin = 50;
    const heightFor = (idx, total) => {
      if (total <= 1) return stubHeightMin + (stubHeightMax - stubHeightMin) * 0.6;
      const ratios = [0.95, 0.65, 0.85, 0.55, 0.75, 0.45];
      const r = ratios[idx % ratios.length];
      return stubHeightMin + (stubHeightMax - stubHeightMin) * r;
    };

    const distributeTipX = (count, addSlot) => {
      const n = count + (addSlot ? 1 : 0);
      if (n === 0) return [];
      const positions = [];
      for (let k = 0; k < n; k++) {
        const t = (n === 1) ? 0.5 : (k + 0.5) / n;
        positions.push(zoneInnerLeft + (zoneInnerRight - zoneInnerLeft) * t);
      }
      return positions;
    };

    // Anchor X = desired tip X + (lean offset)
    // Spine intersects anchor at x. Tip at (x - sin*h, spineY ± cos*h).
    // So anchor = tipX + sin*h.
    const anchorFromTip = (tipX, h) => tipX + TILT_SIN * h;

    const addOnTop = topFns.length <= botFns.length;

    // Top stubs
    const topTipXs = distributeTipX(topFns.length, addOnTop);
    topFns.forEach((fn, idx) => {
      const h = heightFor(idx, topFns.length);
      const x = anchorFromTip(topTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, -1, h, buColor, false);
    });
    if (addOnTop) {
      const h = heightFor(topFns.length, topFns.length + 1) * 0.7;
      const x = anchorFromTip(topTipXs[topFns.length], h);
      drawStub(svg, null, bu, x, spineY, -1, h, buColor, true);
    }

    // Bottom stubs
    const botTipXs = distributeTipX(botFns.length, !addOnTop);
    botFns.forEach((fn, idx) => {
      const h = heightFor(idx, botFns.length);
      const x = anchorFromTip(botTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, 1, h, buColor, false);
    });
    if (!addOnTop) {
      const h = heightFor(botFns.length, botFns.length + 1) * 0.7;
      const x = anchorFromTip(botTipXs[botFns.length], h);
      drawStub(svg, null, bu, x, spineY, 1, h, buColor, true);
    }
  });
}

// Draw a single vertical function stub.
// fn=null signals the &quot;+ add input&quot; placeholder.
function drawStub(svg, fn, bu, x, spineY, dir, height, color, isAddPrompt) {
  // Oblique bone: tip leans LEFT (away from the effect / fish head on the right)
  // This is the classic Ishikawa orientation — inputs fan back from the effect.
  // Angle from vertical: ~22deg (68deg from horizontal)
  const tiltDeg = 22;
  const tiltRad = tiltDeg * Math.PI / 180;
  const tipX = x - Math.sin(tiltRad) * height;
  const tipY = spineY + dir * Math.cos(tiltRad) * height;
  const dotR = 5;

  // bone line
  const line = svg.append(&quot;line&quot;)
    .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, tipX).attr(&quot;y2&quot;, tipY)
    .attr(&quot;stroke&quot;, color)
    .attr(&quot;stroke-width&quot;, isAddPrompt ? 1 : 1.8)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.5 : 0.85);
  if (isAddPrompt) line.attr(&quot;stroke-dasharray&quot;, &quot;3 3&quot;);

  // tip dot
  svg.append(&quot;circle&quot;)
    .attr(&quot;cx&quot;, tipX).attr(&quot;cy&quot;, tipY).attr(&quot;r&quot;, dotR)
    .attr(&quot;fill&quot;, color)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.5 : 1);

  // label positioned above/below the tip
  const labelY = tipY + dir * (dotR + 12);
  const text = isAddPrompt ? &quot;+ add input&quot; : (fn ? fn.name : &quot;&quot;);
  const isActive = !isAddPrompt &amp;&amp; fn &amp;&amp; selection &amp;&amp; selection.type === &quot;fn&quot; &amp;&amp; selection.fnId === fn.id;

  const label = svg.append(&quot;text&quot;)
    .attr(&quot;class&quot;, isAddPrompt ? &quot;&quot; : (&quot;fn-label&quot; + (isActive ? &quot; active&quot; : &quot;&quot;)))
    .attr(&quot;x&quot;, tipX).attr(&quot;y&quot;, labelY)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, isAddPrompt ? color : &quot;var(--text-primary)&quot;)
    .attr(&quot;font-size&quot;, isAddPrompt ? 11 : 12)
    .attr(&quot;font-style&quot;, isAddPrompt ? &quot;italic&quot; : &quot;normal&quot;)
    .attr(&quot;font-weight&quot;, isActive ? 600 : 400)
    .attr(&quot;opacity&quot;, isAddPrompt ? 0.75 : 1)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  const maxWidth = 110;
  const approxW = text.length * 6.2;
  if (approxW > maxWidth &amp;&amp; !isAddPrompt) {
    const lines = wrapText(text, 16);
    label.text(&quot;&quot;);
    lines.forEach((ln, li) => {
      label.append(&quot;tspan&quot;)
        .attr(&quot;x&quot;, tipX)
        .attr(&quot;dy&quot;, li === 0 ? 0 : 13)
        .text(ln);
    });
  } else {
    label.text(text);
  }

  // click/hover target covers the whole bone + label region
  const minX = Math.min(x, tipX) - 60;
  const maxX = Math.max(x, tipX) + 60;
  const clickGroup = svg.append(&quot;rect&quot;)
    .attr(&quot;x&quot;, minX).attr(&quot;y&quot;, Math.min(spineY, labelY) - 8)
    .attr(&quot;width&quot;, maxX - minX).attr(&quot;height&quot;, Math.abs(labelY - spineY) + 20)
    .attr(&quot;fill&quot;, &quot;transparent&quot;)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  if (isAddPrompt) {
    clickGroup.on(&quot;click&quot;, () => {
      const bu2 = state.bus.find(b => b.id === bu.id);
      const newId = &quot;fn_&quot; + Date.now();
      const defaultExt = bu2.id === &quot;fbx_core&quot; ? 0 : 100;
      bu2.functions.push({
        id: newId, name: &quot;New Function&quot;, description: &quot;&quot;,
        revenue_K: 0, cost_K: 0, time_days: 0, headcount: 0,
        basis: &quot;per_home&quot;, external_rev_pct: defaultExt,
        owner: &quot;&quot;, owner_description: &quot;&quot;
      });
      selection = { type: &quot;fn&quot;, buId: bu.id, fnId: newId };
      renderAll();
    });
  } else if (fn) {
    clickGroup
      .on(&quot;click&quot;, () => {
        selection = { type: &quot;fn&quot;, buId: bu.id, fnId: fn.id };
        renderAll();
      })
      .on(&quot;mouseenter&quot;, function(e) { showExplainer(&quot;fn&quot;, fn.id, e, bu.id); })
      .on(&quot;mouseleave&quot;, () => hideExplainerIfNotPinned());
  }
}

// Simple text wrapper for multi-line effect label
function wrapText(text, maxChars) {
  const words = String(text || &quot;&quot;).split(/\s+/);
  const lines = [];
  let cur = &quot;&quot;;
  for (const w of words) {
    if ((cur + &quot; &quot; + w).trim().length > maxChars &amp;&amp; cur) {
      lines.push(cur.trim());
      cur = w;
    } else {
      cur = (cur + &quot; &quot; + w).trim();
    }
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 3);
}

// ============== EXPLAINER ==============
// Explainer is persistent: stays open until user clicks ×. Positioned
// near the element that triggered it (with viewport clamping).
// `showExplainer` takes an optional DOM event so we can anchor to
// the actual click/hover position.
function showExplainer(type, id, evt, buId) {
  const el = document.getElementById(&quot;explainer&quot;);
  const titleEl = document.getElementById(&quot;explainer-title&quot;);
  const bodyEl = document.getElementById(&quot;explainer-body&quot;);
  const metaEl = document.getElementById(&quot;explainer-meta&quot;);
  const ownerBlock = document.getElementById(&quot;explainer-owner&quot;);
  const ownerNameEl = document.getElementById(&quot;explainer-owner-name&quot;);
  const ownerDescEl = document.getElementById(&quot;explainer-owner-desc&quot;);

  if (type === &quot;bu&quot;) {
    const bu = state.bus.find(b => b.id === id);
    if (!bu) return;
    titleEl.textContent = bu.name;
    metaEl.textContent = &quot;Business Unit&quot;;
    bodyEl.innerHTML = marked.parse(bu.description || &quot;&quot;);
    // Owner block for BU: always direct, never inherited
    if (bu.owner) {
      ownerNameEl.textContent = bu.owner;
      ownerDescEl.innerHTML = marked.parse(bu.owner_description || &quot;&quot;);
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
  } else if (type === &quot;fn&quot;) {
    const bu = state.bus.find(b => b.id === buId);
    if (!bu) return;
    const fn = bu.functions.find(f => f.id === id);
    if (!fn) return;
    titleEl.textContent = fn.name;
    metaEl.textContent = `${bu.name} · ${fn.basis.replace(&quot;_&quot;, &quot; &quot;)}`;
    bodyEl.innerHTML = marked.parse(fn.description || &quot;&quot;);
    // Owner block for fn: direct if fn.owner set, else inherited from BU
    const effectiveOwner = fn.owner || bu.owner;
    if (effectiveOwner) {
      ownerNameEl.textContent = effectiveOwner;
      const isInherited = !fn.owner &amp;&amp; bu.owner;
      const descSrc = fn.owner_description || (isInherited ? bu.owner_description : &quot;&quot;);
      ownerDescEl.innerHTML = marked.parse(descSrc || &quot;&quot;);
      if (isInherited) {
        ownerDescEl.innerHTML += `<div class=&quot;inherited&quot;>(inherited from ${bu.name})</div>`;
      }
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
  }

  el.classList.add(&quot;visible&quot;);
  positionExplainer(el, evt);
}

// Position the explainer near the event/element, clamped to the main area.
// Accepts either a DOM event (uses clientX/Y) or a plain {x, y} in SVG coords.
function positionExplainer(el, evtOrPos) {
  const main = document.querySelector(&quot;main&quot;);
  const mainRect = main.getBoundingClientRect();
  const elW = 340;
  const elH = Math.min(el.scrollHeight || 300, mainRect.height * 0.7);
  const pad = 12;

  let anchorX, anchorY;
  if (evtOrPos &amp;&amp; typeof evtOrPos.clientX === &quot;number&quot;) {
    // DOM event — use viewport coords relative to main
    anchorX = evtOrPos.clientX - mainRect.left;
    anchorY = evtOrPos.clientY - mainRect.top;
  } else if (evtOrPos &amp;&amp; typeof evtOrPos.x === &quot;number&quot;) {
    // {x, y} from SVG — already relative to main since SVG fills main
    anchorX = evtOrPos.x;
    anchorY = evtOrPos.y;
  } else {
    anchorX = mainRect.width / 2;
    anchorY = mainRect.height / 2;
  }

  // Prefer right of anchor; flip to left if it overflows
  let left = anchorX + 20;
  let top = anchorY - 20;
  if (left + elW + pad > mainRect.width) {
    left = anchorX - elW - 20;
  }
  left = Math.max(pad, Math.min(mainRect.width - elW - pad, left));
  top = Math.max(pad, Math.min(mainRect.height - elH - pad, top));

  el.style.left = left + &quot;px&quot;;
  el.style.top = top + &quot;px&quot;;
  el.style.right = &quot;auto&quot;;
}

// Close handler — the ONLY way to hide the explainer
document.getElementById(&quot;explainer-close&quot;).addEventListener(&quot;click&quot;, () => {
  document.getElementById(&quot;explainer&quot;).classList.remove(&quot;visible&quot;);
});

async function commitToGitHub(message) {
  const pat = getPAT();
  if (!pat) return;

  try {
    // Get current file SHA (if exists)
    const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `Bearer ${pat}`, Accept: &quot;application/vnd.github+json&quot; }
    });
    let sha = null;
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
    } else if (getRes.status !== 404) {
      throw new Error(`GET failed: ${getRes.status}`);
    }

    // Encode content
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));

    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      method: &quot;PUT&quot;,
      headers: {
        Authorization: `Bearer ${pat}`,
        Accept: &quot;application/vnd.github+json&quot;,
        &quot;Content-Type&quot;: &quot;application/json&quot;
      },
      body: JSON.stringify({
        message,
        content,
        sha: sha || undefined
      })
    });

    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`PUT failed: ${putRes.status} ${err.message || &quot;&quot;}`);
    }

    const result = await putRes.json();
    toast(`Saved: ${result.commit.sha.substring(0, 7)}`);
  } catch (err) {
    toast(&quot;Save failed: &quot; + err.message, true);
  }
}

async function loadVersion(sha) {
  try {
    const pat = getPAT();
    const headers = pat
      ? { Authorization: `Bearer ${pat}`, Accept: &quot;application/vnd.github.raw&quot; }
      : { Accept: &quot;application/vnd.github.raw&quot; };
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${sha}`, { headers });
    if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
    const text = await res.text();
    state = JSON.parse(text);
    migrateState(state); _applyExcelData(state);
    renderAll();
    toast(`Loaded ${sha.substring(0, 7)}`);
  } catch (err) {
    toast(&quot;Load failed: &quot; + err.message, true);
  }
}

}

  }catch(err){
    _setStatus('error','Save failed');
    _toast('Save failed: '+err.message,true);
    setTimeout(_hideStatus,5000);
  }
  document.getElementById('svm-commit').disabled=false;
}

function _setStatus(t,m){var e=document.getElementById('save-status');e.className='show '+t;document.getElementById('save-status-text').textContent=m;}
function _hideStatus(){document.getElementById('save-status').className='';}
function _toggleVers(){var p=document.getElementById('ver-panel');var s=p.style.display!=='block';p.style.display=s?'block':'none';if(s)_refreshVers();}
function _refreshVers(){
  var el=document.getElementById('ver-list'),vers=_vers[_cur]||[];
  if(!vers.length){el.innerHTML='<div class="ver-empty">No saved versions yet.</div>';return;}
  el.innerHTML=vers.map(function(v){return'<div class="ver-item"><div class="ver-name">'+_esc(v.name)+'</div><div class="ver-ts">'+_esc(v.tsDisplay)+'</div></div>';}).join('');
}
function _sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function _toast(msg,err){var t=document.getElementById('nav-toast');t.textContent=msg;t.style.borderLeftColor=err?'#C00000':'#639922';t.style.opacity='1';t.style.transform='translateY(0)';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(8px)'},4000);}
function _esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}

document.querySelectorAll('.nav-tab').forEach(function(b){b.addEventListener('click',function(){_switchPage(b.dataset.page)});});
document.getElementById('nav-save-btn').addEventListener('click',_openModal);
document.getElementById('svm-cancel').addEventListener('click',_closeModal);
document.getElementById('svm-commit').addEventListener('click',_doSave);
document.getElementById('save-modal').addEventListener('click',function(e){if(e.target===this)_closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')_closeModal()});
document.getElementById('svm-name').addEventListener('keydown',function(e){if(e.key==='Enter')_doSave()});
document.addEventListener('click',function(e){var p=document.getElementById('ver-panel');if(p.style.display==='block'&&!p.contains(e.target)&&e.target.id!=='nav-ver-btn')p.style.display='none';});
window.addEventListener('message',function(e){if(!e.data)return;if(e.data.type==='fbx-toast')_toast(e.data.msg,e.data.err);if(e.data.type==='fbx-request-save')_openModal();});
_switchPage('map');
</script></body></html>
