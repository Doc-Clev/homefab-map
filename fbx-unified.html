// ---- Map ----
function updateMap() {
  if (!mapProjection) return;
  const svg = d3.select('#map');

  // --- Hub service-range circles (under everything) ---
  // 500-mile radius concentric circles around each FBX Core hub.
  // Pixel radius is computed per-hub using the projection: we project a point
  // 500 miles due east at the hub's latitude and measure the screen distance,
  // so the circle is geographically accurate regardless of Albers distortion.
  let rangeG = svg.select('g.hub-ranges-layer');
  if (rangeG.empty()) rangeG = svg.append('g').attr('class', 'hub-ranges-layer');
  const rangeMiles = 500;
  const milesPerDegLat = 69.0;  // close enough for this purpose
  function rangePx(hub) {
    const center = mapProjection([hub.lon, hub.lat]);
    if (!center) return 0;
    // Offset 500 mi east — longitude degrees per mile depends on cos(latitude)
    const milesPerDegLon = Math.cos(hub.lat * Math.PI / 180) * milesPerDegLat;
    const dLon = rangeMiles / milesPerDegLon;
    const edge = mapProjection([hub.lon + dLon, hub.lat]);
    if (!edge) return 0;
    return Math.hypot(edge[0] - center[0], edge[1] - center[1]);
  }
  const rangeJoin = rangeG.selectAll('circle.hub-range').data(hubs, d => d._id);
  rangeJoin.exit().remove();
  rangeJoin.enter().append('circle').attr('class', 'hub-range')
    .merge(rangeJoin)
    .attr('class', d => 'hub-range' + (d.opens_yr > currentYear ? ' dim' : ''))
    .attr('cx', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -1000; })
    .attr('cy', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] : -1000; })
    .attr('r', d => rangePx(d));

  // --- Routes layer (under dots) ---
  let routeG = svg.select('g.routes-layer');
  if (routeG.empty()) routeG = svg.append('g').attr('class', 'routes-layer');
  const showRoutes = document.getElementById('show-routes') &amp;&amp; document.getElementById('show-routes').checked;
  if (showRoutes) {
    const activeH = hubs.filter(h => h.opens_yr <= currentYear);
    const routes = sites
      .filter(s => s.yr <= currentYear)
      .map(s => {
        const a = assignHub(s, activeH);
        if (!a) return null;
        const fp = mapProjection([s.lon, s.lat]);
        const hp = mapProjection([a.hub.lon, a.hub.lat]);
        if (!fp || !hp) return null;
        return { id: s._id, x1: fp[0], y1: fp[1], x2: hp[0], y2: hp[1] };
      })
      .filter(Boolean);
    const rJoin = routeG.selectAll('line').data(routes, d => d.id);
    rJoin.exit().remove();
    rJoin.enter().append('line').attr('class', 'route-line')
      .merge(rJoin)
      .attr('x1', d => d.x1).attr('y1', d => d.y1)
      .attr('x2', d => d.x2).attr('y2', d => d.y2);
  } else {
    routeG.selectAll('line').remove();
  }

  // --- Fab dots ---
  let g = svg.select('g.dots-layer');
  if (g.empty()) g = svg.append('g').attr('class', 'dots-layer');
  const join = g.selectAll('circle').data(sites, d => d._id);
  join.exit().remove();
  const enter = join.enter().append('circle').attr('r', 4.5).attr('class', d => 'dot p' + d.phase);
  enter.merge(join)
    .attr('class', d => 'dot p' + d.phase + (d.yr > currentYear ? ' dim' : '') + (d._id === hoveredRowId ? ' hl' : ''))
    .attr('cx', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -100; })
    .attr('cy', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] : -100; });

  const tip = document.getElementById('tip');
  const mapEl = document.querySelector('.map');
  g.selectAll('circle')
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('r', 7);
      const activeH = hubs.filter(h => h.opens_yr <= currentYear);
      const assignInfo = assignHub(d, activeH);
      const hubTxt = assignInfo ? ` · ${assignInfo.hub.name} (${Math.round(assignInfo.dist_mi)} mi)` : '';
      const capTxt = (d.capex != null &amp;&amp; d.capex !== '') ? ` · $${(+d.capex).toFixed(1)}M capex` : '';
      tip.innerHTML = `<strong>${escapeHtml(d.name)}, ${escapeHtml(d.state)}</strong><div class=&quot;meta&quot;>Year ${d.yr} · Phase ${d.phase}${hubTxt}${capTxt}</div>`;
      tip.style.opacity = '1';
    })
    .on('mousemove', function(e) {
      const rect = mapEl.getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 12) + 'px';
      tip.style.top = (e.clientY - rect.top - 8) + 'px';
    })
    .on('mouseleave', function() {
      d3.select(this).attr('r', 4.5);
      tip.style.opacity = '0';
    });

  // --- Hub diamonds (on top of dots) ---
  let hubG = svg.select('g.hubs-layer');
  if (hubG.empty()) hubG = svg.append('g').attr('class', 'hubs-layer');
  const hubJoin = hubG.selectAll('g.hub-group').data(hubs, d => d._id);
  hubJoin.exit().remove();
  const hubEnter = hubJoin.enter().append('g').attr('class', 'hub-group');
  hubEnter.append('path').attr('class', 'hub');
  hubEnter.append('text').attr('class', 'hub-label');
  const hubMerged = hubEnter.merge(hubJoin);
  hubMerged.select('path')
    .attr('d', d => {
      const p = mapProjection([d.lon, d.lat]);
      if (!p) return '';
      const s = 9;  // half-diagonal
      return `M${p[0]},${p[1]-s} L${p[0]+s},${p[1]} L${p[0]},${p[1]+s} L${p[0]-s},${p[1]} Z`;
    })
    .attr('class', d => 'hub' + (d.opens_yr > currentYear ? ' dim' : ''));
  hubMerged.select('text')
    .attr('x', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -100; })
    .attr('y', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] - 14 : -100; })
    .attr('text-anchor', 'middle')
    .text(d => d.opens_yr <= currentYear ? d.city.split(/[\s-]/)[0] : '');

  // Hub hover tooltip
  hubMerged.on('mouseenter', function(e, d) {
    const assigned = sites.filter(s => {
      const activeH = hubs.filter(h => h.opens_yr <= Math.max(currentYear, s.yr));
      const a = assignHub(s, activeH);
      return a &amp;&amp; a.hub._id === d._id;
    }).length;
    tip.innerHTML = `<strong>${escapeHtml(d.name)}</strong><div class=&quot;meta&quot;>${escapeHtml(d.city)}, ${escapeHtml(d.state)} · opens Yr ${d.opens_yr} · ${assigned} Fabs</div>`;
    tip.style.opacity = '1';
  })
  .on('mousemove', function(e) {
    const rect = mapEl.getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 12) + 'px';
    tip.style.top = (e.clientY - rect.top - 8) + 'px';
  })
  .on('mouseleave', function() {
    tip.style.opacity = '0';
  });
}

function highlightDot(id) {
  hoveredRowId = id;
  updateMap();
}

function play() {
  const slider = document.getElementById('yr');
  const btn = document.getElementById('play-btn');
  if (playTimer) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
  btn.textContent = '⏸ Pause';
  let y = 1;
  slider.value = 1;
  currentYear = 1;
  document.getElementById('yr-out').textContent = '1';
  updateMap(); updateDashboard();
  playTimer = setInterval(() => {
    y++;
    if (y > 10) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
    slider.value = y;
    currentYear = y;
    document.getElementById('yr-out').textContent = String(y);
    updateMap(); updateDashboard();
  }, 800);
}

/* ============================================================
   GitHub versioning module
   ------------------------------------------------------------
   Commits the full plan (sites + hubs + assumptions) to a file
   in a user-configured GitHub repo. Uses the GitHub Contents API
   with a fine-grained Personal Access Token stored locally.
   ============================================================ */

function ghLoadConfig() {
  try {
    const raw = localStorage.getItem(GH_CONFIG_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function ghSaveConfigData(cfg) {
  try { localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg)); } catch(e) {}
}

function ghConfig() {
  const cfg = ghLoadConfig() || {};
  document.getElementById('gh-owner').value = cfg.owner || '';
  document.getElementById('gh-repo').value = cfg.repo || '';
  document.getElementById('gh-branch').value = cfg.branch || 'main';
  document.getElementById('gh-path').value = cfg.path || 'sites.json';
  document.getElementById('gh-token').value = cfg.token || '';
  openModal('gh-config-modal');
}

function ghSaveConfig() {
  const cfg = {
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    path: document.getElementById('gh-path').value.trim() || 'sites.json',
    token: document.getElementById('gh-token').value.trim()
  };
  if (!cfg.owner || !cfg.repo) { toast('Owner and repo are required'); return; }
  ghSaveConfigData(cfg);
  closeModal('gh-config-modal');
  toast('GitHub settings saved');
  ghRefreshDropdown();
}

function ghClearConfig() {
  if (!confirm('Remove saved GitHub token and config from this browser?')) return;
  localStorage.removeItem(GH_CONFIG_KEY);
  document.getElementById('gh-owner').value = '';
  document.getElementById('gh-repo').value = '';
  document.getElementById('gh-branch').value = 'main';
  document.getElementById('gh-path').value = 'sites.json';
  document.getElementById('gh-token').value = '';
  const picker = document.getElementById('version-picker');
  if (picker) picker.style.display = 'none';
  toast('GitHub config cleared');
}

async function ghTestConnection() {
  const cfg = {
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    token: document.getElementById('gh-token').value.trim()
  };
  if (!cfg.owner || !cfg.repo || !cfg.token) { toast('Fill in owner, repo, and token first'); return; }
  try {
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (r.ok) {
      const repo = await r.json();
      toast(`✓ Connected to ${repo.full_name} (${repo.private ? 'private' : 'public'})`);
    } else if (r.status === 401) {
      toast('✗ Token invalid or expired');
    } else if (r.status === 404) {
      toast('✗ Repo not found — check owner/repo name, and that the token has access');
    } else {
      toast(`✗ GitHub API error: ${r.status}`);
    }
  } catch(e) {
    toast('✗ Network error: ' + e.message);
  }
}

function ghRequireConfig() {
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    toast('Configure GitHub settings first');
    ghConfig();
    return null;
  }
  return cfg;
}

function ghBuildPayload() {
  // Mirror the exportJSON payload shape so the file is compatible with
  // the existing sites.json fetch flow and Import.
  const cleanSites = sites.map(({_id, ...rest}) => rest);
  const cleanHubs = hubs.map(({_id, ...rest}) => rest);
  return {
    version: 2,
    exported_at: new Date().toISOString(),
    sites: cleanSites,
    hubs: cleanHubs,
    assumptions: assumptions
  };
}

// base64-encode a UTF-8 string (needed for GitHub Contents API)
function ghB64Encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function ghB64Decode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\n/g, ''))));
}

/* ----- Custom version name handling -----
   Commit messages are formatted as &quot;[<name>] <description>&quot; so the dropdown
   can parse a friendly label back out of git history without needing a
   separate tagging API. Name is constrained to URL-safe chars to keep it
   tidy in the UI. ---------------------------------------------------------- */

function ghSanitizeVersionName(raw) {
  return (raw || '').trim()
    .replace(/[^A-Za-z0-9._-]/g, '-')
    .replace(/-+/g, '-')
    .replace(/^[-.]+|[-.]+$/g, '')
    .slice(0, 60);
}

function ghBuildCommitMessage(name, desc) {
  const clean = ghSanitizeVersionName(name);
  const d = (desc || '').trim();
  if (clean &amp;&amp; d) return `[${clean}] ${d}`;
  if (clean) return `[${clean}]`;
  if (d) return d;
  return '';
}

// Extract the [name] prefix from a commit message. Returns { name, desc }.
function ghParseCommitMessage(msg) {
  if (!msg) return { name: '', desc: '' };
  const firstLine = msg.split('\n')[0];
  const m = firstLine.match(/^\[([A-Za-z0-9._-]{1,60})\]\s*(.*)$/);
  if (m) return { name: m[1], desc: m[2] };
  return { name: '', desc: firstLine };
}

function ghUpdateCommitPreview() {
  const name = document.getElementById('gh-version-name').value;
  const desc = document.getElementById('gh-commit-msg').value;
  const msg = ghBuildCommitMessage(name, desc);
  const el = document.getElementById('gh-commit-preview');
  if (!el) return;
  el.textContent = msg || '(commit message will be empty — enter a version name or description)';
}

function ghSave() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  document.getElementById('gh-save-target').textContent = `${cfg.owner}/${cfg.repo} · ${cfg.branch} · ${cfg.path}`;
  // Suggest a default version name from the timestamp so users can hit Save
  // with no manual typing if they want. Format: v2026-04-19-1542
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const suggested = `v${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  document.getElementById('gh-version-name').value = suggested;
  document.getElementById('gh-commit-msg').value = '';
  const summary = `${sites.length} Fabs · ${hubs.length} Core hubs · ${Object.keys(assumptions).length} assumptions`;
  document.getElementById('gh-save-summary').textContent = summary;
  ghUpdateCommitPreview();
  openModal('gh-save-modal');
  setTimeout(() => document.getElementById('gh-version-name').select(), 50);
}

async function ghDoCommit() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const name = document.getElementById('gh-version-name').value.trim();
  const desc = document.getElementById('gh-commit-msg').value.trim();
  const msg = ghBuildCommitMessage(name, desc);
  if (!msg) { toast('Enter a version name or description'); return; }

  const btn = document.getElementById('gh-commit-btn');
  btn.disabled = true; btn.textContent = 'Committing…';

  // Diagnostic trail — printed to console so you can see exactly what happened
  // even if the toast is missed. Never logs the token.
  const diag = [];
  const log = (s) => { diag.push(s); console.log('[ghDoCommit]', s); };

  try {
    log(`Target: ${cfg.owner}/${cfg.repo} @ ${cfg.branch} · ${cfg.path}`);
    log(`Message: &quot;${msg}&quot;`);

    // 1. Get current file SHA (if it exists) — required for updates
    let existingSha = null;
    const getUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}?ref=${encodeURIComponent(cfg.branch)}`;
    log(`GET ${getUrl}`);
    let getResp;
    try {
      getResp = await fetch(getUrl, {
        headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
      });
    } catch(netErr) {
      throw new Error(`Network error fetching current SHA: ${netErr.message}. Check connectivity.`);
    }
    log(`GET status: ${getResp.status}`);

    if (getResp.ok) {
      const existing = await getResp.json();
      existingSha = existing.sha;
      log(`Existing file SHA: ${existingSha}`);
    } else if (getResp.status === 404) {
      log('File does not exist yet — will create on PUT');
    } else if (getResp.status === 401) {
      throw new Error(`Token invalid or expired (401). Regenerate a fine-grained PAT in GitHub settings.`);
    } else if (getResp.status === 403) {
      const e = await getResp.json().catch(() => ({}));
      throw new Error(`403 Forbidden: ${e.message || 'Token lacks Contents: Read &amp; Write on this repo, or rate limit hit'}`);
    } else if (getResp.status === 404) {
      // already handled above
    } else {
      const e = await getResp.json().catch(() => ({}));
      throw new Error(`SHA lookup failed (${getResp.status}): ${e.message || 'unknown'}`);
    }

    // 2. PUT the new content
    const payload = ghBuildPayload();
    const content = ghB64Encode(JSON.stringify(payload, null, 2));
    const putUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}`;
    const body = {
      message: msg,
      content: content,
      branch: cfg.branch
    };
    if (existingSha) body.sha = existingSha;
    log(`PUT ${putUrl} (payload ${content.length} b64 chars, sha=${existingSha ? existingSha.slice(0,7) : 'none'})`);

    let putResp;
    try {
      putResp = await fetch(putUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${cfg.token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
    } catch(netErr) {
      throw new Error(`Network error during PUT: ${netErr.message}`);
    }
    log(`PUT status: ${putResp.status}`);

    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({}));
      const hint = putResp.status === 409
        ? ' (SHA conflict — click Refresh in the version dropdown, then try again)'
        : putResp.status === 422
        ? ' (invalid request — check branch name and file path)'
        : '';
      throw new Error(`PUT ${putResp.status}: ${err.message || 'unknown'}${hint}`);
    }

    const result = await putResp.json();
    const sha = result.commit &amp;&amp; result.commit.sha ? result.commit.sha.slice(0, 7) : '';
    log(`Commit SHA: ${sha}`);
    closeModal('gh-save-modal');
    const label = name ? ghSanitizeVersionName(name) : sha;
    toast(`✓ Saved &quot;${label}&quot; (${sha})`);
    // Refresh the dropdown so the new version appears immediately
    ghRefreshDropdown();
  } catch(e) {
    console.error('[ghDoCommit] Full diagnostic trail:', diag);
    console.error('[ghDoCommit] Error:', e);
    toast('✗ Commit failed: ' + e.message, 6000);
  } finally {
    btn.disabled = false; btn.textContent = 'Commit to GitHub';
  }
}

let ghSelectedSha = null;

async function ghLoad() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  document.getElementById('gh-load-target').textContent = `${cfg.owner}/${cfg.repo} · ${cfg.branch} · ${cfg.path}`;
  ghSelectedSha = null;
  document.getElementById('gh-load-btn').disabled = true;
  openModal('gh-load-modal');
  await ghRefreshVersions();
}

async function ghRefreshVersions() {
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const status = document.getElementById('gh-load-status');
  const list = document.getElementById('gh-version-list');
  status.textContent = 'Loading commit history…';
  status.style.display = 'block';
  list.style.display = 'none';
  list.innerHTML = '';

  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/commits?path=${encodeURIComponent(cfg.path)}&amp;sha=${encodeURIComponent(cfg.branch)}&amp;per_page=50`;
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) {
      if (resp.status === 404) {
        status.textContent = `No commits found for ${cfg.path}. Save a version first.`;
        return;
      }
      throw new Error(`${resp.status}`);
    }
    const commits = await resp.json();
    if (!commits.length) {
      status.textContent = `No commits yet for ${cfg.path}. Save a version first.`;
      return;
    }
    commits.forEach(c => {
      const sha = c.sha;
      const shortSha = sha.slice(0, 7);
      const msg = c.commit &amp;&amp; c.commit.message ? c.commit.message : '(no message)';
      const author = c.commit &amp;&amp; c.commit.author ? c.commit.author.name : '';
      const date = c.commit &amp;&amp; c.commit.author &amp;&amp; c.commit.author.date
        ? new Date(c.commit.author.date).toLocaleString() : '';
      const div = document.createElement('div');
      div.className = 'version-item';
      div.dataset.sha = sha;
      div.innerHTML = `
        <div style=&quot;flex:1; min-width:0&quot;>
          <div class=&quot;version-msg&quot;>${escapeHtml(msg.split('\n')[0])}</div>
          <div class=&quot;version-date&quot;>${escapeHtml(author)} · ${escapeHtml(date)}</div>
        </div>
        <div class=&quot;version-meta&quot;>${shortSha}</div>`;
      div.onclick = () => ghSelectVersion(sha, div);
      list.appendChild(div);
    });
    status.style.display = 'none';
    list.style.display = 'block';
  } catch(e) {
    status.textContent = '✗ Failed to load commits: ' + e.message;
  }
}

function ghSelectVersion(sha, el) {
  ghSelectedSha = sha;
  document.querySelectorAll('.version-item').forEach(n => n.classList.remove('selected'));
  if (el) el.classList.add('selected');
  document.getElementById('gh-load-btn').disabled = false;
}

async function ghLoadSelected() {
  if (!ghSelectedSha) return;
  const cfg = ghRequireConfig();
  if (!cfg) return;
  const btn = document.getElementById('gh-load-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    await ghLoadBySha(ghSelectedSha, cfg);
    closeModal('gh-load-modal');
  } catch(e) {
    toast('✗ Load failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Load selected version';
  }
}

async function ghLoadBySha(sha, cfg) {
  // Fetch the file at a specific commit using Contents API with ref=<sha>
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}?ref=${encodeURIComponent(sha)}`;
  const resp = await fetch(url, {
    headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
  });
  if (!resp.ok) throw new Error(`GET failed: ${resp.status}`);
  const data = await resp.json();
  const raw = ghB64Decode(data.content);
  const payload = JSON.parse(raw);
  ghApplyPayload(payload);
  toast(`✓ Loaded version ${sha.slice(0, 7)}`);
}

function ghApplyPayload(payload) {
  if (!payload || typeof payload !== 'object') throw new Error('Invalid payload shape');
  if (Array.isArray(payload.sites)) {
    sites = JSON.parse(JSON.stringify(payload.sites));
    ensureIds();
    saveSites();
  }
  if (Array.isArray(payload.hubs) &amp;&amp; payload.hubs.length > 0) {
    hubs = JSON.parse(JSON.stringify(payload.hubs));
    ensureIds();
    saveHubs();
  }
  if (payload.assumptions &amp;&amp; typeof payload.assumptions === 'object') {
    assumptions = { ...DEFAULT_ASSUMPTIONS, ...payload.assumptions };
    applyAssumptionsToUI();
    saveAssumptions();
  }
  dataSource = 'local-edits';
  updateSourceIndicator();
  render();
}

// URL deep-linking: ?v=<sha> loads that specific commit on page load
async function ghMaybeLoadFromURL() {
  const params = new URLSearchParams(location.search);
  const sha = params.get('v');
  if (!sha) return;
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    toast('URL requests version ' + sha.slice(0, 7) + ' but GitHub is not configured');
    return;
  }
  try {
    await ghLoadBySha(sha, cfg);
  } catch(e) {
    toast('Could not load version from URL: ' + e.message);
  }
}

/* ============== Version picker dropdown ============== */

// In-memory cache of the last-fetched commits so the dropdown load handler
// can look up the SHA for a selected version without re-fetching.
let ghCommitCache = [];

async function ghRefreshDropdown() {
  const picker = document.getElementById('version-picker');
  const select = document.getElementById('version-select');
  const cfg = ghLoadConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) {
    // No GitHub config yet — keep dropdown hidden
    if (picker) picker.style.display = 'none';
    return;
  }
  if (picker) picker.style.display = 'inline-flex';

  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/commits?path=${encodeURIComponent(cfg.path)}&amp;sha=${encodeURIComponent(cfg.branch)}&amp;per_page=30`;
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) {
      // 404 likely means the file doesn't exist yet. Reset dropdown to empty.
      select.innerHTML = '<option value=&quot;&quot;>— no versions yet —</option>';
      ghCommitCache = [];
      return;
    }
    const commits = await resp.json();
    ghCommitCache = commits;
    if (!commits.length) {
      select.innerHTML = '<option value=&quot;&quot;>— no versions yet —</option>';
      return;
    }
    // Build options: &quot;version name · short description · date&quot;
    const opts = ['<option value=&quot;&quot;>— current (live) —</option>'];
    commits.forEach(c => {
      const sha = c.sha;
      const msg = c.commit &amp;&amp; c.commit.message ? c.commit.message : '';
      const { name, desc } = ghParseCommitMessage(msg);
      const date = c.commit &amp;&amp; c.commit.author &amp;&amp; c.commit.author.date
        ? new Date(c.commit.author.date) : null;
      const dateStr = date ? date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';
      // Label priority: custom name > first line of description > short SHA
      const label = name || (desc ? desc.slice(0, 40) : sha.slice(0, 7));
      const suffix = desc &amp;&amp; name ? ` · ${desc.slice(0, 40)}` : '';
      const dateSuffix = dateStr ? ` · ${dateStr}` : '';
      const fullText = `${label}${suffix}${dateSuffix}`;
      // escapeHtml is available globally
      opts.push(`<option value=&quot;${sha}&quot; title=&quot;${escapeHtml(msg)}&quot;>${escapeHtml(fullText)}</option>`);
    });
    // Preserve selection if the same SHA is still in the list
    const prev = select.value;
    select.innerHTML = opts.join('');
    if (prev &amp;&amp; [...select.options].some(o => o.value === prev)) select.value = prev;
  } catch(e) {
    // Silent fail — don't hide the dropdown, just log
    console.warn('Version dropdown refresh failed:', e);
  }
}

async function ghLoadFromDropdown(sha) {
  if (!sha) return;  // &quot;— current —&quot; selection
  const cfg = ghRequireConfig();
  if (!cfg) return;
  // If there are localStorage edits, confirm before overwriting
  // (We don't have a clean &quot;is dirty&quot; flag, so always confirm when switching versions)
  if (!confirm('Load this version? Any unsaved changes in the current view will be replaced.')) {
    // Reset dropdown to empty selection
    document.getElementById('version-select').value = '';
    return;
  }
  try {
    await ghLoadBySha(sha, cfg);
  } catch(e) {
    toast('✗ Load failed: ' + e.message);
    document.getElementById('version-select').value = '';
  }
}

<script>
const REPO = &quot;Doc-Clev/homefab-map&quot;;
const FILE_PATH = &quot;fishbone.json&quot;;

let state = null;
let pinnedExplainer = null;
let currentSha = null;

// ============== BASIS / ROLLUP ==============
function normalizeToAnnual(value_K, basis, volume) {
  switch (basis) {
    case &quot;per_home&quot;: return value_K * (volume.homes_per_year || 0);
    case &quot;per_contract&quot;: return value_K * (volume.contracts_per_year || 0);
    case &quot;per_franchise&quot;: return value_K * (volume.franchises_per_year || 0);
    case &quot;per_month&quot;: return value_K * 12;
    case &quot;per_year&quot;: return value_K;
    default: return value_K;
  }
}

function migrateState(s) {
  if (!s.volume) s.volume = {};
  if (s.volume.homes_per_year == null) s.volume.homes_per_year = 100;
  if (s.volume.contracts_per_year == null) s.volume.contracts_per_year = 100;
  if (s.volume.franchises_per_year == null) s.volume.franchises_per_year = 4;
  if (s.volume.franchises_from_map == null) s.volume.franchises_from_map = false;
  if (!Array.isArray(s.bus)) s.bus = [];
  s.bus.forEach(bu => {
    if (bu.owner == null) bu.owner = &quot;&quot;;
    if (bu.owner_description == null) bu.owner_description = &quot;&quot;;
    if (!Array.isArray(bu.functions)) bu.functions = [];
    bu.functions.forEach(fn => {
      if (fn.owner == null) fn.owner = &quot;&quot;;
      if (fn.owner_description == null) fn.owner_description = &quot;&quot;;
      if (fn.external_rev_pct == null) {
        fn.external_rev_pct = (bu.id === &quot;fbx_core&quot;) ? 0 : 100;
      }
      if (fn.revenue_K == null) fn.revenue_K = 0;
      if (fn.cost_K == null) fn.cost_K = 0;
      if (fn.time_days == null) fn.time_days = 0;
      if (fn.headcount == null) fn.headcount = 0;
      if (!fn.basis) fn.basis = &quot;per_home&quot;;
    });
  });
  if (!s.handoffs) s.handoffs = [];
  if (!s.customer_ownership) s.customer_ownership = { sales_owns_through: &quot;fbx_core&quot; };
  if (!Array.isArray(s.products)) {
    s.products = [&quot;ADUs&quot;, &quot;High Density Multi-Family&quot;, &quot;Bathroom Pods&quot;, &quot;SIPs&quot;];
  }
  return s;
}

function computeRollup() {
  const vol = state.volume;
  const perBU = {};
  let totalElimination = 0;

  state.bus.forEach(bu => {
    let rev = 0, cost = 0, hc = 0, extRev = 0, intRev = 0;
    bu.functions.forEach(fn => {
      const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, vol);
      const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, vol);
      const extPct = (fn.external_rev_pct == null ? 100 : fn.external_rev_pct) / 100;
      rev += annualRev;
      cost += annualCost;
      extRev += annualRev * extPct;
      intRev += annualRev * (1 - extPct);
      hc += fn.headcount || 0;
    });
    perBU[bu.id] = {
      revenue: rev, externalRevenue: extRev, internalRevenue: intRev,
      cost: cost, margin: rev - cost, headcount: hc
    };
    totalElimination += intRev;
  });

  const gross = {
    revenue: Object.values(perBU).reduce((s, b) => s + b.revenue, 0),
    cost: Object.values(perBU).reduce((s, b) => s + b.cost, 0),
    headcount: Object.values(perBU).reduce((s, b) => s + b.headcount, 0)
  };
  gross.margin = gross.revenue - gross.cost;

  const consolidated = {
    revenue: gross.revenue - totalElimination,
    cost: gross.cost - totalElimination,
    margin: gross.margin,
    headcount: gross.headcount
  };

  return { perBU, gross, elimination: totalElimination, consolidated };
}

// ============== RENDER ==============
function renderAll() {
  if (!state) return;
  renderRollup();
  renderVolume();
  renderFishbone();
}

function fmt(n) {
  if (Math.abs(n) >= 1000) return &quot;$&quot; + (n / 1000).toFixed(1) + &quot;M&quot;;
  return &quot;$&quot; + Math.round(n) + &quot;K&quot;;
}

function renderRollup() {
  const r = computeRollup();
  const cls = (n) => n >= 0 ? &quot;pos&quot; : &quot;neg&quot;;
  const buCard = (id, label) => {
    const b = r.perBU[id];
    if (!b) return &quot;&quot;;
    return `
    <div class=&quot;rollup&quot;>
      <h3>${label}</h3>
      <div class=&quot;row&quot;><span>Revenue</span><span class=&quot;val&quot;>${fmt(b.revenue)}</span></div>
      <div class=&quot;row&quot; style=&quot;font-size: 11px; color: var(--text-muted);&quot;>
        <span>· external</span><span class=&quot;val&quot;>${fmt(b.externalRevenue)}</span>
      </div>
      <div class=&quot;row&quot; style=&quot;font-size: 11px; color: var(--text-muted);&quot;>
        <span>· inter-BU</span><span class=&quot;val&quot;>${fmt(b.internalRevenue)}</span>
      </div>
      <div class=&quot;row&quot;><span>Cost</span><span class=&quot;val&quot;>${fmt(b.cost)}</span></div>
      <div class=&quot;row total&quot;><span>Margin</span><span class=&quot;val ${cls(b.margin)}&quot;>${fmt(b.margin)}</span></div>
    </div>`;
  };
  document.getElementById(&quot;rollup&quot;).innerHTML = `
    ${buCard(&quot;first_mile&quot;, &quot;First Mile&quot;)}
    ${buCard(&quot;fbx_core&quot;, &quot;FBX Core&quot;)}
    ${buCard(&quot;last_mile&quot;, &quot;Last Mile&quot;)}
    <div class=&quot;rollup&quot;>
      <h3>Consolidated</h3>
      <div class=&quot;row&quot;><span>Gross Rev</span><span class=&quot;val&quot;>${fmt(r.gross.revenue)}</span></div>
      <div class=&quot;row&quot; style=&quot;color: var(--text-muted); font-size: 11px;&quot;><span>Eliminations</span><span class=&quot;val&quot;>-${fmt(r.elimination)}</span></div>
      <div class=&quot;row&quot;><span>Consol Rev</span><span class=&quot;val&quot;>${fmt(r.consolidated.revenue)}</span></div>
      <div class=&quot;row total&quot;><span>Margin</span><span class=&quot;val ${cls(r.consolidated.margin)}&quot;>${fmt(r.consolidated.margin)}</span></div>
    </div>
  `;
}

function renderVolume() {
  const v = state.volume;
  document.getElementById(&quot;volume-display&quot;).innerHTML = `
    <div style=&quot;display: flex; justify-content: space-between; padding: 2px 0;&quot;><span>Homes / yr</span><span style=&quot;font-variant-numeric: tabular-nums; color: var(--text-primary);&quot;>${v.homes_per_year}</span></div>
    <div style=&quot;display: flex; justify-content: space-between; padding: 2px 0;&quot;><span>Contracts / yr</span><span style=&quot;font-variant-numeric: tabular-nums; color: var(--text-primary);&quot;>${v.contracts_per_year}</span></div>
    <div style=&quot;display: flex; justify-content: space-between; padding: 2px 0;&quot;><span>Franchises / yr</span><span style=&quot;font-variant-numeric: tabular-nums; color: var(--text-primary);&quot;>${v.franchises_per_year}${v.franchises_from_map ? &quot; (from map)&quot; : &quot;&quot;}</span></div>
  `;

function renderFishbone() {
  const svg = d3.select(&quot;#chart&quot;);
  svg.selectAll(&quot;*&quot;).remove();

  const container = document.querySelector(&quot;main&quot;);
  const W = Math.max(1000, container.clientWidth - 20);
  const H = Math.max(620, container.clientHeight - 20);

  svg.attr(&quot;viewBox&quot;, `0 0 ${W} ${H}`)
     .attr(&quot;width&quot;, W).attr(&quot;height&quot;, H);

  const marginL = 180, marginR = 220;
  const headerBandH = 48;    // BU pill + owner subheader
  const ownershipBandH = 16;
  const footerBandH = 30;
  const marginT = 20 + headerBandH + ownershipBandH + 10;
  const marginB = 20 + footerBandH;
  const spineY = Math.round((marginT + (H - marginB)) / 2);
  const spineX1 = marginL;
  const spineX2 = W - marginR;
  const buCount = state.bus.length;
  const buWidth = (spineX2 - spineX1) / buCount;

  // BU zone headers
  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneMid = zoneX + buWidth / 2;
    const buColor = `var(${bu.color_var || '--text-primary'})`;

    const headerG = svg.append(&quot;g&quot;)
      .style(&quot;cursor&quot;, &quot;pointer&quot;)
      .on(&quot;click&quot;, function(e) { showExplainer(&quot;bu&quot;, bu.id, e); });

    const pillW = Math.min(180, buWidth - 40);
    const pillH = 26;
    const pillX = zoneMid - pillW / 2;
    const pillY = 14;
    headerG.append(&quot;rect&quot;)
      .attr(&quot;x&quot;, pillX).attr(&quot;y&quot;, pillY)
      .attr(&quot;width&quot;, pillW).attr(&quot;height&quot;, pillH)
      .attr(&quot;rx&quot;, 5).attr(&quot;fill&quot;, buColor);
    headerG.append(&quot;text&quot;)
      .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH / 2 + 5)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;white&quot;)
      .attr(&quot;font-weight&quot;, 600)
      .attr(&quot;font-size&quot;, 13)
      .text(bu.name);

    // Owner sub-header
    if (bu.owner) {
      headerG.append(&quot;text&quot;)
        .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH + 12)
        .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
        .attr(&quot;fill&quot;, buColor)
        .attr(&quot;font-style&quot;, &quot;italic&quot;)
        .attr(&quot;font-size&quot;, 11)
        .text(bu.owner);
    }
  });

  // Ownership band (shifted down to clear the owner subheader)
  const bandY = 14 + 26 + 18;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth * 2).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p1)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;Customer relationship: Sales →&quot;);
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p3)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2.5).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;→ GC&quot;);

  // Dividers
  for (let i = 1; i < buCount; i++) {
    const x = spineX1 + buWidth * i;
    svg.append(&quot;line&quot;)
      .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, marginT - 4)
      .attr(&quot;x2&quot;, x).attr(&quot;y2&quot;, H - marginB + 4)
      .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;)
      .attr(&quot;stroke-width&quot;, 1)
      .attr(&quot;stroke-dasharray&quot;, &quot;5 4&quot;)
      .attr(&quot;opacity&quot;, 0.25);
    const handoff = state.handoffs[i - 1];
    if (handoff) {
      svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;handoff-label&quot;)
        .attr(&quot;x&quot;, x).attr(&quot;y&quot;, H - marginB + 20)
        .text(&quot;↓ &quot; + handoff.label);
    }
  }

  // Spine
  svg.append(&quot;line&quot;).attr(&quot;class&quot;, &quot;spine&quot;)
    .attr(&quot;x1&quot;, spineX1).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, spineX2).attr(&quot;y2&quot;, spineY)
    .attr(&quot;stroke-width&quot;, 4);

  // Effect arrow + box
  const arrowStart = spineX2;
  const arrowTipX = arrowStart + 80;
  const arrowH = 60;
  svg.append(&quot;polygon&quot;)
    .attr(&quot;points&quot;, `${arrowStart},${spineY - arrowH/2} ${arrowTipX},${spineY} ${arrowStart},${spineY + arrowH/2}`)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;opacity&quot;, 0.9);
  const effectX = arrowTipX + 8;
  const effectW = 160, effectH = 70;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;effect-box&quot;)
    .attr(&quot;x&quot;, effectX).attr(&quot;y&quot;, spineY - effectH / 2)
    .attr(&quot;width&quot;, effectW).attr(&quot;height&quot;, effectH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  const effectLines = wrapText(state.head, 18);
  const lineH = 16;
  const startY = spineY - ((effectLines.length - 1) * lineH) / 2 + 4;
  effectLines.forEach((line, i) => {
    svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;effect-text&quot;)
      .attr(&quot;x&quot;, effectX + effectW / 2)
      .attr(&quot;y&quot;, startY + i * lineH)

  const productsW = 150;

  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;products-box&quot;)
    .attr(&quot;x&quot;, productsX).attr(&quot;y&quot;, spineY - productsH / 2)
    .attr(&quot;width&quot;, productsW).attr(&quot;height&quot;, productsH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  svg.append(&quot;text&quot;)
    .attr(&quot;x&quot;, productsX + productsW / 2)

    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
    .attr(&quot;font-size&quot;, 13)
    .attr(&quot;font-weight&quot;, 700)
    .text(&quot;Products&quot;);
  products.forEach((p, idx) => {
    svg.append(&quot;text&quot;)
      .attr(&quot;x&quot;, productsX + productsW / 2)
      .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH + 8 + idx * productLineH)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .attr(&quot;font-size&quot;, 11)
      .attr(&quot;opacity&quot;, 0.9)
      .text(p);
  });

  // Function stubs — oblique (leaning left, away from effect)
  const TILT_DEG = 22;
  const TILT_SIN = Math.sin(TILT_DEG * Math.PI / 180);

  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneInnerPad = 20;
    const zoneInnerLeft = zoneX + zoneInnerPad;
    const zoneInnerRight = zoneX + buWidth - zoneInnerPad;
    const buColor = `var(${bu.color_var || '--text-primary'})`;

    const topFns = [];
    const botFns = [];
    bu.functions.forEach((fn, j) => {
      if (j % 2 === 0) topFns.push(fn);
      else botFns.push(fn);
    });

    const stubHeightMax = spineY - marginT - 30;
    const stubHeightMin = 50;
    const heightFor = (idx, total) => {
      if (total <= 1) return stubHeightMin + (stubHeightMax - stubHeightMin) * 0.6;
      const ratios = [0.95, 0.65, 0.85, 0.55, 0.75, 0.45];
      const r = ratios[idx % ratios.length];
      return stubHeightMin + (stubHeightMax - stubHeightMin) * r;
    };

    const distributeTipX = (count) => {
      if (count === 0) return [];
      const positions = [];
      for (let k = 0; k < count; k++) {
        const t = (count === 1) ? 0.5 : (k + 0.5) / count;
        positions.push(zoneInnerLeft + (zoneInnerRight - zoneInnerLeft) * t);
      }
      return positions;
    };

    const anchorFromTip = (tipX, h) => tipX + TILT_SIN * h;

    const topTipXs = distributeTipX(topFns.length);
    topFns.forEach((fn, idx) => {
      const h = heightFor(idx, topFns.length);
      const x = anchorFromTip(topTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, -1, h, buColor);
    });

    const botTipXs = distributeTipX(botFns.length);
    botFns.forEach((fn, idx) => {
      const h = heightFor(idx, botFns.length);
      const x = anchorFromTip(botTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, 1, h, buColor);
    });
  });
}

function drawStub(svg, fn, bu, x, spineY, dir, height, color) {
  // Oblique bone: tip leans left (away from effect at right)
  const tiltDeg = 22;
  const tiltRad = tiltDeg * Math.PI / 180;
  const tipX = x - Math.sin(tiltRad) * height;
  const tipY = spineY + dir * Math.cos(tiltRad) * height;
  const dotR = 5;

  svg.append(&quot;line&quot;)
    .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, tipX).attr(&quot;y2&quot;, tipY)
    .attr(&quot;stroke&quot;, color)
    .attr(&quot;stroke-width&quot;, 1.8)
    .attr(&quot;opacity&quot;, 0.85);

  svg.append(&quot;circle&quot;)
    .attr(&quot;cx&quot;, tipX).attr(&quot;cy&quot;, tipY).attr(&quot;r&quot;, dotR)
    .attr(&quot;fill&quot;, color);

  const labelY = tipY + dir * (dotR + 12);
  const label = svg.append(&quot;text&quot;)
    .attr(&quot;class&quot;, &quot;fn-label&quot;)
    .attr(&quot;x&quot;, tipX).attr(&quot;y&quot;, labelY)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;font-size&quot;, 12)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  const approxW = fn.name.length * 6.2;
  if (approxW > 110) {
    const lines = wrapText(fn.name, 16);
    lines.forEach((ln, li) => {
      label.append(&quot;tspan&quot;)
        .attr(&quot;x&quot;, tipX)
        .attr(&quot;dy&quot;, li === 0 ? 0 : 13)
        .text(ln);
    });
  } else {
    label.text(fn.name);
  }

  const minX = Math.min(x, tipX) - 60;
  const maxX = Math.max(x, tipX) + 60;
  const labelHeightPx = Math.abs(labelY - spineY) + 20;
  const clickBox = svg.append(&quot;rect&quot;)
    .attr(&quot;x&quot;, minX).attr(&quot;y&quot;, Math.min(spineY, labelY) - 8)
    .attr(&quot;width&quot;, maxX - minX).attr(&quot;height&quot;, labelHeightPx)
    .attr(&quot;fill&quot;, &quot;transparent&quot;)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  clickBox
    .on(&quot;click&quot;, function(e) { showExplainer(&quot;fn&quot;, fn.id, e, bu.id); });
}

function wrapText(text, maxChars) {
  const words = String(text || &quot;&quot;).split(/\s+/);
  const lines = [];
  let cur = &quot;&quot;;
  for (const w of words) {
    if ((cur + &quot; &quot; + w).trim().length > maxChars &amp;&amp; cur) {
      lines.push(cur.trim());
      cur = w;
    } else {
      cur = (cur + &quot; &quot; + w).trim();
    }
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 3);
}

// Persistent explainer: opens on click, stays until × is clicked.
// Position near the triggering element (DOM event or {x,y}), clamped to main.
function showExplainer(type, id, evtOrPos, buId) {
  populateExplainer(type, id, buId);
  const el = document.getElementById(&quot;explainer&quot;);
  el.classList.add(&quot;visible&quot;);
  positionExplainer(el, evtOrPos);
}

function positionExplainer(el, evtOrPos) {
  const main = document.querySelector(&quot;main&quot;);
  const mainRect = main.getBoundingClientRect();
  const elW = 340;
  const elH = Math.min(el.scrollHeight || 300, mainRect.height * 0.7);
  const pad = 12;

  let anchorX, anchorY;
  if (evtOrPos &amp;&amp; typeof evtOrPos.clientX === &quot;number&quot;) {
    anchorX = evtOrPos.clientX - mainRect.left;
    anchorY = evtOrPos.clientY - mainRect.top;
  } else if (evtOrPos &amp;&amp; typeof evtOrPos.x === &quot;number&quot;) {
    anchorX = evtOrPos.x;
    anchorY = evtOrPos.y;
  } else {
    anchorX = mainRect.width / 2;
    anchorY = mainRect.height / 2;
  }

  let left = anchorX + 20;
  let top = anchorY - 20;
  if (left + elW + pad > mainRect.width) {
    left = anchorX - elW - 20;
  }
  left = Math.max(pad, Math.min(mainRect.width - elW - pad, left));
  top = Math.max(pad, Math.min(mainRect.height - elH - pad, top));

  el.style.left = left + &quot;px&quot;;
  el.style.top = top + &quot;px&quot;;
  el.style.right = &quot;auto&quot;;
}

function populateExplainer(type, id, buId) {
  const titleEl = document.getElementById(&quot;explainer-title&quot;);
  const bodyEl = document.getElementById(&quot;explainer-body&quot;);
  const metaEl = document.getElementById(&quot;explainer-meta&quot;);
  const finEl = document.getElementById(&quot;explainer-fin&quot;);
  const ownerBlock = document.getElementById(&quot;explainer-owner&quot;);
  const ownerNameEl = document.getElementById(&quot;explainer-owner-name&quot;);
  const ownerDescEl = document.getElementById(&quot;explainer-owner-desc&quot;);

  if (type === &quot;bu&quot;) {
    const bu = state.bus.find(b => b.id === id);
    if (!bu) return;
    const r = computeRollup();
    const b = r.perBU[id];
    titleEl.textContent = bu.name;
    metaEl.textContent = &quot;Business Unit · &quot; + bu.functions.length + &quot; functions&quot;;
    bodyEl.innerHTML = marked.parse(bu.description || &quot;&quot;);
    // Owner block: BU-level always direct
    if (bu.owner) {
      ownerNameEl.textContent = bu.owner;
      ownerDescEl.innerHTML = marked.parse(bu.owner_description || &quot;&quot;);
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
    finEl.innerHTML = `
      <span class=&quot;label&quot;>Annual Rev</span><span class=&quot;val&quot;>${fmt(b.revenue)}</span>
      <span class=&quot;label&quot;>External</span><span class=&quot;val&quot;>${fmt(b.externalRevenue)}</span>
      <span class=&quot;label&quot;>Inter-BU</span><span class=&quot;val&quot;>${fmt(b.internalRevenue)}</span>
      <span class=&quot;label&quot;>Cost</span><span class=&quot;val&quot;>${fmt(b.cost)}</span>
      <span class=&quot;label&quot;>Margin</span><span class=&quot;val&quot;>${fmt(b.margin)}</span>
      <span class=&quot;label&quot;>Headcount</span><span class=&quot;val&quot;>${b.headcount}</span>
    `;
  } else if (type === &quot;fn&quot;) {
    const bu = state.bus.find(b => b.id === buId);
    if (!bu) return;
    const fn = bu.functions.find(f => f.id === id);
    if (!fn) return;
    const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, state.volume);
    const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, state.volume);
    const margin = annualRev - annualCost;
    const marginPct = annualRev ? ((margin / annualRev) * 100).toFixed(0) + &quot;%&quot; : &quot;—&quot;;
    const extPct = fn.external_rev_pct == null ? 100 : fn.external_rev_pct;

    titleEl.textContent = fn.name;
    metaEl.textContent = `${bu.name} · ${fn.basis.replace(&quot;_&quot;, &quot; &quot;)} · ${extPct}% external`;
    bodyEl.innerHTML = marked.parse(fn.description || &quot;&quot;);
    // Owner block: use fn.owner if set, else inherit from BU
    const effectiveOwner = fn.owner || bu.owner;
    if (effectiveOwner) {
      ownerNameEl.textContent = effectiveOwner;
      const isInherited = !fn.owner &amp;&amp; bu.owner;
      const descSrc = fn.owner_description || (isInherited ? bu.owner_description : &quot;&quot;);
      ownerDescEl.innerHTML = marked.parse(descSrc || &quot;&quot;);
      if (isInherited) {
        ownerDescEl.innerHTML += `<div class=&quot;inherited&quot;>(inherited from ${bu.name})</div>`;
      }
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;

    finEl.innerHTML = `
      <span class=&quot;label&quot;>Per ${fn.basis.replace(&quot;per_&quot;, &quot;&quot;)}</span><span class=&quot;val&quot;>$${fn.revenue_K}K rev / $${fn.cost_K}K cost</span>

      <span class=&quot;label&quot;>Annual Cost</span><span class=&quot;val&quot;>${fmt(annualCost)}</span>
      <span class=&quot;label&quot;>Margin</span><span class=&quot;val&quot;>${fmt(margin)} (${marginPct})</span>
      <span class=&quot;label&quot;>Headcount</span><span class=&quot;val&quot;>${fn.headcount || 0}</span>
      <span class=&quot;label&quot;>Time</span><span class=&quot;val&quot;>${fn.time_days || 0} days</span>
    `;
  }
  updateFinVisibility();
}

// ============== GITHUB LOAD (unauthenticated) ==============
async function loadVersion(sha) {
  try {
    const url = sha
      ? `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${sha}`
      : `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;
    const res = await fetch(url, { headers: { Accept: &quot;application/vnd.github.raw&quot; } });
    if (!res.ok) {
      if (res.status === 404) {
        showError(&quot;fishbone.json not found in repo. Save a version from the editor first.&quot;);
      } else if (res.status === 403) {
        showError(&quot;GitHub API rate limit. Try again in a minute.&quot;);
      } else {
        showError(`Load failed: ${res.status}`);
      }
      return false;
    }
    const text = await res.text();
    state = JSON.parse(text);
    migrateState(state);
    currentSha = sha;
    if (sha) {
      document.getElementById(&quot;version-info&quot;).textContent = sha.substring(0, 7);
    } else {
      document.getElementById(&quot;version-info&quot;).textContent = &quot;latest&quot;;
    }
    return true;
  } catch (err) {
    showError(&quot;Load error: &quot; + err.message);
    return false;
  }
}

async function loadVersionList() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/commits?path=${FILE_PATH}&amp;per_page=30`,
      { headers: { Accept: &quot;application/vnd.github+json&quot; } }
    );
    if (!res.ok) return;
    const commits = await res.json();
    const sel = document.getElementById(&quot;version-select&quot;);
    sel.innerHTML = &quot;&quot;;
    if (!commits.length) {
      sel.innerHTML = `<option>No versions yet</option>`;
      return;
    }
    // Add &quot;Latest&quot; first
    const latestOpt = document.createElement(&quot;option&quot;);
    latestOpt.value = &quot;&quot;;
    latestOpt.textContent = &quot;Latest&quot;;
    sel.appendChild(latestOpt);

    commits.forEach(c => {
      const msg = c.commit.message;
      const m = msg.match(/^\[([^\]]+)\]\s*(.*)/);
      const name = m ? m[1] : &quot;(unnamed)&quot;;
      const date = new Date(c.commit.author.date).toLocaleDateString();
      const opt = document.createElement(&quot;option&quot;);
      opt.value = c.sha;
      opt.textContent = `${name} — ${date}`;
      sel.appendChild(opt);
    });

    // If a deep-link sha is set, select it
    if (currentSha) {
      sel.value = currentSha;
    }
  } catch (err) {
    // Silent — version list is non-critical
  }
}

document.getElementById(&quot;version-select&quot;).addEventListener(&quot;change&quot;, async (e) => {
  const sha = e.target.value;
  document.getElementById(&quot;loading&quot;).style.display = &quot;flex&quot;;
  const ok = await loadVersion(sha || null);
  if (ok) {
    renderAll();
    // Update URL without reload
    const u = new URL(window.location.href);
    if (sha) u.searchParams.set(&quot;v&quot;, sha);
    else u.searchParams.delete(&quot;v&quot;);
    window.history.replaceState({}, &quot;&quot;, u);
  }
  document.getElementById(&quot;loading&quot;).style.display = &quot;none&quot;;
});

function showError(msg) {
  const banner = document.createElement(&quot;div&quot;);
  banner.className = &quot;error-banner&quot;;
  banner.textContent = msg;
  document.body.insertBefore(banner, document.body.firstChild);
  setTimeout(() => banner.remove(), 6000);
}

// ============== INIT ==============
window.addEventListener(&quot;resize&quot;, () => {
  if (state) renderFishbone();
});

(async function init() {
  const params = new URLSearchParams(window.location.search);
  const v = params.get(&quot;v&quot;);
  const ok = await loadVersion(v || null);
  document.getElementById(&quot;loading&quot;).style.display = &quot;none&quot;;
  if (ok) {
    renderAll();
    loadVersionList();
  }
})();

const REPO = &quot;Doc-Clev/homefab-map&quot;;

// ============== BASIS / ROLLUP ==============
function normalizeToAnnual(value_K, basis, volume) {
  switch (basis) {
    case &quot;per_home&quot;: return value_K * (volume.homes_per_year || 0);
    case &quot;per_contract&quot;: return value_K * (volume.contracts_per_year || 0);
    case &quot;per_franchise&quot;: return value_K * (volume.franchises_per_year || 0);
    case &quot;per_month&quot;: return value_K * 12;
    case &quot;per_year&quot;: return value_K;
    default: return value_K;
  }
}

function migrateState(s) {
  if (!s.volume) s.volume = {};
  if (s.volume.homes_per_year == null) s.volume.homes_per_year = 100;
  if (s.volume.contracts_per_year == null) s.volume.contracts_per_year = 100;
  if (s.volume.franchises_per_year == null) s.volume.franchises_per_year = 4;
  if (s.volume.franchises_from_map == null) s.volume.franchises_from_map = false;

  s.bus.forEach(bu => {
    if (bu.owner == null) bu.owner = &quot;&quot;;
    if (bu.owner_description == null) bu.owner_description = &quot;&quot;;
    if (!Array.isArray(bu.functions)) bu.functions = [];
    bu.functions.forEach(fn => {
      if (fn.owner == null) fn.owner = &quot;&quot;;
      if (fn.owner_description == null) fn.owner_description = &quot;&quot;;
      if (fn.external_rev_pct == null) {
        fn.external_rev_pct = (bu.id === &quot;fbx_core&quot;) ? 0 : 100;
      }
      if (fn.revenue_K == null) fn.revenue_K = 0;
      if (fn.cost_K == null) fn.cost_K = 0;
      if (fn.time_days == null) fn.time_days = 0;
      if (fn.headcount == null) fn.headcount = 0;
      if (!fn.basis) fn.basis = &quot;per_home&quot;;

  if (!s.customer_ownership) s.customer_ownership = { sales_owns_through: &quot;fbx_core&quot; };
  if (!Array.isArray(s.products)) {
    s.products = [&quot;ADUs&quot;, &quot;High Density Multi-Family&quot;, &quot;Bathroom Pods&quot;, &quot;SIPs&quot;];
  }
  return s;
}

function computeRollup() {
  const vol = state.volume;
  const perBU = {};
  let totalElimination = 0;

  state.bus.forEach(bu => {
    let rev = 0, cost = 0, hc = 0, extRev = 0, intRev = 0;
    bu.functions.forEach(fn => {
      const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, vol);
      const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, vol);
      const extPct = (fn.external_rev_pct == null ? 100 : fn.external_rev_pct) / 100;
      rev += annualRev;
      cost += annualCost;
      extRev += annualRev * extPct;
      intRev += annualRev * (1 - extPct);
      hc += fn.headcount || 0;
    });
    perBU[bu.id] = {
      revenue: rev, externalRevenue: extRev, internalRevenue: intRev,
      cost: cost, margin: rev - cost, headcount: hc
    };
    totalElimination += intRev;
  });

  const gross = {
    revenue: Object.values(perBU).reduce((s, b) => s + b.revenue, 0),
    cost: Object.values(perBU).reduce((s, b) => s + b.cost, 0),
    headcount: Object.values(perBU).reduce((s, b) => s + b.headcount, 0)
  };
  gross.margin = gross.revenue - gross.cost;

  const consolidated = {
    revenue: gross.revenue - totalElimination,
    cost: gross.cost - totalElimination,
    margin: gross.margin,
    headcount: gross.headcount
  };

  return { perBU, gross, elimination: totalElimination, consolidated };
}

function fmt(n) {
  if (Math.abs(n) >= 1000) return &quot;$&quot; + (n / 1000).toFixed(1) + &quot;M&quot;;
  return &quot;$&quot; + Math.round(n) + &quot;K&quot;;
}

      </div>

      <div class=&quot;row&quot;><span>Consol Rev</span><span class=&quot;val&quot;>${fmt(r.consolidated.revenue)}</span></div>
      <div class=&quot;row total&quot;><span>Margin</span><span class=&quot;val ${cls(r.consolidated.margin)}&quot;>${fmt(r.consolidated.margin)}</span></div>

  `;

function renderFishbone() {
  const svg = d3.select(&quot;#chart&quot;);
  svg.selectAll(&quot;*&quot;).remove();

  const container = document.querySelector(&quot;main&quot;);
  const W = Math.max(1000, container.clientWidth - 20);
  const H = Math.max(620, container.clientHeight - 20);

  svg.attr(&quot;viewBox&quot;, `0 0 ${W} ${H}`)
     .attr(&quot;width&quot;, W).attr(&quot;height&quot;, H);

  const marginL = 180, marginR = 220;
  const headerBandH = 48;    // BU pill + owner subheader
  const ownershipBandH = 16;
  const footerBandH = 30;
  const marginT = 20 + headerBandH + ownershipBandH + 10;
  const marginB = 20 + footerBandH;
  const spineY = Math.round((marginT + (H - marginB)) / 2);
  const spineX1 = marginL;
  const spineX2 = W - marginR;
  const buCount = state.bus.length;
  const buWidth = (spineX2 - spineX1) / buCount;

  // BU zone headers
  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneMid = zoneX + buWidth / 2;
    const buColor = `var(${bu.color_var || '--text-primary'})`;

    const headerG = svg.append(&quot;g&quot;)
      .style(&quot;cursor&quot;, &quot;pointer&quot;)
      .on(&quot;click&quot;, function(e) { showExplainer(&quot;bu&quot;, bu.id, e); });

    const pillW = Math.min(180, buWidth - 40);
    const pillH = 26;
    const pillX = zoneMid - pillW / 2;
    const pillY = 14;
    headerG.append(&quot;rect&quot;)
      .attr(&quot;x&quot;, pillX).attr(&quot;y&quot;, pillY)
      .attr(&quot;width&quot;, pillW).attr(&quot;height&quot;, pillH)
      .attr(&quot;rx&quot;, 5).attr(&quot;fill&quot;, buColor);
    headerG.append(&quot;text&quot;)
      .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH / 2 + 5)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;white&quot;)
      .attr(&quot;font-weight&quot;, 600)
      .attr(&quot;font-size&quot;, 13)
      .text(bu.name);

    // Owner sub-header
    if (bu.owner) {
      headerG.append(&quot;text&quot;)
        .attr(&quot;x&quot;, zoneMid).attr(&quot;y&quot;, pillY + pillH + 12)
        .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
        .attr(&quot;fill&quot;, buColor)
        .attr(&quot;font-style&quot;, &quot;italic&quot;)
        .attr(&quot;font-size&quot;, 11)
        .text(bu.owner);
    }
  });

  // Ownership band (shifted down to clear the owner subheader)
  const bandY = 14 + 26 + 18;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth * 2).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p1)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;Customer relationship: Sales →&quot;);
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;ownership-band&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2).attr(&quot;y&quot;, bandY)
    .attr(&quot;width&quot;, buWidth).attr(&quot;height&quot;, ownershipBandH)
    .style(&quot;fill&quot;, &quot;var(--p3)&quot;);
  svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;ownership-label&quot;)
    .attr(&quot;x&quot;, spineX1 + buWidth * 2.5).attr(&quot;y&quot;, bandY + ownershipBandH / 2 + 4)
    .text(&quot;→ GC&quot;);

  // Dividers
  for (let i = 1; i < buCount; i++) {
    const x = spineX1 + buWidth * i;
    svg.append(&quot;line&quot;)
      .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, marginT - 4)
      .attr(&quot;x2&quot;, x).attr(&quot;y2&quot;, H - marginB + 4)
      .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;)
      .attr(&quot;stroke-width&quot;, 1)
      .attr(&quot;stroke-dasharray&quot;, &quot;5 4&quot;)
      .attr(&quot;opacity&quot;, 0.25);
    const handoff = state.handoffs[i - 1];
    if (handoff) {
      svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;handoff-label&quot;)
        .attr(&quot;x&quot;, x).attr(&quot;y&quot;, H - marginB + 20)
        .text(&quot;↓ &quot; + handoff.label);
    }
  }

  // Spine
  svg.append(&quot;line&quot;).attr(&quot;class&quot;, &quot;spine&quot;)
    .attr(&quot;x1&quot;, spineX1).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, spineX2).attr(&quot;y2&quot;, spineY)
    .attr(&quot;stroke-width&quot;, 4);

  // Effect arrow + box
  const arrowStart = spineX2;
  const arrowTipX = arrowStart + 80;
  const arrowH = 60;
  svg.append(&quot;polygon&quot;)
    .attr(&quot;points&quot;, `${arrowStart},${spineY - arrowH/2} ${arrowTipX},${spineY} ${arrowStart},${spineY + arrowH/2}`)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;opacity&quot;, 0.9);
  const effectX = arrowTipX + 8;
  const effectW = 160, effectH = 70;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;effect-box&quot;)
    .attr(&quot;x&quot;, effectX).attr(&quot;y&quot;, spineY - effectH / 2)
    .attr(&quot;width&quot;, effectW).attr(&quot;height&quot;, effectH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  const effectLines = wrapText(state.head, 18);
  const lineH = 16;
  const startY = spineY - ((effectLines.length - 1) * lineH) / 2 + 4;
  effectLines.forEach((line, i) => {
    svg.append(&quot;text&quot;).attr(&quot;class&quot;, &quot;effect-text&quot;)
      .attr(&quot;x&quot;, effectX + effectW / 2)
      .attr(&quot;y&quot;, startY + i * lineH)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .text(line);
  });

  // ---- Products box on left end of spine ----
  const products = Array.isArray(state.products) ? state.products : [];
  const productsW = 150;
  const productsX = spineX1 - productsW - 8;
  const productLineH = 15;
  const productTitleH = 18;
  const productsPad = 10;
  const productsH = productTitleH + (products.length * productLineH) + productsPad * 2;
  svg.append(&quot;rect&quot;).attr(&quot;class&quot;, &quot;products-box&quot;)
    .attr(&quot;x&quot;, productsX).attr(&quot;y&quot;, spineY - productsH / 2)
    .attr(&quot;width&quot;, productsW).attr(&quot;height&quot;, productsH).attr(&quot;rx&quot;, 6)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;stroke&quot;, &quot;var(--text-primary)&quot;);
  svg.append(&quot;text&quot;)
    .attr(&quot;x&quot;, productsX + productsW / 2)
    .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH - 4)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
    .attr(&quot;font-size&quot;, 13)
    .attr(&quot;font-weight&quot;, 700)
    .text(&quot;Products&quot;);
  products.forEach((p, idx) => {
    svg.append(&quot;text&quot;)
      .attr(&quot;x&quot;, productsX + productsW / 2)
      .attr(&quot;y&quot;, spineY - productsH / 2 + productsPad + productTitleH + 8 + idx * productLineH)
      .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
      .attr(&quot;fill&quot;, &quot;var(--bg-primary)&quot;)
      .attr(&quot;font-size&quot;, 11)
      .attr(&quot;opacity&quot;, 0.9)
      .text(p);
  });

  // Function stubs — oblique (leaning left, away from effect)
  const TILT_DEG = 22;
  const TILT_SIN = Math.sin(TILT_DEG * Math.PI / 180);

  state.bus.forEach((bu, i) => {
    const zoneX = spineX1 + buWidth * i;
    const zoneInnerPad = 20;
    const zoneInnerLeft = zoneX + zoneInnerPad;
    const zoneInnerRight = zoneX + buWidth - zoneInnerPad;
    const buColor = `var(${bu.color_var || '--text-primary'})`;

    const topFns = [];
    const botFns = [];
    bu.functions.forEach((fn, j) => {
      if (j % 2 === 0) topFns.push(fn);
      else botFns.push(fn);
    });

    const stubHeightMax = spineY - marginT - 30;
    const stubHeightMin = 50;
    const heightFor = (idx, total) => {
      if (total <= 1) return stubHeightMin + (stubHeightMax - stubHeightMin) * 0.6;
      const ratios = [0.95, 0.65, 0.85, 0.55, 0.75, 0.45];
      const r = ratios[idx % ratios.length];
      return stubHeightMin + (stubHeightMax - stubHeightMin) * r;
    };

    const distributeTipX = (count) => {
      if (count === 0) return [];
      const positions = [];
      for (let k = 0; k < count; k++) {
        const t = (count === 1) ? 0.5 : (k + 0.5) / count;
        positions.push(zoneInnerLeft + (zoneInnerRight - zoneInnerLeft) * t);
      }
      return positions;
    };

    const anchorFromTip = (tipX, h) => tipX + TILT_SIN * h;

    const topTipXs = distributeTipX(topFns.length);
    topFns.forEach((fn, idx) => {
      const h = heightFor(idx, topFns.length);
      const x = anchorFromTip(topTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, -1, h, buColor);
    });

    const botTipXs = distributeTipX(botFns.length);
    botFns.forEach((fn, idx) => {
      const h = heightFor(idx, botFns.length);
      const x = anchorFromTip(botTipXs[idx], h);
      drawStub(svg, fn, bu, x, spineY, 1, h, buColor);
    });
  });
}

function drawStub(svg, fn, bu, x, spineY, dir, height, color) {
  // Oblique bone: tip leans left (away from effect at right)
  const tiltDeg = 22;
  const tiltRad = tiltDeg * Math.PI / 180;
  const tipX = x - Math.sin(tiltRad) * height;
  const tipY = spineY + dir * Math.cos(tiltRad) * height;
  const dotR = 5;

  svg.append(&quot;line&quot;)
    .attr(&quot;x1&quot;, x).attr(&quot;y1&quot;, spineY)
    .attr(&quot;x2&quot;, tipX).attr(&quot;y2&quot;, tipY)
    .attr(&quot;stroke&quot;, color)
    .attr(&quot;stroke-width&quot;, 1.8)
    .attr(&quot;opacity&quot;, 0.85);

  svg.append(&quot;circle&quot;)
    .attr(&quot;cx&quot;, tipX).attr(&quot;cy&quot;, tipY).attr(&quot;r&quot;, dotR)
    .attr(&quot;fill&quot;, color);

  const labelY = tipY + dir * (dotR + 12);
  const label = svg.append(&quot;text&quot;)
    .attr(&quot;class&quot;, &quot;fn-label&quot;)
    .attr(&quot;x&quot;, tipX).attr(&quot;y&quot;, labelY)
    .attr(&quot;text-anchor&quot;, &quot;middle&quot;)
    .attr(&quot;fill&quot;, &quot;var(--text-primary)&quot;)
    .attr(&quot;font-size&quot;, 12)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  const approxW = fn.name.length * 6.2;
  if (approxW > 110) {
    const lines = wrapText(fn.name, 16);
    lines.forEach((ln, li) => {
      label.append(&quot;tspan&quot;)
        .attr(&quot;x&quot;, tipX)
        .attr(&quot;dy&quot;, li === 0 ? 0 : 13)
        .text(ln);
    });
  } else {
    label.text(fn.name);
  }

  const minX = Math.min(x, tipX) - 60;
  const maxX = Math.max(x, tipX) + 60;
  const labelHeightPx = Math.abs(labelY - spineY) + 20;
  const clickBox = svg.append(&quot;rect&quot;)
    .attr(&quot;x&quot;, minX).attr(&quot;y&quot;, Math.min(spineY, labelY) - 8)
    .attr(&quot;width&quot;, maxX - minX).attr(&quot;height&quot;, labelHeightPx)
    .attr(&quot;fill&quot;, &quot;transparent&quot;)
    .style(&quot;cursor&quot;, &quot;pointer&quot;);

  clickBox
    .on(&quot;click&quot;, function(e) { showExplainer(&quot;fn&quot;, fn.id, e, bu.id); });
}

function wrapText(text, maxChars) {
  const words = String(text || &quot;&quot;).split(/\s+/);
  const lines = [];
  let cur = &quot;&quot;;
  for (const w of words) {
    if ((cur + &quot; &quot; + w).trim().length > maxChars &amp;&amp; cur) {
      lines.push(cur.trim());
      cur = w;
    } else {
      cur = (cur + &quot; &quot; + w).trim();
    }
  }
  if (cur) lines.push(cur);
  return lines.slice(0, 3);
}

// ============== EXPLAINER ==============
// User preference: show financials in explainer? Default OFF, persisted across opens.
let finVisible = false;

function updateFinVisibility() {
  const finEl = document.getElementById(&quot;explainer-fin&quot;);
  const btnEl = document.getElementById(&quot;fin-toggle&quot;);
  if (finVisible) {
    finEl.style.display = &quot;grid&quot;;

    btnEl.style.borderColor = &quot;var(--accent)&quot;;
  } else {
    finEl.style.display = &quot;none&quot;;
    btnEl.textContent = &quot;Show financials&quot;;
    btnEl.style.background = &quot;var(--bg-tertiary)&quot;;
    btnEl.style.color = &quot;var(--text-secondary)&quot;;
    btnEl.style.borderColor = &quot;var(--border)&quot;;
  }
}

// Persistent explainer: opens on click, stays until × is clicked.
// Position near the triggering element (DOM event or {x,y}), clamped to main.
function showExplainer(type, id, evtOrPos, buId) {
  populateExplainer(type, id, buId);
  const el = document.getElementById(&quot;explainer&quot;);
  el.classList.add(&quot;visible&quot;);
  positionExplainer(el, evtOrPos);
}

function positionExplainer(el, evtOrPos) {
  const main = document.querySelector(&quot;main&quot;);
  const mainRect = main.getBoundingClientRect();
  const elW = 340;
  const elH = Math.min(el.scrollHeight || 300, mainRect.height * 0.7);
  const pad = 12;

  let anchorX, anchorY;
  if (evtOrPos &amp;&amp; typeof evtOrPos.clientX === &quot;number&quot;) {
    anchorX = evtOrPos.clientX - mainRect.left;
    anchorY = evtOrPos.clientY - mainRect.top;
  } else if (evtOrPos &amp;&amp; typeof evtOrPos.x === &quot;number&quot;) {
    anchorX = evtOrPos.x;
    anchorY = evtOrPos.y;
  } else {
    anchorX = mainRect.width / 2;
    anchorY = mainRect.height / 2;
  }

  let left = anchorX + 20;
  let top = anchorY - 20;
  if (left + elW + pad > mainRect.width) {
    left = anchorX - elW - 20;
  }
  left = Math.max(pad, Math.min(mainRect.width - elW - pad, left));
  top = Math.max(pad, Math.min(mainRect.height - elH - pad, top));

  el.style.left = left + &quot;px&quot;;
  el.style.top = top + &quot;px&quot;;
  el.style.right = &quot;auto&quot;;
}

function populateExplainer(type, id, buId) {
  const titleEl = document.getElementById(&quot;explainer-title&quot;);
  const bodyEl = document.getElementById(&quot;explainer-body&quot;);
  const metaEl = document.getElementById(&quot;explainer-meta&quot;);
  const finEl = document.getElementById(&quot;explainer-fin&quot;);
  const ownerBlock = document.getElementById(&quot;explainer-owner&quot;);
  const ownerNameEl = document.getElementById(&quot;explainer-owner-name&quot;);
  const ownerDescEl = document.getElementById(&quot;explainer-owner-desc&quot;);

  if (type === &quot;bu&quot;) {
    const bu = state.bus.find(b => b.id === id);
    if (!bu) return;
    const r = computeRollup();
    const b = r.perBU[id];
    titleEl.textContent = bu.name;
    metaEl.textContent = &quot;Business Unit · &quot; + bu.functions.length + &quot; functions&quot;;
    bodyEl.innerHTML = marked.parse(bu.description || &quot;&quot;);
    // Owner block: BU-level always direct
    if (bu.owner) {
      ownerNameEl.textContent = bu.owner;
      ownerDescEl.innerHTML = marked.parse(bu.owner_description || &quot;&quot;);
      ownerBlock.style.display = &quot;block&quot;;
    } else {
      ownerBlock.style.display = &quot;none&quot;;
    }
    finEl.innerHTML = `
      <span class=&quot;label&quot;>Annual Rev</span><span class=&quot;val&quot;>${fmt(b.revenue)}</span>
      <span class=&quot;label&quot;>External</span><span class=&quot;val&quot;>${fmt(b.externalRevenue)}</span>
      <span class=&quot;label&quot;>Inter-BU</span><span class=&quot;val&quot;>${fmt(b.internalRevenue)}</span>
      <span class=&quot;label&quot;>Cost</span><span class=&quot;val&quot;>${fmt(b.cost)}</span>
      <span class=&quot;label&quot;>Margin</span><span class=&quot;val&quot;>${fmt(b.margin)}</span>
      <span class=&quot;label&quot;>Headcount</span><span class=&quot;val&quot;>${b.headcount}</span>
    `;
  } else if (type === &quot;fn&quot;) {
    const bu = state.bus.find(b => b.id === buId);
    if (!bu) return;
    const fn = bu.functions.find(f => f.id === id);
    if (!fn) return;
    const annualRev = normalizeToAnnual(fn.revenue_K || 0, fn.basis, state.volume);
    const annualCost = normalizeToAnnual(fn.cost_K || 0, fn.basis, state.volume);
    const margin = annualRev - annualCost;
    const marginPct = annualRev ? ((margin / annualRev) * 100).toFixed(0) + &quot;%&quot; : &quot;—&quot;;
    const extPct = fn.external_rev_pct == null ? 100 : fn.external_rev_pct;

    titleEl.textContent = fn.name;
    metaEl.textContent = `${bu.name} · ${fn.basis.replace(&quot;_&quot;, &quot; &quot;)} · ${extPct}% external`;
    bodyEl.innerHTML = marked.parse(fn.description || &quot;&quot;);
    // Owner block: use fn.owner if set, else inherit from BU
    const effectiveOwner = fn.owner || bu.owner;
    if (effectiveOwner) {
      ownerNameEl.textContent = effectiveOwner;

async function loadVersion(sha) {
  try {
    const url = sha
      ? `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${sha}`
      : `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;
    const res = await fetch(url, { headers: { Accept: &quot;application/vnd.github.raw&quot; } });
    if (!res.ok) {
      if (res.status === 404) {
        showError(&quot;fishbone.json not found in repo. Save a version from the editor first.&quot;);
      } else if (res.status === 403) {
        showError(&quot;GitHub API rate limit. Try again in a minute.&quot;);
      } else {
        showError(`Load failed: ${res.status}`);
      }
      return false;
    }
    const text = await res.text();
    state = JSON.parse(text);
    migrateState(state); _applyExcelData(state);
    currentSha = sha;
    if (sha) {
      document.getElementById(&quot;version-info&quot;).textContent = sha.substring(0, 7);
    } else {
      document.getElementById(&quot;version-info&quot;).textContent = &quot;latest&quot;;
    }
    return true;
  } catch (err) {
    showError(&quot;Load error: &quot; + err.message);
    return false;
  }
}

async function loadVersionList() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/commits?path=${FILE_PATH}&amp;per_page=30`,
      { headers: { Accept: &quot;application/vnd.github+json&quot; } }
    );
    if (!res.ok) return;
    const commits = await res.json();
    const sel = document.getElementById(&quot;version-select&quot;);
    sel.innerHTML = &quot;&quot;;
    if (!commits.length) {
      sel.innerHTML = `<option>No versions yet</option>`;
      return;
    }
    // Add &quot;Latest&quot; first
    const latestOpt = document.createElement(&quot;option&quot;);
    latestOpt.value = &quot;&quot;;
    latestOpt.textContent = &quot;Latest&quot;;
    sel.appendChild(latestOpt);

    commits.forEach(c => {
      const msg = c.commit.message;
      const m = msg.match(/^\[([^\]]+)\]\s*(.*)/);
      const name = m ? m[1] : &quot;(unnamed)&quot;;
      const date = new Date(c.commit.author.date).toLocaleDateString();
      const opt = document.createElement(&quot;option&quot;);
      opt.value = c.sha;
      opt.textContent = `${name} — ${date}`;
      sel.appendChild(opt);
    });

    // If a deep-link sha is set, select it
    if (currentSha) {
      sel.value = currentSha;
    }
  } catch (err) {
    // Silent — version list is non-critical
  }
}

document.getElementById(&quot;version-select&quot;).addEventListener(&quot;change&quot;, async (e) => {

// ============== STATE ==============
let state = JSON.parse(JSON.stringify(SEED));
