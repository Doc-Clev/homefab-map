<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Expansion Map — FBX</title>
  <link rel="stylesheet" href="../css/core.css">
  <style>
    body { background: var(--ink); }
    .stage { background: var(--ink); }
    .slide { background: var(--ink); color: var(--paper); }

    .live-head {
      position: absolute;
      top: 130px;
      left: var(--gutter);
      right: var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(245,241,232,0.15);
    }
    .live-head .left h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .live-head .left h2 em { font-style: italic; color: var(--signal); font-weight: 500; }
    .live-head .left .lab {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--signal);
      margin-bottom: 12px;
    }
    .live-head .right {
      text-align: right;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,241,232,0.6);
      line-height: 1.7;
    }
    .live-head .right strong { color: var(--paper); font-weight: 600; }
    .live-head .right .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--signal);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .embed {
      position: absolute;
      top: 230px;
      left: var(--gutter);
      right: var(--gutter);
      bottom: 100px;
      background: var(--paper-pure);
      border: 1px solid rgba(245,241,232,0.2);
    }
    .embed iframe {
      width: 100%; height: 100%;
      border: 0;
      display: block;
    }

    .foot { color: rgba(245,241,232,0.5); }
    .foot .page-no { color: var(--paper); font-size: 14px; opacity: 0.6; }
  </style>
</head>
<body>
<div class="stage">
  <section class="slide">

    <div class="eyebrow">
      <div class="brand"><div class="brand-mark">F</div><span data-content="14-expansion-map.eyebrow.left">FBX · HOMEFAB</span></div>
      <span data-content="14-expansion-map.eyebrow.right">14 · Live Tool · 10-Year Plan</span>
    </div>

    <div class="live-head">
      <div class="left">
        <div class="lab" data-content="14-expansion-map.kicker">Interactive Map · Year 1 → Year 10</div>
        <h2><span data-content="14-expansion-map.headline.a">10-Year</span> <em data-content="14-expansion-map.headline.b">Expansion Map</em></h2>
      </div>
      <div class="right">
        <div><span class="live-dot"></span><span data-content="14-expansion-map.status.line1"><strong>LIVE</strong> — synced with sites.json</span></div>
        <div data-content="14-expansion-map.status.line2">137 Fabs · 5 Hubs · 50 States by 2035</div>
      </div>
    </div>

    <div class="embed">
      <!-- INTEGRATION POINT
           Drop your expansion-map HTML at: tools/expansion-map.html
           Or change the src below to point to your hosted version
           (e.g. https://homefab-map.onrender.com/). -->
      <iframe id="map-frame"
              src="../tools/expansion-map.html"
              title="FBX Expansion Map"
              loading="lazy"></iframe>
    </div>

    <div class="foot" style="bottom: 40px;">
      <span>Source: <code style="font-family: var(--mono); font-size: 11px;">/tools/expansion-map.html</code></span>
      <span class="page-no">14</span>
    </div>
  </section>
</div>
<script src="../js/slide.js"></script>
<script src="../js/content-loader.js"></script>
<script>
  const f = document.getElementById('map-frame');
  f.addEventListener('error', showFallback);
  fetch(f.src, { method: 'HEAD' }).catch(showFallback)
    .then(r => { if (r && !r.ok) showFallback(); });

  function showFallback() {
    const e = f.parentElement;
    e.innerHTML = `
      <div class="embed-missing" style="position:relative;height:100%;">
        <div>
          <div class="label">Expansion Map not yet linked</div>
          <div class="path">tools/expansion-map.html</div>
          <p style="margin-top: 24px; max-width: 520px; font-size: 14px; line-height: 1.55; color: var(--g-600);">
            Drop your existing <strong>index.html + sites.json</strong> into
            <strong>/tools/expansion-map.html</strong>, or update the iframe
            <code>src</code> in <strong>slides/11-expansion-map.html</strong>
            to point at your hosted version
            (e.g. <code>https://homefab-map.onrender.com/</code>).
          </p>
        </div>
      </div>`;
  }
</script>
</body>
</html>
