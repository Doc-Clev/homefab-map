<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fishbone — FBX</title>
  <link rel="stylesheet" href="../css/core.css">
  <style>
    body { background: var(--ink); }
    .stage { background: var(--ink); }
    .slide { background: var(--ink); color: var(--paper); }

    .live-head {
      position: absolute;
      top: 130px;
      left: var(--gutter);
      right: var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(245,241,232,0.15);
    }
    .live-head .left h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--paper);
    }
    .live-head .left h2 em { font-style: italic; color: var(--signal); font-weight: 500; }
    .live-head .left .lab {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--signal);
      margin-bottom: 12px;
    }

    .live-head .right {
      text-align: right;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,241,232,0.6);
      line-height: 1.7;
    }
    .live-head .right strong {
      color: var(--paper);
      font-weight: 600;
    }
    .live-head .right .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--signal);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .embed {
      position: absolute;
      top: 230px;
      left: var(--gutter);
      right: var(--gutter);
      bottom: 100px;
      background: var(--paper-pure);
      border: 1px solid rgba(245,241,232,0.2);
    }
    .embed iframe {
      width: 100%; height: 100%;
      border: 0;
      display: block;
    }

    .foot { color: rgba(245,241,232,0.5); }
    .foot .page-no { color: var(--paper); font-size: 14px; opacity: 0.6; }
  </style>
</head>
<body>
<div class="stage">
  <section class="slide">

    <div class="eyebrow">
      <div class="brand"><div class="brand-mark">F</div><span>FBX · HOMEFAB</span></div>
      <span>10 · Live Tool · Operating Model</span>
    </div>

    <div class="live-head">
      <div class="left">
        <div class="lab">Live Diagram</div>
        <h2>FBX Operating Model · <em>Fishbone</em></h2>
      </div>
      <div class="right">
        <div><span class="live-dot"></span><strong>LIVE</strong> — synced with model</div>
        <div>Three BUs · One delivered home</div>
      </div>
    </div>

    <div class="embed">
      <!-- INTEGRATION POINT
           Drop your fishbone HTML at: tools/fishbone.html
           Or change the src below to point to your hosted version
           (e.g. https://homefab-map.onrender.com/fishbone). -->
      <iframe id="fishbone-frame"
              src="../tools/fishbone.html"
              title="FBX Fishbone"
              loading="lazy"></iframe>
    </div>

    <div class="foot" style="bottom: 40px;">
      <span>Source: <code style="font-family: var(--mono); font-size: 11px;">/tools/fishbone.html</code></span>
      <span class="page-no">10</span>
    </div>
  </section>
</div>
<script src="../js/slide.js"></script>
<script>
  // Graceful fallback if the embed file isn't there yet
  const f = document.getElementById('fishbone-frame');
  f.addEventListener('error', showFallback);
  // Some browsers don't fire 'error' for 404s on iframes; do a fetch probe.
  fetch(f.src, { method: 'HEAD' }).catch(showFallback)
    .then(r => { if (r && !r.ok) showFallback(); });

  function showFallback() {
    const e = f.parentElement;
    e.innerHTML = `
      <div class="embed-missing" style="position:relative;height:100%;">
        <div>
          <div class="label">Fishbone tool not yet linked</div>
          <div class="path">tools/fishbone.html</div>
          <p style="margin-top: 24px; max-width: 480px; font-size: 14px; line-height: 1.5; color: var(--g-600);">
            Drop your existing fishbone HTML into <strong>/tools/fishbone.html</strong>,
            or update the iframe <code>src</code> in <strong>slides/10-fishbone.html</strong>
            to point to your hosted version (e.g. homefab-map.onrender.com/fishbone).
          </p>
        </div>
      </div>`;
  }
</script>
</body>
</html>
