<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fishbone — FBX</title>
  <link rel="stylesheet" href="../css/core.css">
  <style>
    body { background: var(--ink); }
    .stage { background: var(--ink); }
    .slide { background: var(--ink); color: var(--paper); }

    .live-head {
      position: absolute;
      top: 130px;
      left: var(--gutter);
      right: var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(245,241,232,0.15);
    }
    .live-head .left h2 {
      font-family: var(--display);
      font-weight: 700;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--paper);
    }
    .live-head .left h2 em { font-style: italic; color: var(--signal); font-weight: 500; }
    .live-head .left .lab {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--signal);
      margin-bottom: 12px;
    }

    .live-head .right {
      text-align: right;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,241,232,0.6);
      line-height: 1.7;
    }
    .live-head .right strong { color: var(--paper); font-weight: 600; }

    .embed {
      position: absolute;
      top: 230px;
      left: var(--gutter);
      right: var(--gutter);
      bottom: 100px;
      background: var(--paper-pure);
      border: 1px solid rgba(245,241,232,0.2);
      overflow: hidden;
    }
    .embed svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .foot { color: rgba(245,241,232,0.5); }
    .foot .page-no { color: var(--paper); font-size: 14px; opacity: 0.6; }

    .live-link {
      position: absolute;
      bottom: 50px;
      left: var(--gutter);
      right: var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }
    .live-link a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--signal);
      text-decoration: none;
      border-bottom: 1px solid var(--signal);
      padding: 4px 0;
      transition: opacity 150ms;
    }
    .live-link a:hover { opacity: 0.7; }
    .live-link a::after {
      content: " ↗";
      font-size: 13px;
      letter-spacing: 0;
    }
    .live-link .src {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,241,232,0.4);
    }
  </style>
</head>
<body>
<div class="stage">
  <section class="slide">

    <div class="eyebrow">
      <div class="brand"><div class="brand-mark">F</div><span data-content="22-fishbone.eyebrow.left">FBX · HOMEFAB</span></div>
      <span data-content="22-fishbone.eyebrow.right">22 · Backup · Operating Model</span>
    </div>

    <div class="live-head">
      <div class="left">
        <div class="lab" data-content="22-fishbone.kicker">Operating Model</div>
        <h2><span data-content="22-fishbone.headline.a">FBX Operating Model ·</span> <em data-content="22-fishbone.headline.b">Fishbone</em></h2>
      </div>
      <div class="right">
        <div data-content="22-fishbone.status.line1">Value chain · 3 Business Units</div>
        <div data-content="22-fishbone.status.line2">Three BUs · One delivered home</div>
      </div>
    </div>

    <div class="embed">
      <!-- Static rendering of the FBX Operating Model fishbone.
           To edit labels: change the <text> elements below.
           For the live, interactive version see homefab-map.onrender.com/fishbone. -->
      <svg viewBox="0 0 1500 720" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-label="FBX Operating Model fishbone diagram">
        <style>
          .fb-text       { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 13px; fill: #1a1a1a; }
          .fb-text-sm    { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 11px; fill: #5a5a5a; }
          .fb-text-mute  { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 11px; fill: #888; font-style: italic; }
          .fb-bar-label  { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #fff; }
          .fb-corner     { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 12px; fill: #1a1a1a; }
          .fb-title-sm   { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a1a; }
          .fb-prod-title { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #fff; }
          .fb-prod-item  { font-family: -apple-system, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 11px; fill: #fff; }

          .spine-fm { stroke: #6E8B6F; }   /* First Mile sage */
          .spine-co { stroke: #B58F3E; }   /* FBX Core gold */
          .spine-lm { stroke: #B26851; }   /* Last Mile clay */
          .dot-fm   { fill: #6E8B6F; }
          .dot-co   { fill: #B58F3E; }
          .dot-lm   { fill: #B26851; }
        </style>

        <!-- Title bar (top-left corner) -->
        <text x="20" y="22" class="fb-title-sm">FBX Operating Model</text>
        <text x="195" y="22" class="fb-text-mute">Value chain · 3 BUs</text>

        <!-- Vertical dashed separators between columns -->
        <line x1="640" y1="60" x2="640" y2="700" stroke="#d4d0c5" stroke-width="1" stroke-dasharray="4,4" />
        <line x1="1080" y1="60" x2="1080" y2="700" stroke="#d4d0c5" stroke-width="1" stroke-dasharray="4,4" />

        <!-- BU header bars -->
        <g>
          <rect x="240" y="50" width="380" height="36" rx="3" fill="#7A9A6E" />
          <text x="430" y="74" text-anchor="middle" class="fb-bar-label">First Mile</text>
          <text x="430" y="105" text-anchor="middle" class="fb-text-mute">FBX Sales, Inc.</text>

          <rect x="660" y="50" width="400" height="36" rx="3" fill="#C09B47" />
          <text x="860" y="74" text-anchor="middle" class="fb-bar-label">FBX Core</text>
          <text x="860" y="105" text-anchor="middle" class="fb-text-mute">FBX Expansion, Inc / FBX Product Dev, Inc</text>

          <rect x="1100" y="50" width="280" height="36" rx="3" fill="#BC6855" />
          <text x="1240" y="74" text-anchor="middle" class="fb-bar-label">Last Mile</text>
          <text x="1240" y="105" text-anchor="middle" class="fb-text-mute">Franchisees / External Partners</text>
        </g>

        <!-- Customer relationship row -->
        <g>
          <rect x="240" y="120" width="820" height="22" fill="#E5DCC8" />
          <text x="650" y="135" text-anchor="middle" class="fb-text-sm">Customer relationship: Sales →</text>
          <rect x="1080" y="120" width="300" height="22" fill="#F0E5D5" />
          <text x="1230" y="135" text-anchor="middle" class="fb-text-sm">→ GC</text>
        </g>

        <!-- Products box (left) -->
        <g>
          <rect x="20" y="370" width="180" height="120" fill="#1a1a1a" />
          <text x="110" y="395" text-anchor="middle" class="fb-prod-title">Products</text>
          <text x="110" y="420" text-anchor="middle" class="fb-prod-item">ADUs</text>
          <text x="110" y="438" text-anchor="middle" class="fb-prod-item">High Density Multi-Family</text>
          <text x="110" y="456" text-anchor="middle" class="fb-prod-item">Bathroom Pods</text>
          <text x="110" y="474" text-anchor="middle" class="fb-prod-item">SIPs</text>
        </g>

        <!-- Delivered Home box (right) -->
        <g>
          <rect x="1380" y="395" width="110" height="80" fill="white" stroke="#1a1a1a" stroke-width="1.5" />
          <text x="1435" y="425" text-anchor="middle" class="fb-title-sm">Delivered Home</text>
          <text x="1435" y="445" text-anchor="middle" class="fb-text-sm">Bare Land</text>
        </g>

        <!-- Main horizontal axis (with arrow into Delivered Home) -->
        <line x1="200" y1="435" x2="1370" y2="435" stroke="#1a1a1a" stroke-width="2.5" />
        <polygon points="1370,425 1380,435 1370,445" fill="#1a1a1a" />

        <!-- ============================================================
             All spines are at exactly 60° from horizontal: dy / dx = tan(60°) ≈ 1.732
             Spine length L varies to position labels at different distances; angle does not.
             For each spine: x_end = x_start - L·cos(60°), y_end = y_axis ∓ L·sin(60°)
             cos(60°) = 0.5,  sin(60°) ≈ 0.866
             ============================================================ -->

        <!-- ============ FIRST MILE spines (green) — angle 60° ============ -->
        <g stroke-width="1.5" fill="none">
          <!-- Home Sales (TOP) — L=270 → dx=135, dy=234 → end (280, 201) -->
          <line class="spine-fm" x1="415" y1="435" x2="280" y2="201" />
          <circle class="dot-fm" cx="280" cy="201" r="5" stroke="none" />
          <text x="280" y="187" text-anchor="middle" class="fb-text">Home Sales</text>

          <!-- Building Contracts (TOP) — L=170 → dx=85, dy=147 → end (455, 288) -->
          <line class="spine-fm" x1="540" y1="435" x2="455" y2="288" />
          <circle class="dot-fm" cx="455" cy="288" r="5" stroke="none" />
          <text x="455" y="276" text-anchor="middle" class="fb-text">Building</text>
          <text x="455" y="262" text-anchor="middle" class="fb-text">Contracts</text>

          <!-- Component Sales (BOTTOM) — L=240 → dx=120, dy=208 → end (285, 643) -->
          <line class="spine-fm" x1="405" y1="435" x2="285" y2="643" />
          <circle class="dot-fm" cx="285" cy="643" r="5" stroke="none" />
          <text x="285" y="662" text-anchor="middle" class="fb-text">Component Sales</text>
          <text x="285" y="678" text-anchor="middle" class="fb-text">(SIP / Pods)</text>

          <!-- Entitlement / Permit (BOTTOM) — L=140 → dx=70, dy=121 → end (470, 556) -->
          <line class="spine-fm" x1="540" y1="435" x2="470" y2="556" />
          <circle class="dot-fm" cx="470" cy="556" r="5" stroke="none" />
          <text x="470" y="575" text-anchor="middle" class="fb-text">Entitlement /</text>
          <text x="470" y="590" text-anchor="middle" class="fb-text">Permit</text>
        </g>

        <!-- ============ FBX CORE spines (gold) — angle 60° ============ -->
        <g stroke-width="1.5" fill="none">
          <!-- Design (TOP) — L=230 → dx=115, dy=199 → end (605, 236) -->
          <line class="spine-co" x1="720" y1="435" x2="605" y2="236" />
          <circle class="dot-co" cx="605" cy="236" r="5" stroke="none" />
          <text x="605" y="222" text-anchor="middle" class="fb-text">Design</text>

          <!-- Franchise Sales (TOP) — L=160 → dx=80, dy=139 → end (720, 296) -->
          <line class="spine-co" x1="800" y1="435" x2="720" y2="296" />
          <circle class="dot-co" cx="720" cy="296" r="5" stroke="none" />
          <text x="720" y="284" text-anchor="middle" class="fb-text">Franchise Sales</text>

          <!-- Import (Foreign & Domestic) (TOP) — L=230 → dx=115, dy=199 → end (785, 236) -->
          <line class="spine-co" x1="900" y1="435" x2="785" y2="236" />
          <circle class="dot-co" cx="785" cy="236" r="5" stroke="none" />
          <text x="785" y="222" text-anchor="middle" class="fb-text">Import (Foreign</text>
          <text x="785" y="208" text-anchor="middle" class="fb-text">&amp; Domestic)</text>

          <!-- Licensing / Royalties (TOP) — L=150 → dx=75, dy=130 → end (925, 305) -->
          <line class="spine-co" x1="1000" y1="435" x2="925" y2="305" />
          <circle class="dot-co" cx="925" cy="305" r="5" stroke="none" />
          <text x="925" y="293" text-anchor="middle" class="fb-text">Licensing /</text>
          <text x="925" y="279" text-anchor="middle" class="fb-text">Royalties</text>

          <!-- Research & Development (BOTTOM) — L=180 → dx=90, dy=156 → end (630, 591) -->
          <line class="spine-co" x1="720" y1="435" x2="630" y2="591" />
          <circle class="dot-co" cx="630" cy="591" r="5" stroke="none" />
          <text x="630" y="610" text-anchor="middle" class="fb-text">Research &amp;</text>
          <text x="630" y="625" text-anchor="middle" class="fb-text">Development</text>

          <!-- Warehousing (BOTTOM) — L=210 → dx=105, dy=182 → end (705, 617) -->
          <line class="spine-co" x1="810" y1="435" x2="705" y2="617" />
          <circle class="dot-co" cx="705" cy="617" r="5" stroke="none" />
          <text x="705" y="636" text-anchor="middle" class="fb-text">Warehousing</text>

          <!-- Kit of Parts Creation (BOTTOM) — L=200 → dx=100, dy=173 → end (810, 608) -->
          <line class="spine-co" x1="910" y1="435" x2="810" y2="608" />
          <circle class="dot-co" cx="810" cy="608" r="5" stroke="none" />
          <text x="810" y="627" text-anchor="middle" class="fb-text">Kit of Parts</text>
          <text x="810" y="642" text-anchor="middle" class="fb-text">Creation</text>

          <!-- Training (BOTTOM) — L=130 → dx=65, dy=113 → end (935, 548) -->
          <line class="spine-co" x1="1000" y1="435" x2="935" y2="548" />
          <circle class="dot-co" cx="935" cy="548" r="5" stroke="none" />
          <text x="935" y="567" text-anchor="middle" class="fb-text">Training</text>
        </g>

        <!-- ============ LAST MILE spines (clay red) — angle 60° ============ -->
        <g stroke-width="1.5" fill="none">
          <!-- Distribution to Assembly (TOP) — L=260 → dx=130, dy=225 → end (1020, 210) -->
          <line class="spine-lm" x1="1150" y1="435" x2="1020" y2="210" />
          <circle class="dot-lm" cx="1020" cy="210" r="5" stroke="none" />
          <text x="1020" y="196" text-anchor="middle" class="fb-text">Distribution to</text>
          <text x="1020" y="182" text-anchor="middle" class="fb-text">Assembly</text>

          <!-- Building Inspections & Quality (TOP) — L=190 → dx=95, dy=164 → end (1135, 271) -->
          <line class="spine-lm" x1="1230" y1="435" x2="1135" y2="271" />
          <circle class="dot-lm" cx="1135" cy="271" r="5" stroke="none" />
          <text x="1135" y="259" text-anchor="middle" class="fb-text">Building</text>
          <text x="1135" y="245" text-anchor="middle" class="fb-text">Inspections &amp;</text>
          <text x="1135" y="231" text-anchor="middle" class="fb-text">Quality</text>

          <!-- Installation Site Work (TOP) — L=230 → dx=115, dy=199 → end (1215, 236) -->
          <line class="spine-lm" x1="1330" y1="435" x2="1215" y2="236" />
          <circle class="dot-lm" cx="1215" cy="236" r="5" stroke="none" />
          <text x="1215" y="222" text-anchor="middle" class="fb-text">Installation</text>
          <text x="1215" y="208" text-anchor="middle" class="fb-text">Site Work</text>

          <!-- Assembly (BOTTOM) — L=220 → dx=110, dy=190 → end (1030, 625) -->
          <line class="spine-lm" x1="1140" y1="435" x2="1030" y2="625" />
          <circle class="dot-lm" cx="1030" cy="625" r="5" stroke="none" />
          <text x="1030" y="644" text-anchor="middle" class="fb-text">Assembly</text>

          <!-- Delivery Logistics (BOTTOM) — L=180 → dx=90, dy=156 → end (1190, 591) -->
          <line class="spine-lm" x1="1280" y1="435" x2="1190" y2="591" />
          <circle class="dot-lm" cx="1190" cy="591" r="5" stroke="none" />
          <text x="1190" y="610" text-anchor="middle" class="fb-text">Delivery</text>
          <text x="1190" y="625" text-anchor="middle" class="fb-text">Logistics</text>
        </g>

        <!-- Footnotes -->
        <text x="800" y="700" text-anchor="middle" class="fb-text-mute">↓ contract signed → kit ordered</text>
        <text x="1230" y="700" text-anchor="middle" class="fb-text-mute">↓ kit shipped → site work begins</text>
      </svg>
    </div>

    <div class="live-link">
      <a href="https://homefab-map.onrender.com/fishbone" target="_blank" rel="noopener" data-content="22-fishbone.live.cta">
        See the interactive version
      </a>
      <span class="src">homefab-map.onrender.com/fishbone</span>
    </div>

    <div class="foot" style="bottom: 24px;">
      <span data-content="22-fishbone.footer.left">Static rendering · interactive version online</span>
      <span class="page-no">22</span>
    </div>
  </section>
</div>
<script src="../js/slide.js"></script>
<script src="../js/content-loader.js"></script>
</body>
</html>
