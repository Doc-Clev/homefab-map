<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeFab — 10-Year Expansion Map Editor</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4ef;
    --bg-tertiary: #faf9f5;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.25);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --p1: #639922;
    --p2: #BA7517;
    --p3: #A32D2D;
    --p1-bg: #EAF3DE;
    --p2-bg: #FAEEDA;
    --p3-bg: #FCEBEB;
    --danger: #C00000;
    --success: #0F6E56;
    --info: #185FA5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2a;
      --bg-tertiary: #222220;
      --text-primary: #f0efea;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border-tertiary: rgba(255,255,255,0.15);
      --border-secondary: rgba(255,255,255,0.3);
      --p1-bg: #27500A;
      --p2-bg: #633806;
      --p3-bg: #501313;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    margin: 0;
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  header { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 20px; font-weight: 500; margin: 0; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 6px; vertical-align: 1px; }
  .badge.synced { background: #D8EAD5; color: #285A22; }
  .badge.local { background: #FAEEDA; color: #854F0B; }
  .badge.offline { background: #F0F0F0; color: #5F5E5A; }
  @media (prefers-color-scheme: dark) {
    .badge.synced { background: #173404; color: #C0DD97; }
    .badge.local { background: #412402; color: #FAC775; }
    .badge.offline { background: #2C2C2A; color: #B4B2A9; }
  }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--bg-primary); border: 0.5px solid var(--border-secondary);
    color: var(--text-primary); padding: 6px 12px; border-radius: var(--border-radius-md);
    font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--info); color: white; border-color: var(--info); }
  button.primary:hover { opacity: 0.9; background: var(--info); }
  button.danger { color: var(--danger); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 0 0 16px; }
  .stat { background: var(--bg-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin: 0 0 2px; }
  .stat-value { font-size: 18px; font-weight: 500; color: var(--text-primary); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
  }

  .map-panel { position: sticky; top: 16px; }
  .map-controls { display: flex; align-items: center; gap: 12px; margin: 0 0 12px; flex-wrap: wrap; font-size: 13px; color: var(--text-secondary); }
  .map-controls input[type=range] { flex: 1; min-width: 150px; }
  .yr-readout { min-width: 24px; font-weight: 500; color: var(--text-primary); font-size: 14px; }
  .map { position: relative; background: var(--bg-secondary); border-radius: var(--border-radius-lg); padding: 8px; }
  .map svg { width: 100%; height: auto; display: block; }
  .state { fill: var(--bg-primary); stroke: var(--border-secondary); stroke-width: 0.5; }
  .dot { stroke: var(--bg-primary); stroke-width: 0.6; cursor: pointer; transition: r 0.2s, opacity 0.2s; }
  .dot.p1 { fill: var(--p1); }
  .dot.p2 { fill: var(--p2); }
  .dot.p3 { fill: var(--p3); }
  .dot.dim { opacity: 0.15; }
  .dot.hl { stroke: var(--text-primary); stroke-width: 2; r: 8; }
  .tip {
    position: absolute; background: var(--bg-primary); border: 0.5px solid var(--border-secondary);
    border-radius: var(--border-radius-md); padding: 7px 11px; font-size: 12px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; white-space: nowrap;
    color: var(--text-primary); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .tip strong { font-weight: 500; }
  .tip .meta { color: var(--text-secondary); font-size: 11px; margin-top: 1px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); margin: 12px 0 0; align-items: center; justify-content: center; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Table panel */
  .table-panel { background: var(--bg-secondary); border-radius: var(--border-radius-lg); padding: 12px; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin: 0 0 10px; flex-wrap: wrap; gap: 8px; }
  .table-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin: 0; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 10px; align-items: center; font-size: 12px; color: var(--text-secondary); }
  .filter-row select, .filter-row input { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--text-primary); font-family: inherit; }

  .table-wrap { max-height: 620px; overflow-y: auto; border-radius: var(--border-radius-md); background: var(--bg-primary); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { position: sticky; top: 0; background: var(--bg-secondary); z-index: 2; }
  th {
    text-align: left; font-weight: 500; font-size: 11px; color: var(--text-secondary);
    padding: 8px 6px; border-bottom: 0.5px solid var(--border-tertiary);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  td { padding: 3px 4px; border-bottom: 0.5px solid var(--border-tertiary); vertical-align: middle; }
  tr:hover td { background: var(--bg-secondary); }
  tr.selected td { background: var(--p2-bg); }

  td input, td select {
    width: 100%; background: transparent; border: 0.5px solid transparent;
    padding: 4px 6px; border-radius: 4px; font-size: 12px; color: var(--text-primary); font-family: inherit;
    min-height: 26px;
  }
  td input:hover, td select:hover { border-color: var(--border-tertiary); background: var(--bg-primary); }
  td input:focus, td select:focus { outline: none; border-color: var(--info); background: var(--bg-primary); }
  td input[type=number] { text-align: right; }

  .drag-handle { cursor: grab; color: var(--text-tertiary); user-select: none; padding: 0 4px; font-size: 14px; line-height: 1; }
  .drag-handle:active { cursor: grabbing; }
  tr.dragging { opacity: 0.4; }
  tr.drop-target td { border-top: 2px solid var(--info); }

  .phase-badge { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 10px; font-weight: 500; color: white; }
  .phase-badge.p1 { background: var(--p1); }
  .phase-badge.p2 { background: var(--p2); }
  .phase-badge.p3 { background: var(--p3); }

  .row-actions { display: flex; gap: 2px; white-space: nowrap; }
  .icon-btn { background: transparent; border: none; padding: 4px 6px; cursor: pointer; color: var(--text-secondary); font-size: 13px; border-radius: 4px; }
  .icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .icon-btn.danger:hover { color: var(--danger); }
  .icon-btn.success:hover { color: var(--success); }

  .add-row-form {
    background: var(--bg-primary); border: 0.5px solid var(--border-tertiary);
    border-radius: var(--border-radius-md); padding: 10px; margin: 10px 0 0;
    display: grid; grid-template-columns: 60px 1fr 70px 70px 90px 90px auto; gap: 6px; align-items: end;
  }
  @media (max-width: 700px) { .add-row-form { grid-template-columns: 1fr 1fr; } }
  .form-field label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin: 0 0 2px; }
  .form-field input, .form-field select {
    width: 100%; background: var(--bg-secondary); border: 0.5px solid var(--border-tertiary);
    padding: 5px 7px; border-radius: 5px; font-size: 12px; color: var(--text-primary); font-family: inherit;
  }
  .form-field input:focus, .form-field select:focus { outline: none; border-color: var(--info); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: var(--bg-primary);
    padding: 8px 16px; border-radius: var(--border-radius-md); font-size: 13px;
    opacity: 0; transition: opacity 0.2s; z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hint { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-left: 6px; }
  .phase-hint { font-size: 10px; color: var(--text-tertiary); margin-left: 4px; }

  .row-count-pill { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); padding: 2px 8px; border-radius: 10px; font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>HomeFab — 10-Year Expansion Map Editor</h1>
      <p class="subtitle">Edit the cities table on the right — the map updates live. <span id="data-source-indicator"></span></p>
    </div>
    <div class="toolbar">
      <button onclick="reloadFromSource()" title="Fetch the latest sites.json from the hosted source">↻ Reload from source</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="document.getElementById('import-file').click()">Import</button>
      <input type="file" id="import-file" accept=".json,.csv" style="display:none" onchange="importFile(event)">
      <button class="danger" onclick="resetToDefaults()">Reset to defaults</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total HomeFabs</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Phase 1 / 2 / 3</div><div class="stat-value" id="s-phases">—</div></div>
    <div class="stat"><div class="stat-label">States covered</div><div class="stat-value" id="s-states">—</div></div>
    <div class="stat"><div class="stat-label">Visible at current year</div><div class="stat-value" id="s-visible">—</div></div>
  </div>

  <div class="layout">
    <!-- MAP PANEL -->
    <div class="map-panel">
      <div class="map-controls">
        <span>Year <span class="yr-readout" id="yr-out">10</span></span>
        <input type="range" id="yr" min="1" max="10" value="10" step="1">
        <button onclick="play()" id="play-btn">▶ Animate</button>
      </div>
      <div class="map">
        <div class="tip" id="tip"></div>
        <svg id="map" viewBox="0 0 960 600" role="img">
          <title>HomeFab expansion map</title>
          <desc>US map showing HomeFab sites by phase</desc>
        </svg>
      </div>
      <div class="legend">
        <span><span class="swatch" style="background:var(--p1)"></span>Phase 1 (Yrs 1–2)</span>
        <span><span class="swatch" style="background:var(--p2)"></span>Phase 2 (Yrs 3–5)</span>
        <span><span class="swatch" style="background:var(--p3)"></span>Phase 3 (Yrs 6–10)</span>
      </div>
    </div>

    <!-- TABLE PANEL -->
    <div class="table-panel">
      <div class="table-header">
        <p class="table-title">Cities <span class="row-count-pill" id="row-count">—</span></p>
        <div>
          <button onclick="sortBy('yr')">Sort by Year</button>
          <button onclick="sortBy('state')">Sort by State</button>
          <button onclick="sortBy('name')">Sort by City</button>
        </div>
      </div>

      <div class="filter-row">
        <span>Filter:</span>
        <input type="text" id="filter-text" placeholder="Search city or state..." style="flex:1" oninput="render()">
        <select id="filter-phase" onchange="render()">
          <option value="">All phases</option>
          <option value="1">Phase 1</option>
          <option value="2">Phase 2</option>
          <option value="3">Phase 3</option>
        </select>
        <select id="filter-year" onchange="render()">
          <option value="">All years</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:24px"></th>
              <th style="width:50px">Yr</th>
              <th style="width:60px">Phase</th>
              <th>City</th>
              <th style="width:55px">State</th>
              <th style="width:75px">Lat</th>
              <th style="width:75px">Lon</th>
              <th style="width:80px"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="add-row-form">
        <div class="form-field">
          <label>Year</label>
          <select id="new-yr">
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
            <option>6</option><option>7</option><option>8</option><option>9</option><option selected>10</option>
          </select>
        </div>
        <div class="form-field">
          <label>City</label>
          <input type="text" id="new-name" placeholder="e.g. Corpus Christi" oninput="autoGeocodeHint()">
        </div>
        <div class="form-field">
          <label>State</label>
          <input type="text" id="new-state" maxlength="2" placeholder="TX" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase();autoGeocodeHint()">
        </div>
        <div class="form-field">
          <label>Phase</label>
          <select id="new-phase">
            <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option>
          </select>
        </div>
        <div class="form-field">
          <label>Lat</label>
          <input type="number" id="new-lat" step="0.01" placeholder="auto">
        </div>
        <div class="form-field">
          <label>Lon</label>
          <input type="number" id="new-lon" step="0.01" placeholder="auto">
        </div>
        <div class="form-field">
          <label>&nbsp;</label>
          <button class="primary" onclick="addRow()">+ Add city</button>
        </div>
      </div>
      <div id="geocode-hint" class="hint" style="margin-top:6px;min-height:16px"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

const STORAGE_KEY = 'homefab_sites_v1';
let sites = [];  // populated async during init
let currentYear = 10;
let playTimer = null;
let mapProjection = null;
let hoveredRowId = null;
let canonicalSites = null;  // what was loaded from sites.json (for comparison)
let dataSource = 'loading';  // 'synced' | 'local-edits' | 'offline' | 'loading'

// Give every site a unique id for tracking across edits
function ensureIds() {
  sites.forEach((s, i) => { if (!s._id) s._id = 'id_' + Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2,7); });
}

// Strip _id and normalize for comparison
function normalize(arr) {
  return arr.map(({_id, ...rest}) => rest);
}

function arraysEqual(a, b) {
  if (!a || !b || a.length !== b.length) return false;
  return JSON.stringify(normalize(a)) === JSON.stringify(normalize(b));
}

async function fetchCanonical() {
  try {
    // Add cache-buster so users always get the latest sites.json after you push updates
    const resp = await fetch('sites.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('Empty or invalid');
    return data;
  } catch(e) {
    return null;
  }
}

async function loadSites() {
  const canonical = await fetchCanonical();
  canonicalSites = canonical;

  let stored = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) stored = parsed;
    }
  } catch(e) {}

  if (canonical && stored && !arraysEqual(canonical, stored)) {
    // User has local edits AND sites.json exists AND they differ
    const useLocal = confirm(
      'You have unsaved local edits that differ from the published sites.json.\n\n' +
      '• Click OK to keep your local edits\n' +
      '• Click Cancel to load the fresh list from sites.json (your local edits will be discarded)'
    );
    if (useLocal) {
      dataSource = 'local-edits';
      return stored;
    } else {
      localStorage.removeItem(STORAGE_KEY);
      dataSource = 'synced';
      return JSON.parse(JSON.stringify(canonical));
    }
  }

  if (canonical) {
    dataSource = stored ? 'synced' : 'synced';  // local matches canonical, or no local
    return stored || JSON.parse(JSON.stringify(canonical));
  }

  // No canonical (fetch failed — likely opened as file://)
  if (stored) { dataSource = 'local-edits'; return stored; }
  dataSource = 'offline';
  return JSON.parse(JSON.stringify(SEED_SITES));
}

function updateSourceIndicator() {
  const el = document.getElementById('data-source-indicator');
  if (!el) return;
  if (dataSource === 'synced') {
    el.innerHTML = '<span class="badge synced">Synced with sites.json</span>';
  } else if (dataSource === 'local-edits') {
    el.innerHTML = '<span class="badge local">Local edits (not saved to source)</span>';
  } else if (dataSource === 'offline') {
    el.innerHTML = '<span class="badge offline">Using built-in defaults (sites.json not found)</span>';
  } else {
    el.innerHTML = '<span class="badge offline">Loading…</span>';
  }
}

async function reloadFromSource() {
  const canonical = await fetchCanonical();
  if (!canonical) {
    toast('Could not fetch sites.json — check your connection or the file URL');
    return;
  }
  if (sites.length > 0 && !arraysEqual(canonical, sites)) {
    const ok = confirm(
      'Reload from sites.json? This will discard your local edits in this browser.\n\n' +
      'Tip: click Export JSON first if you want to save your current work.'
    );
    if (!ok) return;
  }
  localStorage.removeItem(STORAGE_KEY);
  canonicalSites = canonical;
  sites = JSON.parse(JSON.stringify(canonical));
  dataSource = 'synced';
  ensureIds();
  updateSourceIndicator();
  render();
  toast('Reloaded ' + sites.length + ' cities from sites.json');
}

function saveSites() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); } catch(e) {}
  // If the user has diverged from canonical, mark as local edits
  if (canonicalSites && !arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'local-edits') {
      dataSource = 'local-edits';
      updateSourceIndicator();
    }
  } else if (canonicalSites && arraysEqual(canonicalSites, sites)) {
    if (dataSource !== 'synced') {
      dataSource = 'synced';
      updateSourceIndicator();
    }
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

// Geocode lookup
function geocode(name, state) {
  if (!name || !state) return null;
  const n = name.toLowerCase().trim();
  const s = state.toUpperCase().trim();
  // Exact match
  let m = GEOCODE_DB.find(c => c.name.toLowerCase() === n && c.state === s);
  if (m) return { lat: m.lat, lon: m.lon };
  // Partial match (contains)
  m = GEOCODE_DB.find(c => c.state === s && (c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase())));
  if (m) return { lat: m.lat, lon: m.lon, fuzzy: true, matched: m.name };
  return null;
}

function autoGeocodeHint() {
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim();
  const hint = document.getElementById('geocode-hint');
  const latF = document.getElementById('new-lat');
  const lonF = document.getElementById('new-lon');
  if (!name || !state) { hint.textContent = ''; return; }
  const g = geocode(name, state);
  if (g) {
    if (g.fuzzy) {
      hint.textContent = `Found similar: ${g.matched}, ${state} (${g.lat.toFixed(2)}, ${g.lon.toFixed(2)})`;
    } else {
      hint.textContent = `Auto-filled: ${g.lat.toFixed(2)}, ${g.lon.toFixed(2)}`;
    }
    if (!latF.value) latF.value = g.lat;
    if (!lonF.value) lonF.value = g.lon;
  } else {
    hint.textContent = `No lat/lon found for "${name}, ${state}" — enter manually or use a different spelling.`;
  }
}

function addRow() {
  const yr = parseInt(document.getElementById('new-yr').value);
  const name = document.getElementById('new-name').value.trim();
  const state = document.getElementById('new-state').value.trim().toUpperCase();
  const phase = parseInt(document.getElementById('new-phase').value);
  let lat = parseFloat(document.getElementById('new-lat').value);
  let lon = parseFloat(document.getElementById('new-lon').value);

  if (!name || !state) { toast('City and State required'); return; }
  if (state.length !== 2) { toast('State must be 2 letters'); return; }

  if (isNaN(lat) || isNaN(lon)) {
    const g = geocode(name, state);
    if (g) { lat = g.lat; lon = g.lon; }
    else { toast('Lat/Lon required (not in built-in lookup)'); return; }
  }
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { toast('Invalid coordinates'); return; }

  const newSite = { yr, phase, name, state, lat, lon, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7) };
  sites.push(newSite);
  saveSites();
  document.getElementById('new-name').value = '';
  document.getElementById('new-state').value = '';
  document.getElementById('new-lat').value = '';
  document.getElementById('new-lon').value = '';
  document.getElementById('geocode-hint').textContent = '';
  render();
  toast(`Added ${name}, ${state}`);
}

function deleteRow(id) {
  const idx = sites.findIndex(s => s._id === id);
  if (idx === -1) return;
  const s = sites[idx];
  sites.splice(idx, 1);
  saveSites();
  render();
  toast(`Removed ${s.name}, ${s.state}`);
}

function updateField(id, field, value) {
  const site = sites.find(s => s._id === id);
  if (!site) return;
  if (field === 'yr' || field === 'phase') {
    value = parseInt(value);
    if (isNaN(value)) return;
    if (field === 'yr' && (value < 1 || value > 10)) return;
    if (field === 'phase' && (value < 1 || value > 3)) return;
  } else if (field === 'lat' || field === 'lon') {
    value = parseFloat(value);
    if (isNaN(value)) return;
  } else if (field === 'state') {
    value = (value || '').toUpperCase().slice(0, 2);
  } else if (field === 'name') {
    value = (value || '').trim();
    if (!value) return;
  }
  site[field] = value;
  saveSites();
  updateMap();
  updateStats();
}

function sortBy(field) {
  sites.sort((a, b) => {
    const av = a[field], bv = b[field];
    if (typeof av === 'number') return av - bv;
    return String(av).localeCompare(String(bv));
  });
  saveSites();
  render();
  toast(`Sorted by ${field}`);
}

function resetToDefaults() {
  const source = canonicalSites ? 'the published sites.json' : 'the built-in defaults';
  if (!confirm(`Reset all edits and restore ${source}? This cannot be undone.`)) return;
  localStorage.removeItem(STORAGE_KEY);
  sites = JSON.parse(JSON.stringify(canonicalSites || SEED_SITES));
  dataSource = canonicalSites ? 'synced' : 'offline';
  ensureIds();
  updateSourceIndicator();
  render();
  toast('Reset to defaults');
}

function exportJSON() {
  const clean = sites.map(({_id, ...rest}) => rest);
  const blob = new Blob([JSON.stringify(clean, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'homefab_sites.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported JSON');
}

function exportCSV() {
  const rows = [['Year','Phase','City','State','Latitude','Longitude']];
  sites.forEach(s => rows.push([s.yr, s.phase, s.name, s.state, s.lat, s.lon]));
  const csv = rows.map(r => r.map(v => {
    const str = String(v);
    return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'homefab_sites.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported CSV');
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let imported = [];
      if (file.name.endsWith('.json')) {
        imported = JSON.parse(e.target.result);
      } else if (file.name.endsWith('.csv')) {
        const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
        // detect header
        const first = lines[0].toLowerCase();
        const startIdx = (first.includes('year') || first.includes('city')) ? 1 : 0;
        for (let i = startIdx; i < lines.length; i++) {
          const parts = parseCSVLine(lines[i]);
          if (parts.length < 6) continue;
          imported.push({
            yr: parseInt(parts[0]),
            phase: parseInt(parts[1]),
            name: parts[2],
            state: parts[3].toUpperCase(),
            lat: parseFloat(parts[4]),
            lon: parseFloat(parts[5])
          });
        }
      }
      if (!Array.isArray(imported) || imported.length === 0) { toast('No valid rows found'); return; }
      // Validate
      const valid = imported.filter(s => s.name && s.state && !isNaN(s.lat) && !isNaN(s.lon) && !isNaN(s.yr) && !isNaN(s.phase));
      if (valid.length === 0) { toast('No valid rows after validation'); return; }
      sites = valid;
      ensureIds();
      saveSites();
      render();
      toast(`Imported ${valid.length} cities`);
    } catch(err) {
      toast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cur += c;
    } else {
      if (c === ',') { result.push(cur); cur = ''; }
      else if (c === '"') inQuotes = true;
      else cur += c;
    }
  }
  result.push(cur);
  return result.map(s => s.trim());
}

// ---- Rendering ----
function render() {
  ensureIds();
  renderTable();
  renderYearFilter();
  updateMap();
  updateStats();
}

function renderYearFilter() {
  const sel = document.getElementById('filter-year');
  const cur = sel.value;
  const years = [...new Set(sites.map(s => s.yr))].sort((a,b) => a - b);
  sel.innerHTML = '<option value="">All years</option>' + years.map(y => `<option value="${y}">Year ${y}</option>`).join('');
  sel.value = cur;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const filterText = document.getElementById('filter-text').value.toLowerCase().trim();
  const filterPhase = document.getElementById('filter-phase').value;
  const filterYear = document.getElementById('filter-year').value;

  const visible = sites.filter(s => {
    if (filterText && !s.name.toLowerCase().includes(filterText) && !s.state.toLowerCase().includes(filterText)) return false;
    if (filterPhase && String(s.phase) !== filterPhase) return false;
    if (filterYear && String(s.yr) !== filterYear) return false;
    return true;
  });

  document.getElementById('row-count').textContent = visible.length === sites.length ? `${sites.length} total` : `${visible.length} of ${sites.length}`;

  tbody.innerHTML = visible.map(s => `
    <tr data-id="${s._id}" draggable="true" onmouseenter="highlightDot('${s._id}')" onmouseleave="highlightDot(null)">
      <td><span class="drag-handle" title="Drag to reorder">⋮⋮</span></td>
      <td><input type="number" min="1" max="10" value="${s.yr}" onchange="updateField('${s._id}','yr',this.value)"></td>
      <td>
        <select onchange="updateField('${s._id}','phase',this.value)">
          <option value="1" ${s.phase===1?'selected':''}>1</option>
          <option value="2" ${s.phase===2?'selected':''}>2</option>
          <option value="3" ${s.phase===3?'selected':''}>3</option>
        </select>
      </td>
      <td><input type="text" value="${escapeHtml(s.name)}" onchange="updateField('${s._id}','name',this.value)"></td>
      <td><input type="text" maxlength="2" value="${escapeHtml(s.state)}" style="text-transform:uppercase" onchange="updateField('${s._id}','state',this.value)"></td>
      <td><input type="number" step="0.01" value="${s.lat}" onchange="updateField('${s._id}','lat',this.value)"></td>
      <td><input type="number" step="0.01" value="${s.lon}" onchange="updateField('${s._id}','lon',this.value)"></td>
      <td class="row-actions">
        <button class="icon-btn success" title="Duplicate" onclick="duplicateRow('${s._id}')">⎘</button>
        <button class="icon-btn" title="Re-geocode" onclick="regeocodeRow('${s._id}')">⌖</button>
        <button class="icon-btn danger" title="Delete" onclick="deleteRow('${s._id}')">✕</button>
      </td>
    </tr>
  `).join('');

  attachDragHandlers();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function duplicateRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const copy = { ...s, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), name: s.name + ' (copy)' };
  const idx = sites.findIndex(x => x._id === id);
  sites.splice(idx + 1, 0, copy);
  saveSites();
  render();
}

function regeocodeRow(id) {
  const s = sites.find(x => x._id === id);
  if (!s) return;
  const g = geocode(s.name, s.state);
  if (g) {
    s.lat = g.lat; s.lon = g.lon;
    saveSites(); render();
    toast(`Re-geocoded ${s.name}`);
  } else {
    toast(`No match for "${s.name}, ${s.state}"`);
  }
}

// ---- Drag & drop reorder ----
let dragId = null;
function attachDragHandlers() {
  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      dragId = row.getAttribute('data-id');
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('drop-target'));
      row.classList.add('drop-target');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = row.getAttribute('data-id');
      if (dragId && targetId && dragId !== targetId) {
        const from = sites.findIndex(s => s._id === dragId);
        const to = sites.findIndex(s => s._id === targetId);
        if (from !== -1 && to !== -1) {
          const [moved] = sites.splice(from, 1);
          sites.splice(to, 0, moved);
          saveSites();
          render();
        }
      }
      row.classList.remove('drop-target');
    });
  });
}

// ---- Map ----
function updateStats() {
  document.getElementById('s-total').textContent = sites.length;
  const p1 = sites.filter(s => s.phase === 1).length;
  const p2 = sites.filter(s => s.phase === 2).length;
  const p3 = sites.filter(s => s.phase === 3).length;
  document.getElementById('s-phases').textContent = `${p1} / ${p2} / ${p3}`;
  const states = new Set(sites.filter(s => s.yr <= currentYear).map(s => s.state));
  document.getElementById('s-states').textContent = states.size;
  const visible = sites.filter(s => s.yr <= currentYear).length;
  document.getElementById('s-visible').textContent = visible;
}

function updateMap() {
  if (!mapProjection) return;
  const svg = d3.select('#map');
  let g = svg.select('g.dots-layer');
  if (g.empty()) g = svg.append('g').attr('class', 'dots-layer');

  const join = g.selectAll('circle').data(sites, d => d._id);
  join.exit().remove();
  const enter = join.enter().append('circle').attr('r', 4.5).attr('class', d => 'dot p' + d.phase);
  enter.merge(join)
    .attr('class', d => 'dot p' + d.phase + (d.yr > currentYear ? ' dim' : '') + (d._id === hoveredRowId ? ' hl' : ''))
    .attr('cx', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[0] : -100; })
    .attr('cy', d => { const p = mapProjection([d.lon, d.lat]); return p ? p[1] : -100; });

  // Tooltip handlers
  const tip = document.getElementById('tip');
  const mapEl = document.querySelector('.map');
  g.selectAll('circle')
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('r', 7);
      tip.innerHTML = `<strong>${escapeHtml(d.name)}, ${escapeHtml(d.state)}</strong><div class="meta">Year ${d.yr} · Phase ${d.phase}</div>`;
      tip.style.opacity = '1';
    })
    .on('mousemove', function(e) {
      const rect = mapEl.getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 12) + 'px';
      tip.style.top = (e.clientY - rect.top - 8) + 'px';
    })
    .on('mouseleave', function() {
      d3.select(this).attr('r', 4.5);
      tip.style.opacity = '0';
    });
}

function highlightDot(id) {
  hoveredRowId = id;
  updateMap();
}

function play() {
  const slider = document.getElementById('yr');
  const btn = document.getElementById('play-btn');
  if (playTimer) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
  btn.textContent = '⏸ Pause';
  let y = 1;
  slider.value = 1;
  currentYear = 1;
  document.getElementById('yr-out').textContent = '1';
  updateMap(); updateStats();
  playTimer = setInterval(() => {
    y++;
    if (y > 10) { clearInterval(playTimer); playTimer = null; btn.textContent = '▶ Animate'; return; }
    slider.value = y;
    currentYear = y;
    document.getElementById('yr-out').textContent = String(y);
    updateMap(); updateStats();
  }, 800);
}

(async function init() {
  // Load sites first — parallel with the map topology fetch
  const [_, topo] = await Promise.all([
    loadSites().then(loaded => { sites = loaded; ensureIds(); updateSourceIndicator(); }),
    (async () => {
      const urls = [
        'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json',
        'https://unpkg.com/us-atlas@3/states-10m.json'
      ];
      for (const u of urls) {
        try {
          const r = await fetch(u);
          if (r.ok) return await r.json();
        } catch(e) {}
      }
      return null;
    })()
  ]);

  if (!topo) {
    document.getElementById('map').innerHTML = '<text x="480" y="300" text-anchor="middle" fill="currentColor" font-size="14">Map data unavailable — check your internet connection</text>';
    // Still render the table even without the map
    render();
    return;
  }

  const svg = d3.select('#map');
  mapProjection = d3.geoAlbersUsa().scale(1180).translate([480, 300]);
  const path = d3.geoPath(mapProjection);
  const states = topojson.feature(topo, topo.objects.states);
  svg.append('g').attr('class', 'states-layer').selectAll('path').data(states.features).enter().append('path').attr('class', 'state').attr('d', path);

  document.getElementById('yr').addEventListener('input', e => {
    currentYear = +e.target.value;
    document.getElementById('yr-out').textContent = String(currentYear);
    updateMap(); updateStats();
  });

  render();
})();
</script>
</body>
